name: Bug report
description: Report a reproducible problem
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! For **security vulnerabilities**, do not use this form —
        see [SECURITY.md](../blob/main/SECURITY.md) and report privately.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal command / pack / goal that triggers it.
      placeholder: |
        1. xitto-kernel --pack general --goal "..."
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `xitto-kernel --version` (or the npm version).
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      description: Output of `node -v` (must be ≥ 20).
  - type: input
    id: provider
    attributes:
      label: Provider / model
      description: e.g. MiniMax-M2.7, Anthropic claude-…, OpenAI … (omit keys).
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output. **Redact API keys and secrets.**
      render: shell
