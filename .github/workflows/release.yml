name: Release

# Push a version tag (e.g. v0.9.7) to publish to npm with provenance.
# Requires repo secret NPM_TOKEN (an npm automation/granular token with publish rights).
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write   # required for npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - name: Verify tag matches package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
      - run: npm test
      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
