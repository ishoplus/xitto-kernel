name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]   # macOS 跑得到 Seatbelt 隔離測試；ubuntu 自動 skip
        node: [22, 24]   # 相依（pi-ai、ink）要求 >=22；測 22（最低支援）+ 24（現行 LTS）
    name: test (node ${{ matrix.node }}, ${{ matrix.os }})
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test
