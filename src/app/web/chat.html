<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>xitto · 對話</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<!-- 設計系統 + 共享工具庫 -->
<link rel="stylesheet" href="shared/style.css">
<link rel="stylesheet" href="shared/office-preview.css">
<!-- 設定注入：server 會替換這些佔位符（HTML 才會被替換，靜態 app.js 不會），app.js 從 window.__XITTO__ 讀 -->
<script>window.__XITTO__ = { token: "__SERVER_TOKEN__", packs: __PACKS__, local: __LOCAL__, version: "__VERSION__", lang: "__LANG__" };</script>
<!-- 三語字典一律全載入（供切換器即時切換，不用重整頁面），部署預設語言只決定初次顯示哪一份 -->
<script src="shared/i18n/zh-Hant.js"></script>
<script src="shared/i18n/zh-Hans.js"></script>
<script src="shared/i18n/en.js"></script>
<script src="shared/i18n.js"></script>
<script src="shared/md.js"></script>
<script src="shared/app.js"></script>
<script src="shared/office-preview.js"></script>
<script src="shared/account.js"></script>
<style>
/* ── Chat 頁面樣式 ──────────────────────────────────────── */

:root { --sidebar-w: 300px; --thread-w: 780px; --rail-w: 320px; }

/* TUI 工具類別色（彩色終端機）：讀＝藍／改＝金／執行＝綠／網路＝紫／其他＝灰 */
:root {
  --tool-read: var(--accent);
  --tool-edit: var(--warn);
  --tool-run:  var(--ok);
  --tool-net:  #b694ff;
  --tool-meta: var(--dim);
}
[data-theme="light"] { --tool-net: #7c3fd8; }

html, body { height: 100%; }

body {
  display: flex;
  flex-direction: column;
}

/* 跳過導航 */
.skip-link {
  position: absolute;
  top: -100px;
  left: 0;
  background: var(--accent);
  color: var(--btnfg);
  padding: var(--sp-2) var(--sp-4);
  z-index: 9999;
  border-radius: 0 0 var(--r-md) 0;
  font-weight: 600;
  transition: top var(--duration-fast);
}

.skip-link:focus { top: 0; }

/* 全屏雙欄 */
.app {
  flex: 1;
  display: grid;
  grid-template-columns: var(--sidebar-w) minmax(0, 1fr);
  height: 100vh;
  overflow: hidden;
}

/* ── 左側邊欄 ─────────────────────────────────────────── */
.side {
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  background: var(--inset);
  overflow: hidden;
}

.side-head {
  padding: var(--sp-4) var(--sp-3) var(--sp-3);
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}

.side-brand {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  margin-bottom: var(--sp-1);
  min-height: 28px;   /* 標題列與任務台/會議室同高，切頁不跳 */
}

.side-brand h1 {
  font-size: 17px;
  font-weight: 700;
  margin: 0;
}

.side-tagline {
  color: var(--dim);
  font-size: 12px;
  line-height: 1.4;
}

.side-controls {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  margin-top: var(--sp-3);
}

/* 資料夾選擇 Modal（與任務台一致）*/
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, .6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fade-in var(--duration-fast) var(--ease-out);
}
.modal[hidden] { display: none; }
.modal-box {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  width: min(560px, 92vw);
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  padding: var(--sp-4);
  box-shadow: var(--shadow-card);
}
.modal-title { font-weight: 600; margin-bottom: var(--sp-3); }
.fs-path {
  font: 12px ui-monospace, Menlo, monospace;
  color: var(--dim);
  margin-bottom: var(--sp-2);
  word-break: break-all;
}
.fs-list {
  flex: 1;
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: var(--r-md);
}
.fs-row {
  padding: var(--sp-2) var(--sp-3);
  cursor: pointer;
  font-size: 14px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  width: 100%;
  text-align: left;
  background: none;
}
.fs-row:last-child { border-bottom: none; }
.fs-row:hover { background: var(--inset); }
.fs-row.up { color: var(--dim); }
.fs-row.hid { color: var(--dim); }
.fs-drives {
  display: flex;
  flex-wrap: wrap;
  gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-3);
  border-bottom: 1px solid var(--line);
  background: var(--inset);
}
.fs-drive {
  font-size: 12px;
  padding: 3px var(--sp-2);
  background: transparent;
  color: var(--fg);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  cursor: pointer;
}
.fs-drive:hover { border-color: var(--accent); }
.fs-bar {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  margin-top: var(--sp-3);
}
.fs-hidden {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  font-size: 12.5px;
  color: var(--dim);
  cursor: pointer;
}

.new-chat-btn {
  width: 100%;
  margin-top: var(--sp-3);
  flex-shrink: 0;
}

/* 對話列表 */
.chats {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-2);
}

.chat-item {
  display: block;
  width: 100%;
  text-align: left;
  padding: var(--sp-2);
  margin: 2px 0;
  border-radius: var(--r-sm);
  background: transparent;
  border: 1px solid transparent;
  cursor: pointer;
  transition: background var(--duration-fast), border-color var(--duration-fast);
  position: relative;
}

.chat-item:hover { background: var(--card); }

.chat-item.active {
  background: var(--card);
  border-color: var(--accent);
}

.chat-item .title {
  font-size: 13.5px;
  line-height: 1.4;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--fg);
  font-weight: inherit;
  padding: 0;
}

/* 側欄「進行中」指示（切走仍在跑的對話會顯示旋轉點）*/
.chat-run { color: var(--accent); animation: blink 1.2s steps(2) infinite; }

.chat-item .meta {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  color: var(--dim);
  font-size: 11px;
  margin-top: 2px;
}

.chat-del {
  position: absolute;
  top: 50%;
  right: var(--sp-2);
  transform: translateY(-50%);
  opacity: 0;
  cursor: pointer;
  font-size: 12px;
  background: none;
  border: none;
  padding: var(--sp-1);
  color: var(--dim);
  transition: opacity var(--duration-fast);
}

.chat-item:hover .chat-del { opacity: .6; }
.chat-del:hover { opacity: 1; }

/* 側邊欄底部 */
.side-foot {
  padding: var(--sp-3);
  border-top: 1px solid var(--line);
  font-size: 12.5px;
  flex-shrink: 0;
}

.side-foot a {
  color: var(--accent);
}
.app-ver { float: right; color: var(--faint, var(--dim)); font-size: 11px; opacity: .8; }
.foot-link { background: none; border: 0; padding: 0; margin: 0; font: inherit; color: var(--accent); cursor: pointer; }
.foot-link:hover { text-decoration: underline; }

/* 技能管理 modal */
.sk-sub { font-size: 12.5px; color: var(--dim); margin-bottom: var(--sp-3); }
.sk-list { display: flex; flex-direction: column; gap: var(--sp-2); max-height: 60vh; overflow: auto; }
.sk-empty { font-size: 13px; color: var(--dim); line-height: 1.6; padding: var(--sp-4) 0; text-align: center; }
.sk-item { padding: var(--sp-2) var(--sp-3); background: var(--inset); border: 1px solid var(--line); border-radius: var(--r-md); }
.sk-item-h { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; font-size: 13px; font-weight: 600; }
.sk-name { min-width: 0; }
.sk-tag { font-size: 10.5px; font-weight: 500; color: var(--dim); background: var(--card); border: 1px solid var(--line); border-radius: var(--r-pill); padding: 1px 7px; }
.sk-tag.warn { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 40%, var(--line)); }
.sk-pack { font-size: 10.5px; color: var(--dim); }
.sk-desc { font-size: 12.5px; color: var(--dim); line-height: 1.5; margin-top: 2px; }
.sk-btn { font-size: 11px; font-weight: 500; padding: 2px 8px; background: transparent; color: var(--accent); border: 1px solid var(--line); border-radius: 5px; cursor: pointer; }
.sk-btn:hover { border-color: var(--accent); }
.sk-btn.danger { color: var(--danger); }
.sk-btn.danger:hover { border-color: var(--danger); }
.sk-body { margin: 8px 0 0; padding: 8px 10px; background: var(--code); border: 1px solid var(--line); border-radius: var(--r-sm); font: 11.5px/1.5 ui-monospace, Menlo, monospace; white-space: pre-wrap; word-break: break-word; max-height: 300px; overflow: auto; }

/* 檔案列表 */
.file-section {
  border-top: 1px solid var(--line);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  max-height: 300px;
}

.file-section h3 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--dim);
  margin: 0;
  padding: var(--sp-2) var(--sp-3);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: var(--sp-2);
}
/* .refresh-btn 與 spin 動畫在 shared/style.css（兩頁共用）*/

.file-breadcrumb {
  padding: var(--sp-1) var(--sp-3);
  font-size: 11px;
  color: var(--dim);
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.file-list {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-1) var(--sp-2);
}

.file-up {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  color: var(--dim);
  font-size: 13px;
  padding: var(--sp-1) var(--sp-2);
  border-radius: var(--r-sm);
  cursor: pointer;
  background: none;
  border: none;
  width: 100%;
  text-align: left;
}

.file-up:hover { color: var(--fg); }

.file-row {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  padding: var(--sp-1) var(--sp-2);
  border-radius: var(--r-sm);
  cursor: pointer;
  font-size: 13px;
  background: none;
  border: none;
  width: 100%;
  text-align: left;
  transition: background var(--duration-fast);
}

.file-row:hover { background: var(--card); }

.file-row .name {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--fg);
}

.file-row .size {
  color: var(--dim);
  font-size: 11px;
  flex-shrink: 0;
}

/* 每行容器（行 + 刪除鈕），hover 才顯示刪除 */
.file-item { display: flex; align-items: center; }
.file-item .file-row { flex: 1; min-width: 0; }
.file-del {
  flex-shrink: 0; background: none; border: none; cursor: pointer;
  color: var(--dim); font-size: 12px; padding: 2px 5px; border-radius: var(--r-sm);
  opacity: 0; transition: opacity var(--duration-fast);
}
.file-item:hover .file-del, .file-del:focus { opacity: 1; }
.file-del:hover, .file-del:focus { color: var(--danger); background: var(--card); }
/* 檔案操作列（新資料夾／新檔／上傳） */
.file-actions { display: flex; gap: var(--sp-1); padding: 0 var(--sp-2) var(--sp-1); flex-wrap: wrap; }
.file-actions button {
  background: none; border: 1px solid var(--line); color: var(--dim);
  border-radius: var(--r-sm); font-size: 11px; padding: 2px 7px; cursor: pointer; width: auto;
}
.file-actions button:hover { color: var(--fg); border-color: var(--accent); }

/* ── 右側主區 ─────────────────────────────────────────── */
.main {
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}

/* Thread 區 */
.thread {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-6) 0;
}

.thread-wrap {
  max-width: var(--thread-w);
  margin: 0 auto;
  padding: 0 var(--sp-6);
}

/* 歡迎空狀態 */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  min-height: min(62vh, 460px);
  padding: var(--sp-10) var(--sp-6);
}

.welcome-icon {
  font-size: 40px;
  line-height: 1;
  margin-bottom: var(--sp-4);
}

.welcome-title {
  font-size: 19px;
  font-weight: 700;
  color: var(--fg);
  margin: 0 0 var(--sp-2);
  letter-spacing: -.01em;
}

.welcome-sub {
  color: var(--dim);
  font-size: 14px;
  line-height: 1.8;
  margin: 0;
  max-width: 400px;
}

/* 訊息 */
.msg {
  margin: var(--sp-6) 0;
  display: flex;
  gap: var(--sp-3);
  animation: fade-in var(--duration-base) var(--ease-out);
}

/* 超長對話（訊息數 > VIRT_AT）：瀏覽器原生虛擬化——離屏泡泡跳過排版/繪製/樣式計算，
   只有捲到可視範圍的才真正 render。contain-intrinsic-size 的 auto 會記住量過的真實高度，
   捲動仍穩定。長對話下關掉逐條淡入，避免泡泡離開再進入視口時重播動畫。 */
.thread-wrap.virt .msg {
  content-visibility: auto;
  contain-intrinsic-size: auto 200px;
  animation: none;
}

.msg.user { flex-direction: row-reverse; }

.avatar {
  flex: 0 0 32px;
  width: 32px;
  height: 32px;
  border-radius: var(--r-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  background: var(--card);
  border: 1px solid var(--line);
  align-self: flex-start;
  flex-shrink: 0;
}

.msg.user .avatar { background: var(--me); }

.bubble {
  min-width: 0;
  flex: 1;
  max-width: calc(100% - 44px);
}

.msg.user .bubble { text-align: right; }

.who {
  font-size: 12px;
  color: var(--dim);
  margin-bottom: var(--sp-1);
}

.msg.user .who { text-align: right; }

/* 回覆中插話的訊息：who 列標「↳ 插話」+ 泡泡左側細強調條 */
.steer-tag {
  display: inline-block;
  margin-left: var(--sp-1);
  padding: 0 6px;
  font-size: 10.5px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-soft);
  border-radius: var(--r-pill);
  vertical-align: 1px;
}
.msg.steered .bubble { box-shadow: inset 2px 0 0 var(--accent); padding-left: var(--sp-2); }
/* 終端機模式：who 列被隱藏，改用 body 前綴標插話（比 .msg.user 的「›」更具體，確保覆蓋）*/
.thread.tui .msg.user.steered .body::before { content: "↳ "; color: var(--accent); font-weight: 700; }
/* 插話後回覆的銜接標記（掛在 assistant 泡泡頂部）*/
.steer-pickup {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: var(--sp-1);
  opacity: .85;
}

/* 自動壓縮持久分隔標記：置中、兩側細線、可展開看細節 */
.compact-divider {
  margin: var(--sp-3) auto;
  max-width: 680px;
  width: 100%;
}
.compact-divider > summary {
  list-style: none;
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  cursor: pointer;
  color: var(--dim);
  font-size: 12px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.compact-divider > summary::-webkit-details-marker { display: none; }
.compact-divider .cd-rule { flex: 1; height: 1px; background: var(--line); }
.compact-divider .cd-badge { white-space: nowrap; color: var(--ok); }
.compact-divider > summary:hover .cd-badge { text-decoration: underline; }
.compact-divider[open] > summary .cd-badge::after { content: " ▾"; opacity: .6; }
.compact-divider:not([open]) > summary .cd-badge::after { content: " ▸"; opacity: .6; }
.compact-divider .cd-body {
  margin: var(--sp-2) auto 0;
  max-width: 560px;
  font-size: 12px;
  line-height: 1.6;
  color: var(--dim);
  text-align: center;
}

.body {
  white-space: pre-wrap;
  word-wrap: break-word;
  font-size: 15px;
  line-height: 1.7;
}

.body.md { white-space: normal; }

/* 打字游標 */
.cursor::after {
  content: "▍";
  color: var(--accent);
  animation: blink 1s steps(2) infinite;
}

/* 過程日誌（工具呼叫）*/
.proc {
  margin: var(--sp-2) 0;
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  background: var(--inset);
  text-align: left;
}

.proc-toggle {
  padding: var(--sp-2) var(--sp-3);
  font-size: 13px;
  color: var(--accent);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  background: none;
  border: none;
  font-weight: inherit;
  width: 100%;
  text-align: left;
}

.proc-toggle:hover { background: color-mix(in srgb, var(--accent) 5%, transparent); }

.proc-list {
  padding: var(--sp-1) var(--sp-3) var(--sp-3);
  border-top: 1px solid var(--line);
}

.proc-step {
  font-size: 13px;
  padding: 3px 0;
  color: var(--fg);
}

.proc-step.error { color: var(--danger); }
.proc-step .dim { color: var(--dim); }
.proc-step .spin { color: var(--accent); }

/* 彩色 diff */
.diff { margin: var(--sp-2) 0 var(--sp-2) var(--sp-4); font: 12px/1.5 ui-monospace, Menlo, monospace; }
.dh { color: var(--dim); font-size: 11px; margin-bottom: 2px; }
.dl { white-space: pre-wrap; }
.dl.add { color: var(--ok); }
.dl.del { color: var(--danger); }

/* 子 agent 巢狀工具步驟 */
.substeps {
  margin: 2px 0 var(--sp-1) var(--sp-4);
  padding-left: var(--sp-2);
  border-left: 1px dashed var(--line);
}
.thread.tui .substeps { margin-left: 3ch; border-left: none; padding-left: 0; }

/* 子 agent 即時思考行 */
.sub-think {
  font-size: 12px;
  color: var(--faint);
  font-style: italic;
  padding: 2px 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sub-think::before { content: "◐ "; color: var(--accent); font-style: normal; animation: blink 1.2s steps(2) infinite; }
.thread.tui .sub-think::before { content: "⎿ ◐ "; }

/* 驗收徽章（完成定義）*/
.vbadge {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: var(--sp-2);
  padding: 2px 9px;
  font-size: 12px; font-weight: 600;
  border-radius: var(--r-pill);
  border: 1px solid var(--line);
}
.vbadge.ok { color: var(--ok); border-color: color-mix(in srgb, var(--ok) 40%, var(--line)); background: color-mix(in srgb, var(--ok) 10%, transparent); }
.vbadge.fail { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 45%, var(--line)); background: color-mix(in srgb, var(--warn) 10%, transparent); cursor: pointer; }
.vbadge-wrap { margin-top: var(--sp-2); }
.vbadge-wrap summary { list-style: none; display: inline-flex; }
.vbadge-wrap summary::-webkit-details-marker { display: none; }
.vbadge-out {
  margin: var(--sp-2) 0 0;
  padding: var(--sp-2) var(--sp-3);
  background: var(--inset); border: 1px solid var(--line); border-radius: var(--r-md);
  font: 12px/1.5 ui-monospace, Menlo, monospace;
  white-space: pre-wrap; max-height: 240px; overflow: auto; color: var(--dim);
}

/* 階段提示 */
.phase {
  color: var(--dim);
  font-size: 12.5px;
  font-style: italic;
  margin: var(--sp-1) 0;
}

/* 保底提示：一輪沒有正常回覆時（截斷/中斷/空回應）給使用者的一句話 */
.turn-note {
  margin-top: var(--sp-2);
  padding: var(--sp-1) var(--sp-2);
  font-size: 12.5px;
  color: var(--warn);
  border: 1px solid color-mix(in srgb, var(--warn) 40%, var(--line));
  background: color-mix(in srgb, var(--warn) 10%, transparent);
  border-radius: 8px;
}

/* 視圖切換鈕 */
.view-toggle { font-size: 12px; padding: var(--sp-1) var(--sp-2); white-space: nowrap; }

/* 檔案預覽：浮層 modal（不夾在對話與輸入框之間）。只在有內容時才成為遮罩 */
#file-preview:not(:empty) {
  position: fixed;
  inset: 0;
  z-index: 60;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,.55);
  padding: var(--sp-6);
  animation: fade-in var(--duration-fast) var(--ease-out);
}
.preview-panel {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-pop);
  width: min(820px, 100%);
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.preview-bar {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-4);
  border-bottom: 1px solid var(--line);
  font-size: 12px;
  color: var(--dim);
  flex-shrink: 0;
}
.preview-name { font-weight: 600; color: var(--fg); }
.preview-bar a { color: var(--accent); }
.preview-body { overflow: auto; padding: var(--sp-4); }
.preview-pre { white-space: pre-wrap; font: 13px/1.5 ui-monospace, Menlo, monospace; margin: 0; color: var(--fg); }
.preview-img { max-width: 100%; border-radius: var(--r-md); display: block; margin: 0 auto; }
/* ── 終端機視圖（Claude Code 風轉錄）：monospace、扁平全寬、› / ⏺ xitto / ⎿ 工具行 ── */
.thread.tui { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
.thread.tui .thread-wrap { max-width: 880px; }

/* 扁平：去泡泡、去頭像、全寬左對齊 */
.thread.tui .msg { display: block; margin: 0 0 var(--sp-5); animation: none; }
.thread.tui .avatar { display: none; }
.thread.tui .bubble,
.thread.tui .msg.user .bubble { max-width: none; text-align: left; }

/* 你的訊息：› 提示符 */
.thread.tui .msg.user .who { display: none; }
.thread.tui .msg.user .body { font-size: 13.5px; color: var(--fg); }
.thread.tui .msg.user .body::before { content: "› "; color: var(--accent); font-weight: 700; }

/* AI：⏺ xitto 標頭 + 縮排內容 */
.thread.tui .msg.asst .who { display: block; color: var(--accent); font-weight: 700; margin-bottom: var(--sp-1); font-size: 13.5px; }
.thread.tui .msg.asst .who::before { content: "⏺ "; }
.thread.tui .msg.asst .body { padding-left: 2ch; font-size: 13.5px; }
.thread.tui .phase { padding-left: 2ch; }

/* 工具行：⎿ 縮排、總是展開、隱藏摺疊鈕與原前標 */
.thread.tui .proc { border: none; background: none; margin: var(--sp-1) 0 0; padding-left: 2ch; }
.thread.tui .proc-toggle { display: none; }
.thread.tui .proc-list { display: block !important; border: none; padding: 0; }
.thread.tui .proc-step { padding: 1px 0; color: var(--dim); display: block; }
.thread.tui .proc-step .pmark { display: none; }
.thread.tui .proc-step::before { content: "⎿ "; color: var(--faint); }

/* 彩色工具行：依類別上色（讀＝藍／改＝金／執行＝綠／網路＝紫／其他＝灰）*/
.thread.tui .proc-step.cat-read .ptext, .thread.tui .proc-step.cat-read::before { color: var(--tool-read); }
.thread.tui .proc-step.cat-edit .ptext, .thread.tui .proc-step.cat-edit::before { color: var(--tool-edit); }
.thread.tui .proc-step.cat-run  .ptext, .thread.tui .proc-step.cat-run::before  { color: var(--tool-run); }
.thread.tui .proc-step.cat-net  .ptext, .thread.tui .proc-step.cat-net::before  { color: var(--tool-net); }
.thread.tui .proc-step.cat-meta .ptext { color: var(--tool-meta); }

/* 進行中壓暗，完成時轉為飽和類別色 */
.thread.tui .proc-step.running { opacity: .55; }
.thread.tui .proc-step.done .ptext::after { content: " ✓"; color: var(--ok); }
.thread.tui .proc-step.running .ptext::after { content: " …"; color: var(--accent); }

/* 錯誤：紅色蓋過類別色（須排在類別規則之後）*/
.thread.tui .proc-step.error .ptext, .thread.tui .proc-step.error::before { color: var(--danger); }
.thread.tui .proc-step.error .ptext::after { content: " ✗"; color: var(--danger); }

.thread.tui .proc-step .diff { margin-left: 2ch; }

/* 終端機視圖：markdown 標題不要過大，維持轉錄質感；彩色化內文 */
.thread.tui .body.md h1, .thread.tui .body.md h2, .thread.tui .body.md h3, .thread.tui .body.md h4 { font-size: 14px; margin: .6em 0 .3em; color: var(--accent); }
.thread.tui .body.md code { color: var(--warn); }
.thread.tui .body.md pre.code { border-left: 2px solid var(--accent); }
.thread.tui .body.md a { color: var(--tool-net); }
.thread.tui .body.md .md-table { font-size: 12.5px; }
.thread.tui .body.md .md-table th { color: var(--accent); border-color: var(--accent); }

/* 終端機輸入框：命令列樣式（› 提示符、monospace、扁平內凹，不做圓角卡片）*/
.composer.tui .composer-box {
  background: var(--inset);
  border-radius: var(--r-sm);
  box-shadow: inset 0 1px 2px rgba(0,0,0,.25);
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
.composer.tui .composer-main::before {
  content: "›";
  color: var(--accent);
  font: 700 16px/1.4 ui-monospace, Menlo, monospace;
  flex-shrink: 0;
  padding-left: var(--sp-1);
}
.composer.tui .composer-textarea {
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 13.5px;
}
.composer.tui .composer-box:focus-within {
  border-color: var(--accent);
  box-shadow: inset 0 1px 2px rgba(0,0,0,.25), 0 0 0 2px var(--accent-soft);
}
.composer.tui #input-hint { font-family: ui-monospace, Menlo, monospace; }

/* ── 輸入區 ─────────────────────────────────────────── */
.composer {
  border-top: 1px solid var(--line);
  background: var(--bg);
  flex-shrink: 0;
}

.composer-wrap {
  max-width: var(--thread-w);
  margin: 0 auto;
  padding: var(--sp-3) var(--sp-6) var(--sp-4);
}

.composer-box {
  display: flex;
  flex-direction: column;
  gap: var(--sp-2);
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: var(--sp-2) var(--sp-3);
  box-shadow: var(--shadow-md), inset 0 1px 0 var(--hairline);
  transition: border-color var(--duration-fast), box-shadow var(--duration-fast);
}

/* 上排：提示符（tui）+ 全寬輸入 */
.composer-main {
  display: flex;
  align-items: flex-end;
  gap: var(--sp-2);
}

.composer-box:focus-within {
  border-color: color-mix(in srgb, var(--accent) 55%, var(--line));
  box-shadow: var(--shadow-md), 0 0 0 3px var(--accent-soft);
}

.composer-textarea {
  flex: 1;
  background: transparent;
  border: none;
  border-radius: 0;
  outline: none;
  resize: none;
  font: inherit;
  max-height: 200px;
  min-height: 24px;
  line-height: 1.6;
  color: var(--fg);
  padding: 0;
}

/* 清掉 textarea 內層自帶的 focus 指示（基底 textarea:focus 的圓角 box-shadow 與 :focus-visible 的 outline）
   → 否則聚焦時內層冒一圈橢圓/外框；composer-box 的 focus-within 已是唯一聚焦指示 */
.composer-textarea:focus,
.composer-textarea:focus-visible { box-shadow: none; outline: none; }

.composer-textarea::placeholder { color: var(--dim); }

/* 下排：緊湊工具列——領域/模型/思考 選單靠左，送出/停止靠右 */
.composer-tools {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  flex-wrap: wrap;
}
.tool-group {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  flex-wrap: wrap;
  min-width: 0;
}
.composer-send {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  margin-left: auto;
}
/* 選單改為低調的 pill：不再與輸入框爭搶視覺重量 */
.tool-select {
  font-size: 12px;
  max-width: 168px;
  padding: 5px 9px;
  background: var(--inset);
  color: var(--dim);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: border-color var(--duration-fast), color var(--duration-fast);
}
.tool-select:hover { border-color: color-mix(in srgb, var(--accent) 45%, var(--line)); color: var(--fg); }
.tool-select:focus { outline: none; border-color: var(--accent); color: var(--fg); }

.send-btn { padding: var(--sp-2) var(--sp-4); }

.stop-btn {
  background: transparent;
  color: var(--danger);
  border: 1px solid color-mix(in srgb, var(--danger) 45%, transparent);
  padding: var(--sp-2) var(--sp-3);
  font-size: 13px;
}

.stop-btn:hover { background: color-mix(in srgb, var(--danger) 14%, transparent); }

.composer-footer {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  margin-top: var(--sp-2);
  color: var(--dim);
  font-size: 12px;
}

.composer-footer .spacer { flex: 1; }

/* 進行中狀態：跳動的點 + 經過時間（讓使用者知道任務仍在跑） */
#status-hint:not(:empty) {
  display: inline-flex;
  align-items: center;
  gap: var(--sp-2);
  color: var(--accent);
  font-variant-numeric: tabular-nums;
  font-weight: 600;
}
.live-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  animation: pulse-dot 1.2s var(--ease-out) infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%      { opacity: .3; transform: scale(.6); }
}
/* Esc 中斷提示：弱化、非主資訊 */
#status-hint .esc-hint { color: var(--dim); font-weight: 400; }

/* ── 上下文佔用指示器（對標 CC 的 context 進度）：常駐輸入區 footer，串流時即時更新，逼近門檻轉色 ── */
#ctx-meter {
  display: none;
  align-items: center;
  gap: var(--sp-2);
  color: var(--dim);
  font-variant-numeric: tabular-nums;
  font-weight: 600;
  white-space: nowrap;
  cursor: default;
}
#ctx-meter.on { display: inline-flex; }
#ctx-meter .ctx-bar {
  position: relative;
  width: 52px;
  height: 6px;
  border-radius: 999px;
  background: var(--line);
  overflow: hidden;
  flex-shrink: 0;
}
#ctx-meter .ctx-fill {
  position: absolute;
  inset: 0 auto 0 0;
  width: 0;
  border-radius: 999px;
  background: var(--accent);
  transition: width var(--duration-fast) var(--ease-out), background var(--duration-fast);
}
/* 逼近自動壓縮門檻 → 轉琥珀；超過門檻（壓縮隨時觸發）→ 轉紅 */
#ctx-meter.warn { color: var(--warn); }
#ctx-meter.warn .ctx-fill { background: var(--warn); }
#ctx-meter.crit { color: var(--danger); }
#ctx-meter.crit .ctx-fill { background: var(--danger); }
/* 剛自動壓縮：短暫閃一下提示文字 */
#ctx-meter .ctx-flash { color: var(--ok); font-weight: 600; }
@keyframes ctx-flash-fade { 0% { opacity: 1; } 100% { opacity: 1; } }

/* ── 右側工作日誌軌道（寬螢幕 + 泡泡視圖：把工具/過程/diff 移出對話）── */
.worklog {
  display: none;
  flex-direction: column;
  border-left: 1px solid var(--line);
  background: var(--inset);
  overflow: hidden;
  min-width: 0;
}
.app.rail-on { grid-template-columns: var(--sidebar-w) minmax(0, 1fr) var(--rail-w); }
.app.rail-on .worklog { display: flex; }

.worklog-head {
  padding: var(--sp-4) var(--sp-4) var(--sp-3);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .05em;
  text-transform: uppercase;
  color: var(--dim);
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}

.worklog-body {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-3) var(--sp-4);
}

.wl-turn { margin-bottom: var(--sp-4); }
.wl-turn:last-child { margin-bottom: 0; }

.wl-turn-label {
  font-size: 11px;
  color: var(--faint);
  margin-bottom: var(--sp-1);
  padding-bottom: 3px;
  border-bottom: 1px dashed var(--line);
}

.wl-empty {
  color: var(--faint);
  font-size: 13px;
  line-height: 1.8;
  text-align: center;
  padding: var(--sp-8) var(--sp-3);
}
.wl-empty span { font-size: 12px; opacity: .7; }

/* TUI 軌道：工作階段 HUD（等寬看板，類 git status）*/
.worklog.tui .worklog-body { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
.hud-row {
  display: flex;
  justify-content: space-between;
  gap: var(--sp-3);
  font-size: 12px;
  padding: 2px 0;
}
.hud-k { color: var(--faint); }
.hud-v { color: var(--fg); font-weight: 600; }
.hud-divider { border-top: 1px dashed var(--line); margin: var(--sp-3) 0; }
.hud-files-head {
  font-size: 11px;
  letter-spacing: .05em;
  color: var(--faint);
  margin-bottom: var(--sp-2);
}
.hud-file {
  font-size: 12px;
  padding: 2px 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.hud-file.changed { color: var(--ok); }
.hud-file.read { color: var(--dim); }
.hud-empty { font-size: 12px; color: var(--faint); opacity: .7; }

/* 背景任務卡片（HUD／工作日誌軌道共用）*/
.bg-task { padding: var(--sp-2) 0; border-bottom: 1px solid var(--line); }
.bg-task:last-child { border-bottom: none; }
.bg-task-top { display: flex; align-items: center; gap: var(--sp-2); }
.bg-task .bg-ic { flex: 0 0 auto; color: var(--accent); }
.bg-task.done .bg-ic { color: var(--ok); }
.bg-task.error .bg-ic { color: var(--danger); }
.bg-task.cancelled .bg-ic { color: var(--faint); }
.bg-goal { flex: 1; min-width: 0; font-size: 12px; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bg-cancel { flex: 0 0 auto; background: none; border: none; color: var(--faint); cursor: pointer; font-size: 12px; padding: 0 2px; line-height: 1; }
.bg-cancel:hover { color: var(--danger); }
.bg-task-meta { font-size: 11px; color: var(--dim); margin-top: 2px; padding-left: 18px; }
/* 可展開卡片：點擊區域 + 展開箭頭 + 就地執行過程 */
.bg-task-click { cursor: pointer; border-radius: var(--r-sm); }
.bg-task-click:hover { background: color-mix(in srgb, var(--accent) 6%, transparent); }
.bg-caret { flex: 0 0 auto; width: 10px; color: var(--faint); font-size: 10px; }
.bg-proc { margin: var(--sp-1) 0 var(--sp-1) 8px; padding-left: 10px; border-left: 1px solid var(--line); }
.bg-proc-text { font-size: 11px; color: var(--dim); margin: var(--sp-1) 0 0 18px; white-space: pre-wrap; word-break: break-word; }

/* 背景模式開啟時，按鈕高亮 */
#bg-toggle.on { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }

/* ── 響應式 ─────────────────────────────────────────── */
@media (max-width: 1024px) {
  :root { --sidebar-w: 260px; }
}

@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; }
  
  .side {
    display: none; /* 手機上隱藏側邊欄，用連結切換 */
  }
  
  .thread-wrap, .composer-wrap {
    padding: 0 var(--sp-4);
  }
  
  /* 手機上顯示「返回列表」按鈕 */
  .mobile-back {
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    padding: var(--sp-3) var(--sp-4);
    border-bottom: 1px solid var(--line);
    font-size: 13px;
    color: var(--dim);
    cursor: pointer;
  }
  
  .mobile-back:hover { color: var(--fg); }
  
  /* 手機上把檔案列表放到 thread 區底部 */
  .file-section {
    max-height: 200px;
    border-top: 1px solid var(--line);
  }
}

@media (min-width: 769px) {
  .mobile-back { display: none; }
}

@media (min-width: 1400px) {
  :root { --thread-w: 860px; }
}
</style>

<a href="#main-input" class="skip-link" data-i18n="nav.skipToInput">跳到輸入框</a>

<div class="app">

  <aside class="side" role="navigation" aria-label="對話列表">
    <div class="side-head">
      <div class="side-brand">
        <h1>💬 <span data-i18n="nav.chatTitle">對話</span></h1>
        <select id="langSwitch" class="lang-switch" data-lang-switch aria-label="Language / 語言 / 语言" data-i18n-aria="nav.langSwitch" style="margin-left:auto" onchange="window.setLang(this.value)">
          <option value="zh-Hant">繁體中文</option>
          <option value="zh-Hans">简体中文</option>
          <option value="en">English</option>
        </select>
        <button class="ghost theme-btn" id="theme" data-i18n-tip="nav.theme" data-tooltip="切換主題" aria-label="切換深色/淺色模式">🌙</button>
      </div>
      <div class="side-tagline" data-i18n="nav.tagline">逐句協作，記得上下文</div>
      <nav class="mode-nav" aria-label="切換模式" style="margin-top:10px">
        <a href="/">📋 <span data-i18n="nav.tasks">任務台</span></a>
        <a href="/chat" class="active" aria-current="page">💬 <span data-i18n="nav.chat">對話</span></a>
        <a href="/room">🏛 <span data-i18n="nav.room">會議室</span></a>
      </nav>

      <div class="side-controls">
        <div class="proj-switch" id="proj-switch">
          <button class="proj-btn" id="proj-btn" aria-haspopup="listbox" aria-expanded="false" aria-label="切換專案"></button>
          <div class="proj-menu" id="proj-menu" role="listbox" hidden></div>
        </div>
      </div>
      
      <button class="ghost new-chat-btn" id="new-chat-btn" aria-label="開始新對話">＋ <span data-i18n="nav.newChat">新對話</span></button>
    </div>
    
    <div class="chats" id="chats" role="list" aria-label="對話列表"></div>
    
    <!-- 檔案列表 -->
    <section class="file-section" aria-label="工作區檔案">
      <h3>📂 <span data-i18n="files.title">檔案</span> <button class="refresh-btn" id="files-refresh" type="button" onclick="refreshFiles()" data-i18n-title="files.refresh" title="刷新檔案列表" aria-label="刷新檔案列表">↻</button><button class="refresh-btn" id="open-folder-btn" type="button" onclick="openWsFolder()" data-i18n-title="files.openFolder" title="在系統檔案管理器開啟工作目錄（本機模式）" aria-label="開啟資料夾" hidden>📂</button><button class="refresh-btn" id="open-term-btn" type="button" onclick="openWsTerminal()" data-i18n-title="files.openTerm" title="在終端機開啟工作目錄（本機模式）" aria-label="開啟終端機" hidden>⌨</button></h3>
      <div id="file-breadcrumb" class="file-breadcrumb" aria-live="polite"></div>
      <div class="file-actions">
        <button type="button" onclick="wbMkdir()" data-i18n-title="files.newFolderTip" title="在目前資料夾新建子資料夾">📁＋ <span data-i18n="files.newFolder">資料夾</span></button>
        <button type="button" onclick="wbNewfile()" data-i18n-title="files.newFileTip" title="新建空檔案">＋ <span data-i18n="files.newFile">檔案</span></button>
        <button type="button" onclick="document.getElementById('wb-upload').click()" data-i18n-title="files.uploadTip" title="上傳到目前資料夾">⬆ <span data-i18n="files.upload">上傳</span></button>
        <input id="wb-upload" type="file" multiple hidden onchange="wbUpload(this.files)">
      </div>
      <div class="file-list" id="wbfiles" role="tree" aria-label="檔案列表"></div>
    </section>
    
    <div class="side-foot">
      📋 <a href="/" data-i18n="foot.tasks">任務台</a> · <button class="foot-link" type="button" onclick="openSkills()" data-i18n-title="foot.skillsTip" title="查看/管理此工作區的技能" data-i18n="foot.skills">🧠 技能</button>
      <span class="app-ver" title="xitto-kernel 版本">v__VERSION__</span>
    </div>
  </aside>

  <!-- 右側主區 -->
  <main id="main-content" class="main" role="main" aria-label="對話區">
    <button class="mobile-back" onclick="showSide()" aria-label="返回對話列表" data-i18n-aria="nav.backToList">
      ← 返回對話列表
    </button>
    
    <div class="thread" id="thread" role="log" aria-label="對話記錄" aria-live="polite">
      <div class="thread-wrap">
        <!-- 動態內容由 JS render() 注入 -->
      </div>
    </div>
    <!-- 檔案預覽區 -->
    <div id="file-preview"></div>

    <!-- 輸入區 -->
    <div class="composer" id="main-input">
      <div class="composer-wrap">
        <div class="composer-box" role="form" aria-label="輸入訊息">
          <label for="input" class="sr-only" data-i18n="composer.srInput">輸入訊息</label>
          <div class="composer-main">
            <textarea
              id="input"
              class="composer-textarea"
              rows="1"
              placeholder="輸入訊息，開始對話…"
              data-i18n-ph="composer.placeholder"
              aria-describedby="input-hint"
            ></textarea>
          </div>
          <div class="composer-tools">
            <div class="tool-group">
              <label for="pack" class="sr-only" data-i18n="composer.srPack">選擇領域</label>
              <select id="pack" class="tool-select" aria-label="選擇領域" title="這則訊息用哪個領域包"></select>
              <label for="model" class="sr-only" data-i18n="composer.srModel">選擇模型</label>
              <select id="model" class="tool-select" aria-label="選擇模型" title="這則訊息用哪個 AI 模型（回覆中也可切，下一則生效）"><option value="" data-i18n="composer.modelDefault">🧠 預設模型</option></select>
              <label for="think" class="sr-only" data-i18n="composer.srThink">思考模式</label>
              <select id="think" class="tool-select" aria-label="思考模式" title="這則訊息的思考強度（僅推理型模型有效；下一則生效）">
                <option value="" data-i18n="think.default">💭 思考：預設</option>
                <option value="off" data-i18n="think.off">💭 關閉</option>
                <option value="low" data-i18n="think.low">💭 低</option>
                <option value="medium" data-i18n="think.medium">💭 中</option>
                <option value="high" data-i18n="think.high">💭 高</option>
              </select>
            </div>
            <div class="composer-send">
              <button class="stop-btn" id="stop-btn" type="button" style="display:none" data-tooltip="停止回覆（Esc）" aria-label="停止回覆（按 Esc）">■ <span data-i18n="composer.stop">停止</span></button>
              <button class="primary send-btn" id="send-btn" aria-label="送出訊息" data-i18n="composer.send">送出</button>
            </div>
          </div>
        </div>
        <div class="composer-footer">
          <span id="input-hint" data-i18n="composer.hint">Enter 送出 · Shift+Enter 換行</span>
          <span class="spacer" aria-hidden="true"></span>
          <span id="ctx-meter" role="status" aria-live="polite" tabindex="0">
            <span class="ctx-bar"><span class="ctx-fill"></span></span>
            <span class="ctx-label"></span>
          </span>
          <span id="status-hint" aria-live="polite"></span>
          <button class="ghost view-toggle" id="bg-toggle" type="button" data-tooltip="前景串流／丟後台背景執行" aria-label="切換背景執行" data-i18n="toggle.bgOff">⚡ 背景：關</button>
          <button class="ghost view-toggle" id="view-toggle" type="button" data-tooltip="切換終端機／泡泡視圖" aria-label="切換對話視圖" data-i18n="toggle.viewTerminal">⌗ 終端機</button>
        </div>
      </div>
    </div>
  </main>

  <!-- 右側工作日誌軌道（寬螢幕泡泡視圖才顯示，由 JS 控制 .app.rail-on）-->
  <aside class="worklog" id="worklog" role="complementary" aria-label="工作軌道">
    <div class="worklog-head" id="worklog-head">⚙ <span data-i18n="worklog.title">工作日誌</span></div>
    <div class="worklog-body" id="worklog-body"></div>
  </aside>
</div>

<!-- 資料夾選擇 Modal（與任務台一致；position:fixed，置於 shell 外）-->
<div id="fs-modal" class="modal" hidden role="dialog" aria-modal="true" aria-labelledby="fs-modal-title">
  <div class="modal-box">
    <div class="modal-title" id="fs-modal-title" data-i18n="fs.title">選一個資料夾（就地工作）</div>
    <div class="fs-path" id="fs-path" aria-live="polite"></div>
    <div class="fs-list" id="fs-list" role="tree" aria-label="資料夾列表"></div>
    <div class="fs-bar">
      <button class="ghost" onclick="fsHome()" data-i18n="fs.home">🏠 家目錄</button>
      <label class="fs-hidden">
        <input type="checkbox" id="fs-hidden" onchange="fsToggleHidden()">
        <span data-i18n="fs.showHidden">顯示隱藏資料夾</span>
      </label>
      <span class="spacer" aria-hidden="true"></span>
      <button class="ghost" onclick="closeFs()" data-i18n="fs.cancel">取消</button>
      <button class="primary" onclick="chooseFs()" data-i18n="fs.choose">✓ 選這個</button>
    </div>
  </div>
</div>

<!-- 技能管理：查看/刪除此工作區結晶的技能 -->
<div id="sk-modal" class="modal" hidden role="dialog" aria-modal="true" aria-labelledby="sk-modal-title" onclick="if(event.target===this)closeSkills()">
  <div class="modal-box">
    <div class="modal-title" id="sk-modal-title" data-i18n="skills.manage">🧠 技能管理</div>
    <div class="sk-sub" id="sk-sub"></div>
    <div class="sk-list" id="sk-list" aria-live="polite"></div>
    <div class="fs-bar">
      <span class="spacer" aria-hidden="true"></span>
      <button class="ghost" onclick="closeSkills()" data-i18n="skills.close">關閉</button>
    </div>
  </div>
</div>

<script>
/* ── Chat 應用邏輯 ───────────────────────────────────────── */

/* i18n：套用文件標題（其餘由 applyI18n 掃 data-i18n* 屬性處理） */
try { document.title = t("doc.title", document.title); } catch (e) { /* i18n 未載入則保留原標題 */ }

/* 主題切換 */
$("#theme").onclick = () => {
  const t = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
  applyTheme(t);
};

/* 對話視圖切換：泡泡 ⇄ 終端機（Claude Code 風轉錄）。偏好記 localStorage(xk_chatview) */
let view = "bubble";
function applyView(v) {
  view = v;
  const tui = v === "tui";
  $("#thread").classList.toggle("tui", tui);
  const composer = document.getElementById("main-input");
  if (composer) composer.classList.toggle("tui", tui);   // 輸入框也跟著變終端機樣式
  const b = $("#view-toggle");
  if (b) b.textContent = tui ? t("toggle.viewBubble", "💬 泡泡") : t("toggle.viewTerminal", "⌗ 終端機");   // 顯示「切換到」的目標
}
applyView(localStorage.getItem("xk_chatview") || "bubble");

/* 右側軌道：寬螢幕時一律顯示，內容依視圖不同——
   泡泡視圖＝工作日誌（把工具/過程移出對話）；TUI 視圖＝工作階段 HUD（轉錄維持 ⎿ inline）。
   窄螢幕兩種都退回原樣（泡泡 inline 過程、TUI 全寬轉錄）。 */
const railMQ = window.matchMedia("(min-width: 1300px)");
let wide = railMQ.matches;
function railActive() { return wide; }                       // 軌道是否顯示
function procInRail() { return wide && view === "bubble"; }  // 過程是否搬進軌道（僅泡泡）
railMQ.addEventListener("change", (e) => { wide = e.matches; render(); });

$("#view-toggle").onclick = () => {
  const v = $("#thread").classList.contains("tui") ? "bubble" : "tui";
  localStorage.setItem("xk_chatview", v);
  applyView(v);
  render();        // 重新渲染：在 inline／軌道間搬移過程日誌
  scrollDown();
};

/* ── 背景任務（丟後台跑，進度顯示在 HUD/工作日誌軌道）──────── */
let bgMode = localStorage.getItem("xk_bgmode") === "1"; // 送出時走背景任務而非前景串流
const bgTasks = []; // [{id, pack, goal, status, phase, steps, startedAt, finishedAt, asst, session}]
const BG_KEY = "xk_bgtasks";
// 持久化背景任務精簡態（供刷新後重連；不存 asst/tools 那些 live 物件，靠服務端 replay 重建）。
function saveBgTasks() {
  try { localStorage.setItem(BG_KEY, JSON.stringify(bgTasks.slice(0, 20).map((t) => ({ id: t.id, pack: t.pack, goal: t.goal, session: t.session, startedAt: t.startedAt, status: t.status })))); } catch { /* 略 */ }
}
// 刷新後自動重連仍在跑的背景任務：對 running/queued 重新訂閱 /v1/tasks/:id/events（服務端有 replay 緩衝
// → 回放重建過程；期間已結束則回放完即收尾；任務已不存在 → pumpBgEvents 標記 error）。
function restoreBgTasks() {
  let saved = []; try { saved = JSON.parse(localStorage.getItem(BG_KEY) || "[]"); } catch { saved = []; }
  const live = (saved || []).filter((s) => s && s.id && (s.status === "running" || s.status === "queued"));
  if (!live.length) return;
  for (const s of live) {
    if (bgTasks.some((t) => t.id === s.id)) continue;
    const asst = { role: "assistant", text: "", tools: [], _procOpen: false, phase: "thinking" };
    const task = { id: s.id, pack: s.pack || "general", goal: s.goal || "背景任務", status: "running", phase: "reconnecting", steps: 0, startedAt: s.startedAt || Date.now(), finishedAt: null, asst, session: s.session, _reconnect: true };
    if (s.session && s.session === sessionId) messages.push(asst); // 屬當前對話 → 也插回訊息串
    bgTasks.push(task);
    pumpBgEvents(task); // 重連
  }
  startBgTicker(); render();
}
let bgTimer = null; // 每秒刷新 HUD 的經過時間

/* 背景模式切換 */
function applyBgMode() {
  const b = $("#bg-toggle");
  if (!b) return;
  b.textContent = bgMode ? t("toggle.bgOn", "⚡ 背景：開") : t("toggle.bgOff", "⚡ 背景：關");
  b.classList.toggle("on", bgMode);
}
$("#bg-toggle").onclick = () => {
  bgMode = !bgMode;
  localStorage.setItem("xk_bgmode", bgMode ? "1" : "0");
  applyBgMode();
};
applyBgMode();

/* Esc：優先關浮層（檔案預覽／資料夾 modal）；沒有浮層開著時，中斷前景回覆 */
document.addEventListener("keydown", (e) => {
  if (e.key !== "Escape") return;
  const preview = document.getElementById("file-preview");
  const skOpen = $("#sk-modal") && !$("#sk-modal").hidden;
  const modalOpen = (preview && preview.innerHTML.trim()) || !$("#fs-modal").hidden || skOpen;
  if (modalOpen) { closeFilePreview(); closeFs(); closeSkills(); return; }
  if (streaming) stopStream();
});

/* IME 保護 */
let composing = false;
const inp = $("#input");
inp.addEventListener("compositionstart", () => { composing = true; });
inp.addEventListener("compositionend", () => { composing = false; });

/* 專案切換器（共用元件）：切換專案＝在該空間開新對話 */
mountProjectSwitcher(() => { newChat(); renderChats(); loadFiles(); });

/* 領域選單 */
renderPackSelect($("#pack"));

/* 模型選單：拉 /v1/models 填入（第一項＝伺服器預設）。選擇記在 localStorage，回覆中也可切、下一則生效。 */
const MODEL_KEY = "xk_model";
const THINK_KEY = "xk_thinking";
let modelReasoning = {};   // id → 是否推理型（決定思考開關是否可用）
async function loadModelSelect() {
  const sel = $("#model"); if (!sel) return;
  let data; try { data = await api("/v1/models").then((r) => (r.ok ? r.json() : null)); } catch { data = null; }
  if (!data || !data.models) return;           // 訪客/無權 → 靜默保留「預設模型」單選
  const saved = localStorage.getItem(MODEL_KEY) || "";
  const defId = data.default;
  sel.innerHTML = '<option value="">' + esc(t("composer.modelDefault", "🧠 預設模型")) + (defId ? "（" + esc(defId) + "）" : "") + "</option>" +
    data.models.map((m) => '<option value="' + esc(m.id) + '">' + esc(m.name || m.id) + "</option>").join("");
  if (saved && data.models.some((m) => m.id === saved)) sel.value = saved;
  modelReasoning = Object.fromEntries(data.models.map((m) => [m.id, !!m.reasoning]));
  // 思考開關：載入已存偏好；標題帶出伺服器目前預設強度；依所選模型是否推理型決定可用性。
  const tsel = $("#think");
  if (tsel) {
    const savedT = localStorage.getItem(THINK_KEY) || "";
    if ([...tsel.options].some((o) => o.value === savedT)) tsel.value = savedT;
    tsel.options[0].textContent = "💭 思考：預設（" + esc(data.thinking || "off") + "）";
    syncThinkAvail();
  }
}
// 目前所選模型非推理型 → 思考開關無效（灰掉並提示），避免使用者以為有開卻被 pi-ai 靜默丟棄。
function syncThinkAvail() {
  const tsel = $("#think"); if (!tsel) return;
  const id = ($("#model") && $("#model").value) || "";
  const capable = id === "" ? true : !!modelReasoning[id]; // 預設模型：未知則不擋
  tsel.disabled = !capable;
  tsel.title = capable ? "這則訊息的思考強度（下一則生效）" : "此模型非推理型，思考模式無效（需在設定將該 model 設 reasoning:true 並配對 compat）";
}
$("#model").addEventListener("change", () => { try { localStorage.setItem(MODEL_KEY, $("#model").value); } catch { /* 略 */ } syncThinkAvail(); });
$("#think") && $("#think").addEventListener("change", () => { try { localStorage.setItem(THINK_KEY, $("#think").value); } catch { /* 略 */ } });
loadModelSelect();
const chosenModel = () => ($("#model") && $("#model").value) || undefined;
// 思考強度：空＝用伺服器預設（送 undefined）；否則送 off/low/medium/high。
const chosenThinking = () => { const t = $("#think"); return (t && !t.disabled && t.value) || undefined; };

/* ── 技能管理（此工作區）：查看/刪除 agent 結晶的技能 ─────────── */
function openSkills() { const m = $("#sk-modal"); if (m) { m.hidden = false; loadSkills(); } }
function closeSkills() { const m = $("#sk-modal"); if (m) m.hidden = true; }
async function loadSkills() {
  const list = $("#sk-list"), sub = $("#sk-sub");
  if (!list) return;
  list.innerHTML = "載入中…";
  const e = await api("/v1/workspaces/experience?ws=" + encodeURIComponent(curSpace)).then((r) => r.json()).catch(() => null);
  const skills = (e && e.skills) || [];
  if (sub) sub.textContent = "工作區「" + curSpace + "」· " + skills.length + " 個技能";
  if (!skills.length) { list.innerHTML = '<div class="sk-empty">' + t("skills.empty", "這個工作區還沒有技能。<br>agent 摸出可重複流程時，會用 skill_save 結晶成技能，之後即可複用。") + '</div>'; return; }
  list.innerHTML = skills.map((s, i) => {
    const sid = "skb-" + i;
    return '<div class="sk-item"><div class="sk-item-h"><span class="sk-name">⚡ ' + esc(s.name) + "</span>" +
      (s.used ? '<span class="sk-tag">' + t("skills.used", "用過 %n 次").replace("%n", s.used) + "</span>" : "") +
      (s.stale ? '<span class="sk-tag warn">' + t("skills.stale", "⚠ 待修") + "</span>" : "") +
      '<span class="sk-pack">' + esc(s.pack || "") + '</span><span class="spacer"></span>' +
      '<button class="sk-btn" type="button" onclick="skillView(\'' + esc(s.pack) + "','" + esc(s.name) + "','" + sid + '\')">' + t("skills.view", "查看") + '</button>' +
      '<button class="sk-btn danger" type="button" onclick="skillDel(\'' + esc(s.pack) + "','" + esc(s.name) + '\')">' + t("skills.del", "刪除") + '</button></div>' +
      (s.desc ? '<div class="sk-desc">' + esc(s.desc) + "</div>" : "") +
      '<pre class="sk-body" id="' + sid + '" hidden></pre></div>';
  }).join("");
}
async function skillView(pack, name, sid) {
  const el = document.getElementById(sid);
  if (!el) return;
  if (!el.hidden) { el.hidden = true; return; }
  el.textContent = "載入中…"; el.hidden = false;
  const r = await api("/v1/skills/body?ws=" + encodeURIComponent(curSpace) + "&pack=" + encodeURIComponent(pack) + "&name=" + encodeURIComponent(name)).then((x) => x.json()).catch(() => null);
  el.textContent = r && r.body ? r.body : "✗ " + ((r && r.error) || "載入失敗");
}
async function skillDel(pack, name) {
  if (!confirm("刪除技能「" + name + "」？\nagent 之後仍可在需要時重新結晶。")) return;
  const r = await api("/v1/skills/remove", { method: "POST", body: JSON.stringify({ ws: curSpace, pack, name }) }).then((x) => x.json()).catch(() => ({ error: "連線失敗" }));
  if (r && r.ok) loadSkills(); else alert("刪除失敗：" + ((r && r.error) || "未知錯誤"));
}

/* ── 對話持久化（localStorage）──────────────────────────── */
const chatsKey = () => "xk_chats";
const tKey = (id) => "xk_chat_" + id;

function allChats() {
  return JSON.parse(localStorage.getItem(chatsKey()) || "[]");
}

function saveChats(list) {
  localStorage.setItem(chatsKey(), JSON.stringify(list));
}

function upsertChat(meta) {
  const list = allChats().filter((c) => c.id !== meta.id);
  list.unshift(meta);
  saveChats(list);
}

function loadTranscript(id) {
  return JSON.parse(localStorage.getItem(tKey(id)) || "[]");
}

function saveTranscript(id, msgs) {
  localStorage.setItem(tKey(id), JSON.stringify(msgs));
}

/* ── 目前對話狀態 ──────────────────────────────────────── */
let sessionId = null; // null = 尚未建立
let messages = []; // [{role, text, tools:[], _procOpen, phase}]
let streaming = false; // 「目前所看對話」是否有進行中的回覆（供打字游標/Esc）；由 refreshStreamingUI 同步
const sessionCtx = new Map(); // sessionId -> { tokens, window, compactAt }：保存最近上下文佔用快照，切走再切回仍能顯示
let ctxFlashTimer = null;     // 「剛自動壓縮」提示的淡出計時器

// 前景串流改為「每對話一個 run」：切換對話不再中斷，各 run 綁自己的訊息陣列與 sessionId，可多對話並行。
// run = { chatMsgs, sessionId, asst, abort, startedAt, tokens, firstUserText, space, pack }
const activeRuns = new Set();
function currentRun() { for (const r of activeRuns) if (r.chatMsgs === messages) return r; return null; }

/* ── 對話列表 ──────────────────────────────────────────── */
function newChat() {
  sessionId = null;
  messages = [];        // 全新陣列：不影響其他仍在進行的 run
  render();
  $("#input").focus();
  renderChats();
  loadFiles();
  refreshStreamingUI();
}

$("#new-chat-btn").onclick = newChat;

/* ── 檔案列表 ──────────────────────────────────────────── */
let wbSub = "";

function wbNav(s) {
  wbSub = decodeURIComponent(s);
  loadFiles();
}

function wbUp() {
  wbSub = wbSub.includes("/") ? wbSub.slice(0, wbSub.lastIndexOf("/")) : "";
  loadFiles();
}

// 手動刷新：轉一下 ↻ 給回饋，再重載檔案列表
function refreshFiles() {
  const b = $("#files-refresh");
  if (b) { b.classList.remove("spin"); void b.offsetWidth; b.classList.add("spin"); }
  loadFiles();
}

// 本機模式：在系統檔案管理器 / 終端機開啟目前工作目錄（服務跑在你本機才有意義；遠端會回 400）。
async function openWsFolder() {
  try { const r = await api("/v1/workspaces/open-folder?ws=" + encodeURIComponent(curSpace), { method: "POST" }).then((x) => x.json()); if (r && r.error) alert(r.error); } catch { /* 略 */ }
}
async function openWsTerminal() {
  try { const r = await api("/v1/workspaces/open-terminal?ws=" + encodeURIComponent(curSpace), { method: "POST" }).then((x) => x.json()); if (r && r.error) alert(r.error); } catch { /* 略 */ }
}
// 只有本機模式顯示「開啟資料夾 / 終端機」（遠端部署沒意義）。
if (window.__XITTO__ && window.__XITTO__.local) { const f = $("#open-folder-btn"), t = $("#open-term-btn"); if (f) f.hidden = false; if (t) t.hidden = false; }

// 新建資料夾 / 新建空檔 / 上傳 / 刪除（在目前 curSpace + wbSub 目錄下）。
async function wbMkdir() {
  const name = prompt("新資料夾名稱："); if (!name || !name.trim()) return;
  const r = await api("/v1/workspaces/mkdir", { method: "POST", body: JSON.stringify({ ws: curSpace, sub: wbSub, name: name.trim() }) }).then((x) => x.json()).catch(() => ({ error: "連線失敗" }));
  if (r && r.error) alert(r.error); else loadFiles();
}
async function wbNewfile() {
  const name = prompt("新檔名稱（例 notes.md）："); if (!name || !name.trim()) return;
  const r = await api("/v1/workspaces/newfile", { method: "POST", body: JSON.stringify({ ws: curSpace, sub: wbSub, name: name.trim() }) }).then((x) => x.json()).catch(() => ({ error: "連線失敗" }));
  if (r && r.error) alert(r.error); else loadFiles();
}
async function wbUpload(files) {
  if (!files || !files.length) return;
  let ok = 0, fail = 0;
  for (const f of files) {
    try {
      const q = "?ws=" + encodeURIComponent(curSpace) + "&sub=" + encodeURIComponent(wbSub) + "&name=" + encodeURIComponent(f.name);
      const r = await fetch("/v1/workspaces/upload" + q, { method: "POST", headers: { authorization: "Bearer " + TOKEN, "content-type": f.type || "application/octet-stream" }, body: f }).then((x) => x.json());
      if (r && r.ok) ok++; else fail++;
    } catch { fail++; }
  }
  const inp = $("#wb-upload"); if (inp) inp.value = "";
  loadFiles();
  if (fail) alert("上傳完成：" + ok + " 成功、" + fail + " 失敗");
}
async function wbDelete(encFull, name, isDir) {
  if (!confirm("刪除" + (isDir ? "資料夾" : "檔案") + "「" + name + "」？" + (isDir ? "（含內容，無法復原）" : ""))) return;
  const r = await api("/v1/workspaces/file?ws=" + encodeURIComponent(curSpace) + "&path=" + encFull, { method: "DELETE" }).then((x) => x.json()).catch(() => ({ error: "連線失敗" }));
  if (r && r.error) alert(r.error); else loadFiles();
}

async function loadFiles() {
  // _t 時間戳打破快取：企業代理／瀏覽器可能無視 no-store，唯一 URL 才保證每次真的重列（否則新建的檔案／資料夾刷不出來）。
  const r = await api("/v1/workspaces/files?ws=" + encodeURIComponent(curSpace) + "&sub=" + encodeURIComponent(wbSub) + "&_t=" + Date.now(), { cache: "no-store" }).then((r) => r.json()).catch(() => ({ dirs: [], files: [] }));

  const bc = $("#file-breadcrumb");
  bc.textContent = wbSub ? "📂 " + wbSub : "";

  const T = (k, f) => (window.t ? t(k, f) : f); // i18n（未載入時回退原文）
  let html = wbSub ? `<button class="file-up" onclick="wbUp()" aria-label="${esc(T("files.up", "上一層"))}" type="button">⬆ ${esc(T("files.up", "上一層"))}</button>` : "";
  html += (r.dirs || []).map((d) => {
    const full = (wbSub ? wbSub + "/" : "") + d;
    // 根目錄的 tmp 是 agent 的暫存區：淡化 + 標「暫存」，但仍可點進去撈被誤丟的成品。
    const isTmp = !wbSub && d === "tmp";
    const icon = isTmp ? "🗂" : "📁";
    const tag = isTmp ? ` <span style="opacity:.5;font-size:.85em">（${esc(T("files.tmpTag", "暫存"))}）</span>` : "";
    const rowStyle = isTmp ? ` style="opacity:.7"` : "";
    const tmpTip = isTmp ? esc(T("files.tmpTip", "暫存資料夾：agent 的中間／草稿檔放這裡（可能被清理）")) : "";
    return `<div class="file-item"><button class="file-row"${rowStyle} onclick="wbNav('${encodeURIComponent(full)}')" type="button" title="${tmpTip}">${icon} <span class="name">${esc(d)}</span>/${tag}</button><button class="file-del" onclick="wbDelete('${encodeURIComponent(full)}','${jsAttr(d)}',true)" title="${esc(T("files.delDir", "刪除資料夾"))}" type="button">🗑</button></div>`;
  }).join("");
  html +=
    (r.files || []).map((f) => {
      const full = (wbSub ? wbSub + "/" : "") + f.name;
      return `<div class="file-item"><button class="file-row" onclick="wbView('${encodeURIComponent(full)}','${jsAttr(f.name)}')" type="button">
    <span class="name">📄 ${esc(f.name)}</span>
    <span class="size">${fmtSize(f.size)}</span>
  </button><button class="file-del" onclick="wbDelete('${encodeURIComponent(full)}','${jsAttr(f.name)}',false)" title="${esc(T("files.del", "刪除"))}" type="button">🗑</button></div>`;
    }).join("");

  if (!(r.dirs || []).length && !(r.files || []).length)
    html += `<div class="empty" style="padding:${8}px">（${wbSub ? esc(T("files.emptyDir", "空資料夾")) : esc(T("files.empty", "還沒有檔案"))}）</div>`;

  $("#wbfiles").innerHTML = html;
}

function closeFilePreview() { const v = document.getElementById("file-preview"); if (v) v.innerHTML = ""; }

// 檔案預覽用浮層 modal（蓋在上方，不夾在對話與輸入框之間切割版面）
async function wbView(encPath, name) {
  const v = document.getElementById("file-preview");
  if (!v) return;
  const url = "/v1/workspaces/file?ws=" + encodeURIComponent(curSpace) + "&path=" + encPath + "&token=" + encodeURIComponent(TOKEN);
  const IMG = /\.(png|jpe?g|gif|webp|svg)$/i, MD = /\.(md|markdown)$/i, JSONF = /\.json$/i, HTMLF = /\.html?$/i;
  const DOC = /\.(docx|pptx|xlsx|odt|odp|ods|rtf|pdf)$/i; // Word/Excel/PPT/PDF：伺服器萃取成預覽資料（回退 ?as=text）

  let body = "";
  if (IMG.test(name)) {
    body = `<img class="preview-img" src="${url}" alt="${esc(name)}">`;
  } else if (HTMLF.test(name)) {
    body = `<div class="empty">（HTML 檔案，請用「開新分頁」檢視）</div>`;
  } else if (DOC.test(name)) {
    const pr = await fetch(url + "&as=preview").catch(() => null);
    const doc = pr && pr.ok ? await pr.json().catch(() => null) : null;
    if (doc) body = renderOfficePreview(doc, "preview-pre");
    else {
      const r = await fetch(url + "&as=text").catch(() => null);
      if (!r || !r.ok) body = `<div class="empty">（無法預覽${r && r.status === 422 ? "：文件解析失敗，可下載原檔" : ""}）</div>`;
      else body = `<pre class="preview-pre">${esc(await r.text())}</pre>`;
    }
  } else {
    const txt = await fetch(url).then((r) => (r.ok ? r.text() : null)).catch(() => null);
    if (txt == null) body = `<div class="empty">（無法預覽）</div>`;
    else if (MD.test(name)) body = `<div class="md">${mdRender(txt)}</div>`;
    else if (JSONF.test(name)) { try { body = `<pre class="preview-pre">${esc(JSON.stringify(JSON.parse(txt), null, 2))}</pre>`; } catch { body = `<pre class="preview-pre">${esc(txt)}</pre>`; } }
    else body = `<pre class="preview-pre">${esc(txt)}</pre>`;
  }

  v.innerHTML = `<div class="preview-panel" role="dialog" aria-modal="true" aria-label="${t("preview.fileLabel", "檔案預覽：%n").replace("%n", esc(name))}">
    <div class="preview-bar">
      <span class="preview-name">📄 ${esc(name)}</span>
      <a href="${url}" target="_blank">${t("preview.newTab", "開新分頁")}</a>
      <a href="${url}&download=1">${t("preview.download", "下載")}</a>
      <span class="spacer" aria-hidden="true"></span>
      <button class="ghost" onclick="closeFilePreview()" aria-label="${t("preview.closeAria", "關閉預覽")}" type="button">${t("preview.close", "✕ 關閉")}</button>
    </div>
    <div class="preview-body">${body}</div>
  </div>`;
  v.onclick = (e) => { if (e.target === v) closeFilePreview(); }; // 點背景關閉
}

function deleteChat(id, ev) {
  ev.stopPropagation();
  if (!confirm("刪除這段對話？")) return;
  saveChats(allChats().filter((c) => c.id !== id));
  localStorage.removeItem(tKey(id));
  if (id === sessionId) newChat();
  else renderChats();
}

function renderChats() {
  const list = allChats().filter((c) => (c.space || "default") === curSpace);
  const activeClass = (id) => (id === sessionId ? " active" : "");
  const isRunning = (id) => { for (const r of activeRuns) if (r.sessionId === id) return true; return false; };

    ? list
        .map(

      <span class="title">${isRunning(c.id) ? '<span class="chat-run" aria-label="進行中">◐</span> ' : ""}${esc(c.title || "新對話")}</span>

        <span>${packLabel(c.pack || "general")}</span>
        <span>${fmtTime(c.ts)}</span>
