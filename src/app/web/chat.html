<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>xitto · 對話</title>
<style>
  :root { --bg:#0f1115; --card:#181b22; --line:#272b34; --fg:#e7e9ee; --dim:#8b919e; --accent:#6ea8fe; --ok:#5fd38a; --warn:#f0c674; --me:#243044; }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body { margin:0; font:15px/1.6 -apple-system,"PingFang TC","Microsoft JhengHei",system-ui,sans-serif; background:var(--bg); color:var(--fg); }
  /* 全高雙欄：左對話列表 + 右對話視窗（與許願台的「成品/檔案」佈局刻意不同：這裡以對話 thread 為主） */
  .app { display:grid; grid-template-columns:280px minmax(0,1fr); height:100vh; }
  .side { border-right:1px solid var(--line); display:flex; flex-direction:column; min-height:0; background:#0c0e12; }
  .side h1 { font-size:17px; margin:0; display:flex; align-items:center; gap:8px; }
  .side .sub { color:var(--dim); font-size:12px; margin-top:2px; }
  .sidehead { padding:16px 14px 12px; border-bottom:1px solid var(--line); }
  .topctl { display:flex; align-items:center; gap:6px; margin-top:12px; }
  .prjlabel { color:var(--dim); font-size:12px; }
  select, button, textarea, input { font:inherit; }
  select { background:#0c0e12; color:var(--fg); border:1px solid var(--line); border-radius:8px; padding:6px 8px; max-width:150px; }
  button { background:var(--accent); color:#08101f; border:0; border-radius:8px; padding:9px 16px; font-weight:600; cursor:pointer; }
  button.ghost { background:transparent; color:var(--dim); border:1px solid var(--line); font-weight:500; }
  button.ghost:hover { color:var(--fg); }
  button:disabled { opacity:.5; cursor:default; }
  .newbtn { width:100%; margin-top:12px; }
  .chats { flex:1; overflow:auto; padding:8px; }
  .chatitem { border:1px solid transparent; border-radius:8px; padding:9px 10px; margin:2px 0; cursor:pointer; }
  .chatitem:hover { background:#181b22; }
  .chatitem.active { background:#181b22; border-color:var(--accent); }
  .chatitem .t { font-size:13.5px; line-height:1.4; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .chatitem .m { color:var(--dim); font-size:11px; margin-top:2px; display:flex; gap:6px; }
  .chatdel { float:right; opacity:0; cursor:pointer; } .chatitem:hover .chatdel { opacity:.6; } .chatdel:hover { opacity:1; }
  .empty { color:var(--dim); font-size:13px; padding:10px; }
  .sidefoot { padding:10px 14px; border-top:1px solid var(--line); font-size:12.5px; }
  .sidefoot a { color:var(--accent); text-decoration:none; }

  .main { display:flex; flex-direction:column; min-height:0; }
  .thread { flex:1; overflow:auto; padding:24px 0; }
  .threadwrap { max-width:780px; margin:0 auto; padding:0 22px; }
  .welcome { text-align:center; color:var(--dim); padding:80px 24px; line-height:2; }
  .msg { margin:18px 0; display:flex; gap:12px; }
  .avatar { flex:0 0 30px; width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:15px; background:var(--card); border:1px solid var(--line); }
  .msg.user .avatar { background:var(--me); }
  .bubble { min-width:0; flex:1; }
  .who { font-size:12px; color:var(--dim); margin-bottom:3px; }
  .body { white-space:pre-wrap; word-wrap:break-word; }
  .body.md { white-space:normal; }
  .cursor::after { content:"▍"; color:var(--accent); animation:blink 1s steps(2) infinite; }
  @keyframes blink { 50%{opacity:0;} }
  .md { line-height:1.7; } .md h1,.md h2,.md h3,.md h4 { margin:.7em 0 .3em; line-height:1.3; }
  .md code { background:#1a1d24; padding:1px 5px; border-radius:4px; font-size:.9em; }
  .md pre.code { background:#1a1d24; padding:10px; border-radius:8px; overflow:auto; }
  .md ul { margin:.3em 0 .3em 1.2em; } .md a { color:var(--accent); } .md p { margin:.5em 0; }
  /* 過程（工具動作）：對話泡泡內收合，預設安靜，想看才展開——像 Claude Code 的 ⏺/⎿ + ctrl+r */
  .proc { margin:8px 0 2px; border:1px solid var(--line); border-radius:10px; background:#13161d; }
  .proctoggle { padding:7px 12px; font-size:13px; color:var(--accent); cursor:pointer; user-select:none; display:flex; align-items:center; gap:6px; }
  .proclist { padding:2px 12px 10px; border-top:1px solid var(--line); }
  .pstep { font-size:13px; color:var(--fg); padding:3px 0; }
  .pstep.err { color:#f08a8a; } .pstep .dim { color:var(--dim); }
  .pstep .spin { color:var(--accent); }
  .diff { margin:4px 0 6px 14px; font:12px/1.5 ui-monospace,Menlo,monospace; }
  .dh { color:var(--dim); font-size:11px; margin-bottom:2px; }
  .dl { white-space:pre-wrap; } .dl.add { color:var(--ok); } .dl.del { color:#f08a8a; }
  .phase { color:var(--dim); font-size:12.5px; font-style:italic; margin:4px 0; }
  .phase.dots::after { content:""; animation:dots 1.4s steps(4,end) infinite; }
  @keyframes dots { 0%{content:""} 25%{content:"·"} 50%{content:"··"} 75%{content:"···"} }

  .composer { border-top:1px solid var(--line); background:var(--bg); }
  .cwrap { max-width:780px; margin:0 auto; padding:14px 22px 18px; }
  .cbox { display:flex; gap:10px; align-items:flex-end; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:10px 12px; transition:border-color .15s; }
  .cbox:focus-within { border-color:var(--accent); }
  .cbox textarea { flex:1; background:transparent; color:var(--fg); border:0; outline:none; resize:none; font:inherit; max-height:200px; min-height:24px; }
  .crow { display:flex; align-items:center; gap:10px; margin-top:8px; color:var(--dim); font-size:12px; }
  .crow .spacer { flex:1; }
  .stopbtn { background:transparent; color:#f08a8a; border:1px solid #5b3030; padding:6px 12px; font-size:13px; }
  .stopbtn:hover { background:#2a1818; }
  @media (max-width:760px){ .app{ grid-template-columns:1fr; } .side{ display:none; } }
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="sidehead">
      <h1>💬 xitto 對話</h1>
      <div class="sub">逐句協作，記得上下文</div>
      <div class="topctl">
        <span class="prjlabel">專案</span>
        <select id="space" title="專案／空間：與許願台共用，檔案與記憶各自獨立、跨頁累積"></select>
      </div>
      <button class="newbtn" id="newchat">＋ 新對話</button>
    </div>
    <div class="chats" id="chats"></div>
    <div class="sidefoot">🪄 <a href="/">改用許願台</a>（交辦明確任務、收成品）</div>
  </aside>

  <main class="main">
    <div class="thread" id="thread">
      <div class="threadwrap"><div class="welcome" id="welcome">👋 開始一段對話。<br>它會記得整段上下文，逐步和你協作。<br><br>想「交辦一件明確的事、做完給成品」？改用 <a href="/" style="color:var(--accent)">🪄 許願台</a>。</div></div>
    </div>
    <div class="composer">
      <div class="cwrap">
        <div class="cbox">
          <textarea id="input" rows="1" placeholder="輸入訊息…（Enter 送出，Shift+Enter 換行）"></textarea>
          <button id="send">送出</button>
        </div>
        <div class="crow">
          <select id="pack" title="領域"></select>
          <span class="spacer"></span>
          <span id="hint"></span>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const TOKEN = "__SERVER_TOKEN__";
const PACKS = __PACKS__;
const LOCAL = __LOCAL__;
const $ = (s) => document.querySelector(s);
const esc = (s) => String(s==null?"":s).replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const api = (p, opts={}) => fetch(p, { ...opts, headers: { authorization:"Bearer "+TOKEN, "content-type":"application/json", ...(opts.headers||{}) } });

// 工具動作翻人話（與許願台一致）
const TOOL_ZH = { read:"讀取檔案", ls:"查看目錄", glob:"尋找檔案", grep:"搜尋內容", write:"建立檔案", edit:"修改檔案", bash:"執行指令", web_search:"搜尋網路", web_fetch:"讀取網頁", http:"呼叫 API", read_image:"看圖片", skill:"載入技能", skill_save:"記錄技能", skills_check:"複查技能", playbook_update:"記下做法", episode_record:"記下經驗", episode_recall:"回想經驗", memory_save:"記住重點", todo_write:"規劃步驟", spawn_agent:"派出子助手", ask_user:"來問你" };
const LABELS = { general:"通用", coding:"程式", "data-query":"查資料", notes:"筆記", "deep-research":"研究", devops:"維運" };
const packLabel = (p) => LABELS[p] || p;
const toolText = (a) => { const z=TOOL_ZH[a.name]||a.name; const d=a.args&&(a.args.command||a.args.path||a.args.query||a.args.url||a.args.topic||a.args.name)||""; return z+(d?` ${String(d).slice(0,60)}`:""); };

// ── 極簡 markdown（與許願台同款，零依賴）──
function mdRender(src){
  const lines=String(src).replace(/\r/g,"").split("\n"); const out=[]; let inCode=false,buf=[],inList=false;
  const inline=s=>esc(s).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  const closeL=()=>{ if(inList){out.push("</ul>");inList=false;} };
  for(const ln of lines){
    if(/^```/.test(ln)){ if(inCode){out.push("<pre class='code'>"+esc(buf.join("\n"))+"</pre>");buf=[];inCode=false;}else{closeL();inCode=true;} continue; }
    if(inCode){ buf.push(ln); continue; }
    const h=ln.match(/^(#{1,4})\s+(.*)/); if(h){ closeL(); out.push(`<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`); continue; }
    const li=ln.match(/^\s*(?:[-*]|\d+\.)\s+(.*)/); if(li){ if(!inList){out.push("<ul>");inList=true;} out.push("<li>"+inline(li[1])+"</li>"); continue; }
    if(ln.trim()===""){ closeL(); continue; }
    closeL(); out.push("<p>"+inline(ln)+"</p>");
  }
  closeL(); if(inCode)out.push("<pre class='code'>"+esc(buf.join("\n"))+"</pre>");
  return out.join("");
}
function diffHtml(d){
  if(!d) return "";
  if(d.tooBig) return `<div class="diff"><span class="dh">+${d.added} -${d.removed} 行（差異過大，省略）</span></div>`;
  const ch=(d.lines||[]).filter(l=>l.t!==" ").slice(0,40);
  if(!ch.length) return "";
  return `<div class="diff"><div class="dh">+${d.added} -${d.removed}</div>${ch.map(l=>`<div class="dl ${l.t==="+"?"add":"del"}">${esc(l.t+" "+l.s)}</div>`).join("")}</div>`;
}

// ── 專案／空間（與許願台共用 localStorage：跨頁同一工作區 → 五層沉澱跨頁累積）──
let spaces = JSON.parse(localStorage.getItem("xk_spaces")||'["default"]');
let curSpace = localStorage.getItem("xk_space")||"default";
const spaceLabel=s=>s.startsWith("/")?("📁 "+(s.split("/").filter(Boolean).pop()||s)):s;
function renderSpaces(){ $("#space").innerHTML = spaces.map(s=>`<option value="${esc(s)}" ${s===curSpace?"selected":""}>${esc(spaceLabel(s))}</option>`).join(""); }
$("#space").onchange = () => { curSpace=$("#space").value; localStorage.setItem("xk_space",curSpace); newChat(); renderChats(); };
renderSpaces();

// 領域選單（預設自動判斷）
$("#pack").innerHTML = `<option value="auto" selected>🪄 自動領域</option>` + PACKS.map(p=>`<option value="${p}">${packLabel(p)}</option>`).join("");

// ── 對話清單（純前端持久化：transcript 存 localStorage，sessionId 由伺服器回傳後綁定）──
// 後端 history 也綁 sessionId 持久化（重啟可續），這裡額外存「畫面用的對話內容」供列表/重開顯示。
const chatsKey = () => "xk_chats";
const tKey = (id) => "xk_chat_"+id;
function allChats(){ return JSON.parse(localStorage.getItem(chatsKey())||"[]"); }
function saveChats(list){ localStorage.setItem(chatsKey(), JSON.stringify(list)); }
function upsertChat(meta){ const list=allChats().filter(c=>c.id!==meta.id); list.unshift(meta); saveChats(list); }
function loadTranscript(id){ return JSON.parse(localStorage.getItem(tKey(id))||"[]"); }
function saveTranscript(id, msgs){ localStorage.setItem(tKey(id), JSON.stringify(msgs)); }

// ── 目前對話狀態 ──
let sessionId = null;       // null = 尚未建立（首則訊息送出後由伺服器回傳）
let messages = [];          // [{role, text, tools:[{name,args,done,isError,diff}], phase}]
let streaming = false;
let abortCtl = null;

function newChat(){ stopStream(); sessionId=null; messages=[]; render(); $("#input").focus(); renderChats(); }
$("#newchat").onclick = newChat;

function openChat(id){
  stopStream(); sessionId=id; messages=loadTranscript(id); render(); renderChats();
  $("#thread").scrollTop = $("#thread").scrollHeight;
}
function deleteChat(id, ev){
  ev.stopPropagation();
  if(!confirm("刪除這段對話？")) return;
  saveChats(allChats().filter(c=>c.id!==id)); localStorage.removeItem(tKey(id));
  if(id===sessionId) newChat(); else renderChats();
}
function renderChats(){
  const list = allChats().filter(c=>(c.space||"default")===curSpace);
  $("#chats").innerHTML = list.length ? list.map(c=>`<div class="chatitem${c.id===sessionId?' active':''}" onclick="openChat('${c.id}')">
    <span class="chatdel" title="刪除" onclick="deleteChat('${c.id}',event)">🗑</span>
    <div class="t">${esc(c.title||"新對話")}</div>
    <div class="m">${esc(packLabel(c.pack||"general"))} · ${esc(fmtTime(c.ts))}</div></div>`).join("")
    : `<div class="empty">還沒有對話。<br>下面打一句話開始。</div>`;
}
function fmtTime(s){ try{ return new Date(s).toLocaleString(undefined,{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}); }catch{ return ""; } }

// ── 渲染對話 thread ──
function procHtml(m, idx){
  if(!m.tools||!m.tools.length) return "";
  const open = m._procOpen;
  const steps = m.tools.map(a=>`<div class="pstep ${a.isError?"err":""}">${a.done?(a.isError?"✗":"⏺"):'<span class="spin">◐</span>'} ${esc(toolText(a))}${a.diff?diffHtml(a.diff):""}</div>`).join("");
  return `<div class="proc"><div class="proctoggle" onclick="toggleProc(${idx})">${open?"▾":"▸"} 過程（${m.tools.length} 步）</div>${open?`<div class="proclist">${steps}</div>`:""}</div>`;
}
function msgHtml(m, idx){
  const isUser = m.role==="user";
  const bodyCls = isUser ? "body" : "body md";
  const bodyHtml = isUser ? esc(m.text) : (m.text ? mdRender(m.text) : "");
  const cursor = (!isUser && streaming && idx===messages.length-1 && !m.text) ? '<span class="cursor"></span>' : "";
  const phase = (!isUser && m.phase) ? `<div class="phase dots">${esc(m.phase)}</div>` : "";
  return `<div class="msg ${isUser?"user":"asst"}">
    <div class="avatar">${isUser?"🙂":"🤖"}</div>
    <div class="bubble">
      <div class="who">${isUser?"你":"xitto"}</div>
      ${!isUser?procHtml(m, idx):""}
      ${phase}
      <div class="${bodyCls}">${bodyHtml}${cursor}</div>
    </div>
  </div>`;
}
function render(){
  if(!messages.length){ $("#thread").innerHTML = `<div class="threadwrap"><div class="welcome" id="welcome">👋 開始一段對話。<br>它會記得整段上下文，逐步和你協作。<br><br>想「交辦一件明確的事、做完給成品」？改用 <a href="/" style="color:var(--accent)">🪄 許願台</a>。</div></div>`; return; }
  $("#thread").innerHTML = `<div class="threadwrap">${messages.map((m,i)=>msgHtml(m,i)).join("")}</div>`;
}
function toggleProc(idx){ if(messages[idx]){ messages[idx]._procOpen=!messages[idx]._procOpen; render(); } }
function scrollDown(){ const t=$("#thread"); t.scrollTop=t.scrollHeight; }

// ── 送出 + SSE 串流（mode:turn，固定 sessionId 多輪）──
async function send(){
  const text = $("#input").value.trim();
  if(!text || streaming) return;
  $("#input").value=""; autosize();
  messages.push({ role:"user", text });
  const asst = { role:"assistant", text:"", tools:[], _procOpen:false, phase:"思考中" };
  messages.push(asst);
  render(); scrollDown();
  setStreaming(true);

  abortCtl = new AbortController();
  const pack = $("#pack").value;
  const body = JSON.stringify({ pack, mode:"turn", input:text, sessionId: sessionId||undefined, workspace: curSpace });
  try {
    const resp = await api("/v1/stream", { method:"POST", body, signal: abortCtl.signal });
    if(!resp.ok || !resp.body){ asst.phase=""; asst.text="⚠ 連線失敗（"+resp.status+"）"; render(); setStreaming(false); return; }
    const reader = resp.body.getReader(); const dec = new TextDecoder(); let buf="";
    while(true){
      const { done, value } = await reader.read(); if(done) break;
      buf += dec.decode(value, { stream:true });
      let idx;
      while((idx=buf.indexOf("\n\n"))>=0){
        const chunk=buf.slice(0,idx); buf=buf.slice(idx+2);
        if(!chunk.startsWith("data: ")) continue;
        let ev; try{ ev=JSON.parse(chunk.slice(6)); }catch{ continue; }
        handleEvent(ev, asst);
      }
    }
  } catch(e){
    if(e.name!=="AbortError"){ asst.phase=""; asst.text=(asst.text||"")+"\n⚠ "+esc(e.message); render(); }
  }
  setStreaming(false);
  asst.phase="";
  finalize(asst, text);
}

function handleEvent(ev, asst){
  switch(ev.type){
    case "text": asst.phase=""; asst.text += ev.delta||""; break;
    case "tool": asst.tools.push({ name:ev.name, args:ev.args, done:false }); asst.phase="執行中"; break;
    case "tool_end": { const t=[...asst.tools].reverse().find(x=>x.name===ev.name && !x.done); if(t){ t.done=true; t.isError=ev.isError; if(ev.diff) t.diff=ev.diff; } break; }
    case "round": asst.phase="思考中"; break;
    case "phase": asst.phase = ({verifying:"驗收中",verified:"驗收通過",fixing:"修正中"})[ev.phase]||asst.phase; break;
    case "done": if(ev.sessionId) sessionId=ev.sessionId; if(!asst.text && ev.text) asst.text=ev.text; break;
    case "error": asst.phase=""; asst.text=(asst.text||"")+"\n⚠ "+(ev.error||"發生錯誤"); break;
  }
  render(); scrollDown();
}

// 串流結束：綁定 sessionId、寫入對話清單與 transcript
function finalize(asst, firstUserText){
  render();
  if(!sessionId) return; // 沒拿到 sessionId（多半是錯誤）→ 不落地
  const title = (allChats().find(c=>c.id===sessionId)?.title) || firstUserText.slice(0,40);
  upsertChat({ id:sessionId, title, ts:Date.now(), space:curSpace, pack:$("#pack").value });
  saveTranscript(sessionId, messages.map(m=>({ role:m.role, text:m.text, tools:m.tools||[] })));
  renderChats();
}

function stopStream(){ if(abortCtl){ try{ abortCtl.abort(); }catch{} abortCtl=null; } setStreaming(false); }
function setStreaming(on){
  streaming=on;
  $("#send").style.display = on ? "none" : "";
  let stop = document.getElementById("stopbtn");
  if(on && !stop){ stop=document.createElement("button"); stop.id="stopbtn"; stop.className="stopbtn"; stop.textContent="■ 停止"; stop.onclick=stopStream; $(".cbox").appendChild(stop); }
  else if(!on && stop){ stop.remove(); }
}

// ── 輸入框：Enter 送出 / Shift+Enter 換行 / 自動高度 / IME 安全 ──
const inp = $("#input");
function autosize(){ inp.style.height="auto"; inp.style.height=Math.min(200, inp.scrollHeight)+"px"; }
inp.addEventListener("input", autosize);
inp.addEventListener("keydown", e=>{ if(e.key==="Enter" && !e.shiftKey && !e.isComposing){ e.preventDefault(); send(); } });
$("#send").onclick = send;

renderChats(); render(); inp.focus();
</script>
</body>
</html>
