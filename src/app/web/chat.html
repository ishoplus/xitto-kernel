<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>xitto · 對話</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<!-- 設計系統 + 共享工具庫 -->
<link rel="stylesheet" href="shared/style.css">
<!-- 設定注入：server 會替換這些佔位符（HTML 才會被替換，靜態 app.js 不會），app.js 從 window.__XITTO__ 讀 -->
<script>window.__XITTO__ = { token: "__SERVER_TOKEN__", packs: __PACKS__, local: __LOCAL__ };</script>
<script src="shared/app.js"></script>
<style>
/* ── Chat 頁面樣式 ──────────────────────────────────────── */

:root { --sidebar-w: 280px; --thread-w: 780px; }

html, body { height: 100%; }

body {
  display: flex;
  flex-direction: column;
}

/* 跳過導航 */
.skip-link {
  position: absolute;
  top: -100px;
  left: 0;
  background: var(--accent);
  color: var(--btnfg);
  padding: var(--sp-2) var(--sp-4);
  z-index: 9999;
  border-radius: 0 0 var(--r-md) 0;
  font-weight: 600;
  transition: top var(--duration-fast);
}

.skip-link:focus { top: 0; }

/* 全屏雙欄 */
.app {
  flex: 1;
  display: grid;
  grid-template-columns: var(--sidebar-w) minmax(0, 1fr);
  height: 100vh;
  overflow: hidden;
}

/* ── 左側邊欄 ─────────────────────────────────────────── */
.side {
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  background: var(--inset);
  overflow: hidden;
}

.side-head {
  padding: var(--sp-4) var(--sp-3) var(--sp-3);
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}

.side-brand {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  margin-bottom: var(--sp-1);
}

.side-brand h1 {
  font-size: 17px;
  font-weight: 700;
  margin: 0;
}

.side-tagline {
  color: var(--dim);
  font-size: 12px;
}

.side-controls {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  margin-top: var(--sp-3);
}

.space-select {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
}

.space-select label {
  font-size: 12px;
  color: var(--dim);
  white-space: nowrap;
}

.space-select select {
  flex: 1;
  min-width: 0;
  max-width: none;
}

.new-chat-btn {
  width: 100%;
  margin-top: var(--sp-3);
  flex-shrink: 0;
}

/* 對話列表 */
.chats {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-2);
}

.chat-item {
  display: block;
  width: 100%;
  text-align: left;
  padding: var(--sp-2);
  margin: 2px 0;
  border-radius: var(--r-sm);
  background: transparent;
  border: 1px solid transparent;
  cursor: pointer;
  transition: background var(--duration-fast), border-color var(--duration-fast);
  position: relative;
}

.chat-item:hover { background: var(--card); }

.chat-item.active {
  background: var(--card);
  border-color: var(--accent);
}

.chat-item .title {
  font-size: 13.5px;
  line-height: 1.4;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--fg);
  font-weight: inherit;
  padding: 0;
}

.chat-item .meta {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  color: var(--dim);
  font-size: 11px;
  margin-top: 2px;
}

.chat-del {
  position: absolute;
  top: 50%;
  right: var(--sp-2);
  transform: translateY(-50%);
  opacity: 0;
  cursor: pointer;
  font-size: 12px;
  background: none;
  border: none;
  padding: var(--sp-1);
  color: var(--dim);
  transition: opacity var(--duration-fast);
}

.chat-item:hover .chat-del { opacity: .6; }
.chat-del:hover { opacity: 1; }

/* 側邊欄底部 */
.side-foot {
  padding: var(--sp-3);
  border-top: 1px solid var(--line);
  font-size: 12.5px;
  flex-shrink: 0;
}

.side-foot a {
  color: var(--accent);
}

/* 檔案列表 */
.file-section {
  border-top: 1px solid var(--line);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  max-height: 300px;
}

.file-section h3 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--dim);
  margin: 0;
  padding: var(--sp-2) var(--sp-3);
  flex-shrink: 0;
}

.file-breadcrumb {
  padding: var(--sp-1) var(--sp-3);
  font-size: 11px;
  color: var(--dim);
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.file-list {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-1) var(--sp-2);
}

.file-up {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  color: var(--dim);
  font-size: 13px;
  padding: var(--sp-1) var(--sp-2);
  border-radius: var(--r-sm);
  cursor: pointer;
  background: none;
  border: none;
  width: 100%;
  text-align: left;
}

.file-up:hover { color: var(--fg); }

.file-row {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  padding: var(--sp-1) var(--sp-2);
  border-radius: var(--r-sm);
  cursor: pointer;
  font-size: 13px;
  background: none;
  border: none;
  width: 100%;
  text-align: left;
  transition: background var(--duration-fast);
}

.file-row:hover { background: var(--card); }

.file-row .name {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--fg);
}

.file-row .size {
  color: var(--dim);
  font-size: 11px;
  flex-shrink: 0;
}

/* ── 右側主區 ─────────────────────────────────────────── */
.main {
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}

/* Thread 區 */
.thread {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-6) 0;
}

.thread-wrap {
  max-width: var(--thread-w);
  margin: 0 auto;
  padding: 0 var(--sp-6);
}

/* 歡迎空狀態 */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  min-height: min(62vh, 460px);
  padding: var(--sp-10) var(--sp-6);
}

.welcome-icon {
  font-size: 40px;
  line-height: 1;
  margin-bottom: var(--sp-4);
}

.welcome-title {
  font-size: 19px;
  font-weight: 700;
  color: var(--fg);
  margin: 0 0 var(--sp-2);
  letter-spacing: -.01em;
}

.welcome-sub {
  color: var(--dim);
  font-size: 14px;
  line-height: 1.8;
  margin: 0;
  max-width: 400px;
}

/* 訊息 */
.msg {
  margin: var(--sp-6) 0;
  display: flex;
  gap: var(--sp-3);
  animation: fade-in var(--duration-base) var(--ease-out);
}

.msg.user { flex-direction: row-reverse; }

.avatar {
  flex: 0 0 32px;
  width: 32px;
  height: 32px;
  border-radius: var(--r-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  background: var(--card);
  border: 1px solid var(--line);
  align-self: flex-start;
  flex-shrink: 0;
}

.msg.user .avatar { background: var(--me); }

.bubble {
  min-width: 0;
  flex: 1;
  max-width: calc(100% - 44px);
}

.msg.user .bubble { text-align: right; }

.who {
  font-size: 12px;
  color: var(--dim);
  margin-bottom: var(--sp-1);
}

.msg.user .who { text-align: right; }

.body {
  white-space: pre-wrap;
  word-wrap: break-word;
  font-size: 15px;
  line-height: 1.7;
}

.body.md { white-space: normal; }

/* 打字游標 */
.cursor::after {
  content: "▍";
  color: var(--accent);
  animation: blink 1s steps(2) infinite;
}

/* 過程日誌（工具呼叫）*/
.proc {
  margin: var(--sp-2) 0;
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  background: var(--inset);
  text-align: left;
}

.proc-toggle {
  padding: var(--sp-2) var(--sp-3);
  font-size: 13px;
  color: var(--accent);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  background: none;
  border: none;
  font-weight: inherit;
  width: 100%;
  text-align: left;
}

.proc-toggle:hover { background: color-mix(in srgb, var(--accent) 5%, transparent); }

.proc-list {
  padding: var(--sp-1) var(--sp-3) var(--sp-3);
  border-top: 1px solid var(--line);
}

.proc-step {
  font-size: 13px;
  padding: 3px 0;
  color: var(--fg);
}

.proc-step.error { color: var(--danger); }
.proc-step .dim { color: var(--dim); }
.proc-step .spin { color: var(--accent); }

/* 彩色 diff */
.diff { margin: var(--sp-2) 0 var(--sp-2) var(--sp-4); font: 12px/1.5 ui-monospace, Menlo, monospace; }
.dh { color: var(--dim); font-size: 11px; margin-bottom: 2px; }
.dl { white-space: pre-wrap; }
.dl.add { color: var(--ok); }
.dl.del { color: var(--danger); }

/* 階段提示 */
.phase {
  color: var(--dim);
  font-size: 12.5px;
  font-style: italic;
  margin: var(--sp-1) 0;
}

/* 視圖切換鈕 */
.view-toggle { font-size: 12px; padding: var(--sp-1) var(--sp-2); white-space: nowrap; }

/* ── 終端機視圖（Claude Code 風轉錄）：monospace、扁平全寬、› / ⏺ xitto / ⎿ 工具行 ── */
.thread.tui { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
.thread.tui .thread-wrap { max-width: 880px; }

/* 扁平：去泡泡、去頭像、全寬左對齊 */
.thread.tui .msg { display: block; margin: 0 0 var(--sp-5); animation: none; }
.thread.tui .avatar { display: none; }
.thread.tui .bubble,
.thread.tui .msg.user .bubble { max-width: none; text-align: left; }

/* 你的訊息：› 提示符 */
.thread.tui .msg.user .who { display: none; }
.thread.tui .msg.user .body { font-size: 13.5px; color: var(--fg); }
.thread.tui .msg.user .body::before { content: "› "; color: var(--accent); font-weight: 700; }

/* AI：⏺ xitto 標頭 + 縮排內容 */
.thread.tui .msg.asst .who { display: block; color: var(--accent); font-weight: 700; margin-bottom: var(--sp-1); font-size: 13.5px; }
.thread.tui .msg.asst .who::before { content: "⏺ "; }
.thread.tui .msg.asst .body { padding-left: 2ch; font-size: 13.5px; }
.thread.tui .phase { padding-left: 2ch; }

/* 工具行：⎿ 縮排、總是展開、隱藏摺疊鈕與原前標 */
.thread.tui .proc { border: none; background: none; margin: var(--sp-1) 0 0; padding-left: 2ch; }
.thread.tui .proc-toggle { display: none; }
.thread.tui .proc-list { display: block !important; border: none; padding: 0; }
.thread.tui .proc-step { padding: 1px 0; color: var(--dim); display: block; }
.thread.tui .proc-step .pmark { display: none; }
.thread.tui .proc-step::before { content: "⎿ "; color: var(--faint); }
.thread.tui .proc-step.done .ptext { color: var(--fg); }
.thread.tui .proc-step.done .ptext::after { content: " ✓"; color: var(--ok); }
.thread.tui .proc-step.error .ptext { color: var(--danger); }
.thread.tui .proc-step.error .ptext::after { content: " ✗"; color: var(--danger); }
.thread.tui .proc-step.running .ptext::after { content: " …"; color: var(--accent); }
.thread.tui .proc-step .diff { margin-left: 2ch; }

/* 終端機視圖：markdown 標題不要過大，維持轉錄質感 */
.thread.tui .body.md h1, .thread.tui .body.md h2, .thread.tui .body.md h3, .thread.tui .body.md h4 { font-size: 14px; margin: .6em 0 .3em; }

/* ── 輸入區 ─────────────────────────────────────────── */
.composer {
  border-top: 1px solid var(--line);
  background: var(--bg);
  flex-shrink: 0;
}

.composer-wrap {
  max-width: var(--thread-w);
  margin: 0 auto;
  padding: var(--sp-3) var(--sp-6) var(--sp-4);
}

.composer-box {
  display: flex;
  gap: var(--sp-2);
  align-items: flex-end;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: var(--sp-2) var(--sp-3);
  box-shadow: var(--shadow-md), inset 0 1px 0 var(--hairline);
  transition: border-color var(--duration-fast), box-shadow var(--duration-fast);
}

.composer-box:focus-within {
  border-color: color-mix(in srgb, var(--accent) 55%, var(--line));
  box-shadow: var(--shadow-md), 0 0 0 3px var(--accent-soft);
}

.composer-textarea {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  font: inherit;
  max-height: 200px;
  min-height: 24px;
  line-height: 1.6;
  color: var(--fg);
  padding: 0;
}

.composer-textarea::placeholder { color: var(--dim); }

.composer-actions {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  flex-shrink: 0;
}

.send-btn { padding: var(--sp-2) var(--sp-4); }

.stop-btn {
  background: transparent;
  color: var(--danger);
  border: 1px solid color-mix(in srgb, var(--danger) 45%, transparent);
  padding: var(--sp-2) var(--sp-3);
  font-size: 13px;
}

.stop-btn:hover { background: color-mix(in srgb, var(--danger) 14%, transparent); }

.composer-footer {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  margin-top: var(--sp-2);
  color: var(--dim);
  font-size: 12px;
}

.composer-footer .spacer { flex: 1; }

/* ── 響應式 ─────────────────────────────────────────── */
@media (max-width: 1024px) {
  :root { --sidebar-w: 240px; }
}

@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; }
  
  .side {
    display: none; /* 手機上隱藏側邊欄，用連結切換 */
  }
  
  .thread-wrap, .composer-wrap {
    padding: 0 var(--sp-4);
  }
  
  /* 手機上顯示「返回列表」按鈕 */
  .mobile-back {
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    padding: var(--sp-3) var(--sp-4);
    border-bottom: 1px solid var(--line);
    font-size: 13px;
    color: var(--dim);
    cursor: pointer;
  }
  
  .mobile-back:hover { color: var(--fg); }
  
  /* 手機上把檔案列表放到 thread 區底部 */
  .file-section {
    max-height: 200px;
    border-top: 1px solid var(--line);
  }
}

@media (min-width: 769px) {
  .mobile-back { display: none; }
}

@media (min-width: 1400px) {
  :root { --thread-w: 860px; }
}
</style>
</head>
<body>
<a href="#main-input" class="skip-link">跳到輸入框</a>

<div class="app">
  <!-- 左側邊欄 -->
  <aside class="side" role="navigation" aria-label="對話列表">
    <div class="side-head">
      <div class="side-brand">
        <h1>💬 對話</h1>
        <button class="ghost" id="theme" data-tooltip="切換主題" aria-label="切換深色/淺色模式" style="padding:4px 9px;font-size:15px;margin-left:auto">🌙</button>
      </div>
      <div class="side-tagline">逐句協作，記得上下文</div>
      
      <div class="side-controls">
        <div class="space-select">
          <label for="space">專案</label>
          <select id="space" aria-label="選擇專案空間"></select>
        </div>
      </div>
      
      <button class="ghost new-chat-btn" id="new-chat-btn" aria-label="開始新對話">＋ 新對話</button>
    </div>
    
    <div class="chats" id="chats" role="list" aria-label="對話列表"></div>
    
    <!-- 檔案列表 -->
    <section class="file-section" aria-label="工作區檔案">
      <h3>📂 檔案</h3>
      <div id="file-breadcrumb" class="file-breadcrumb" aria-live="polite"></div>
      <div class="file-list" id="wbfiles" role="tree" aria-label="檔案列表"></div>
    </section>
    
    <div class="side-foot">
      🪄 <a href="/">許願台</a>（交辦明確任務、收成品）
    </div>
  </aside>

  <!-- 右側主區 -->
  <main id="main-content" class="main" role="main" aria-label="對話區">
    <button class="mobile-back" onclick="showSide()" aria-label="返回對話列表">
      ← 返回對話列表
    </button>
    
    <div class="thread" id="thread" role="log" aria-label="對話記錄" aria-live="polite">
      <div class="thread-wrap">
        <!-- 動態內容由 JS render() 注入 -->
      </div>
    </div>
    <!-- 檔案預覽區 -->
    <div id="file-preview"></div>

    <!-- 輸入區 -->
    <div class="composer" id="main-input">
      <div class="composer-wrap">
        <div class="composer-box" role="form" aria-label="輸入訊息">
          <label for="input" class="sr-only">輸入訊息</label>
          <textarea
            id="input"
            class="composer-textarea"
            rows="1"
            placeholder="輸入訊息，開始對話…"
            aria-describedby="input-hint"
          ></textarea>
          <div class="composer-actions">
            <label for="pack" class="sr-only">選擇領域</label>
            <select id="pack" aria-label="選擇領域" style="max-width:120px"></select>
            <button class="primary send-btn" id="send-btn" aria-label="送出訊息">送出</button>
          </div>
        </div>
        <div class="composer-footer">
          <span id="input-hint">Enter 送出 · Shift+Enter 換行</span>
          <span class="spacer" aria-hidden="true"></span>
          <span id="status-hint" aria-live="polite"></span>
          <button class="ghost view-toggle" id="view-toggle" type="button" data-tooltip="切換終端機／泡泡視圖" aria-label="切換對話視圖">⌗ 終端機</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
/* ── Chat 應用邏輯 ───────────────────────────────────────── */

/* 主題切換 */
$("#theme").onclick = () => {
  const t = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
  applyTheme(t);
};

/* 對話視圖切換：泡泡 ⇄ 終端機（Claude Code 風轉錄）。偏好記 localStorage(xk_chatview) */
function applyView(v) {
  const tui = v === "tui";
  $("#thread").classList.toggle("tui", tui);
  const b = $("#view-toggle");
  if (b) b.textContent = tui ? "💬 泡泡" : "⌗ 終端機";   // 顯示「切換到」的目標
}
applyView(localStorage.getItem("xk_chatview") || "bubble");
$("#view-toggle").onclick = () => {
  const v = $("#thread").classList.contains("tui") ? "bubble" : "tui";
  localStorage.setItem("xk_chatview", v);
  applyView(v);
};

/* IME 保護 */
let composing = false;
const inp = $("#input");
inp.addEventListener("compositionstart", () => { composing = true; });
inp.addEventListener("compositionend", () => { composing = false; });

/* 專案空間 */
renderSpaces($("#space"));
$("#space").onchange = () => {
  switchSpace($("#space").value);
  newChat();
  renderChats();
  loadFiles();
};

/* 領域選單 */
renderPackSelect($("#pack"));

/* ── 對話持久化（localStorage）──────────────────────────── */
const chatsKey = () => "xk_chats";
const tKey = (id) => "xk_chat_" + id;

function allChats() {
  return JSON.parse(localStorage.getItem(chatsKey()) || "[]");
}

function saveChats(list) {
  localStorage.setItem(chatsKey(), JSON.stringify(list));
}

function upsertChat(meta) {
  const list = allChats().filter((c) => c.id !== meta.id);
  list.unshift(meta);
  saveChats(list);
}

function loadTranscript(id) {
  return JSON.parse(localStorage.getItem(tKey(id)) || "[]");
}

function saveTranscript(id, msgs) {
  localStorage.setItem(tKey(id), JSON.stringify(msgs));
}

/* ── 目前對話狀態 ──────────────────────────────────────── */
let sessionId = null; // null = 尚未建立
let messages = []; // [{role, text, tools:[], _procOpen, phase}]
let streaming = false;
let abortCtl = null;

/* ── 對話列表 ──────────────────────────────────────────── */
function newChat() {
  stopStream();
  sessionId = null;
  messages = [];
  render();
  $("#input").focus();
  renderChats();
  loadFiles();
}

$("#new-chat-btn").onclick = newChat;

/* ── 檔案列表 ──────────────────────────────────────────── */
let wbSub = "";

function wbNav(s) {
  wbSub = decodeURIComponent(s);
  loadFiles();
}

function wbUp() {
  wbSub = wbSub.includes("/") ? wbSub.slice(0, wbSub.lastIndexOf("/")) : "";
  loadFiles();
}

async function loadFiles() {
  const r = await api("/v1/workspaces/files?ws=" + encodeURIComponent(curSpace) + "&sub=" + encodeURIComponent(wbSub)).then((r) => r.json()).catch(() => ({ dirs: [], files: [] }));

  const bc = $("#file-breadcrumb");
  bc.textContent = wbSub ? "📂 " + wbSub : "";

  let html = wbSub ? `<button class="file-up" onclick="wbUp()" aria-label="上一層" type="button">⬆ 上一層</button>` : "";
  html += (r.dirs || []).map((d) => `<button class="file-row" onclick="wbNav('${encodeURIComponent((wbSub ? wbSub + "/" : "") + d)}')" type="button">📁 <span class="name">${esc(d)}</span>/</button>`).join("");
  html +=
    (r.files || []).map((f) => {
      const full = (wbSub ? wbSub + "/" : "") + f.name;
      return `<button class="file-row" onclick="wbView('${encodeURIComponent(full)}','${jsAttr(f.name)}')" type="button">
    <span class="name">📄 ${esc(f.name)}</span>
    <span class="size">${fmtSize(f.size)}</span>
  </button>`;
    }).join("");

  if (!(r.dirs || []).length && !(r.files || []).length)
    html += `<div class="empty" style="padding:${8}px">（${wbSub ? "空資料夾" : "還沒有檔案"}）</div>`;

  $("#wbfiles").innerHTML = html;
}

async function wbView(encPath, name) {
  // 在 thread 區顯示檔案預覽
  const path = decodeURIComponent(encPath);
  const v = document.getElementById("file-preview");
  if (!v) return;
  
  const url = "/v1/workspaces/file?ws=" + encodeURIComponent(curSpace) + "&path=" + encPath + "&token=" + encodeURIComponent(TOKEN);
  
  const IMG = /\.(png|jpe?g|gif|webp|svg)$/i;
  const MD = /\.(md|markdown)$/i;
  const JSONF = /\.json$/i;
  const HTMLF = /\.html?$/i;
  
  let content = "";
  if (IMG.test(name)) {
    content = `<div style="padding:${8}px"><img style="max-width:100%;border-radius:${6}px" src="${url}" alt="${esc(name)}"></div>`;
  } else {
    const txt = await fetch(url).then((r) => (r.ok ? r.text() : null)).catch(() => null);
    if (txt == null) {
      content = `<div class="empty">（無法預覽）</div>`;
    } else if (MD.test(name)) {
      content = `<div class="md" style="padding:${12}px;max-height:400px;overflow:auto">${mdRender(txt)}</div>`;
    } else if (JSONF.test(name)) {
      try { content = `<pre style="padding:${12}px;overflow:auto;max-height:400px;white-space:pre-wrap;font-size:13px">${esc(JSON.stringify(JSON.parse(txt), null, 2))}</pre>`; }
      catch { content = `<pre style="padding:${12}px;overflow:auto;max-height:400px">${esc(txt)}</pre>`; }
    } else if (HTMLF.test(name)) {
      content = `<div class="empty">（HTML 檔案，請用「開新分頁」檢視）</div>`;
    } else {
      content = `<pre style="padding:${12}px;overflow:auto;max-height:400px;white-space:pre-wrap;font-size:13px">${esc(txt)}</pre>`;
    }
  }
  
  v.innerHTML = `<div style="border-top:1px solid var(--line);padding:${12}px ${24}px">
    <div style="display:flex;align-items:center;gap:${8}px;margin-bottom:${8}px;font-size:12px;color:var(--dim)">
      📄 ${esc(name)}
      <a href="${url}" target="_blank" style="color:var(--accent)">開新分頁</a>
      <a href="${url}&download=1" style="color:var(--accent)">下載</a>
    </div>
    ${content}
    <button class="ghost" onclick="this.parentElement.parentElement.remove()" style="margin-top:${8}px;font-size:12px" type="button">✕ 關閉</button>
  </div>`;
  scrollDown();
}

function openChat(id) {
  stopStream();
  sessionId = id;
  messages = loadTranscript(id);
  render();
  renderChats();
  scrollDown();
}

function deleteChat(id, ev) {
  ev.stopPropagation();
  if (!confirm("刪除這段對話？")) return;
  saveChats(allChats().filter((c) => c.id !== id));
  localStorage.removeItem(tKey(id));
  if (id === sessionId) newChat();
  else renderChats();
}

function renderChats() {
  const list = allChats().filter((c) => (c.space || "default") === curSpace);
  const activeClass = (id) => (id === sessionId ? " active" : "");

  $("#chats").innerHTML = list.length
    ? list
        .map(
          (c) => `<button class="chat-item${activeClass(c.id)}" onclick="openChat('${c.id}')" aria-current="${c.id === sessionId ? "page" : "false"}">
      <span class="title">${esc(c.title || "新對話")}</span>
      <span class="meta">
        <span>${packLabel(c.pack || "general")}</span>
        <span>${fmtTime(c.ts)}</span>
      </span>
      <button class="chat-del" onclick="deleteChat('${c.id}',event)" aria-label="刪除對話" title="刪除">🗑</button>
    </button>`
        )
        .join("")
    : `<div class="empty">還沒有對話。<br>下面打一句話開始。</div>`;
}

/* ── 渲染 Thread ─────────────────────────────────────── */
const PHASE_TEXT = {
  starting: "啟動中",
  thinking: "思考中…",
  verifying: "驗收中…",
  verified: "驗收通過",
  fixing: "修正中…",
  "needs-input": "需要你回答",
};

function procHtml(m, idx) {
  if (!m.tools || !m.tools.length) return "";
  const open = m._procOpen;
  const steps = m.tools
    .map(
      (a) =>
        `<div class="proc-step ${a.isError ? "error" : a.done ? "done" : "running"}">
          <span class="pmark">${a.done ? (a.isError ? "✗" : "⏺") : '<span class="spin">◐</span>'}</span>
          <span class="ptext">${esc(toolText(a))}</span>
          ${a.diff ? diffHtml(a.diff) : ""}
        </div>`
    )
    .join("");
  return `<div class="proc">
    <button class="proc-toggle" onclick="toggleProc(${idx})" aria-expanded="${open}" aria-controls="proc-${idx}">
      ${open ? "▾" : "▸"} 過程（${m.tools.length} 步）
    </button>
    <div id="proc-${idx}" class="proc-list" ${open ? "" : "hidden"}>${steps}</div>
  </div>`;
}

function msgHtml(m, idx) {
  const isUser = m.role === "user";
  const bodyHtml = isUser ? esc(m.text) : m.text ? mdRender(m.text) : "";
  const cursor =
    !isUser && streaming && idx === messages.length - 1 && !m.text
      ? '<span class="cursor" aria-label="正在輸入"></span>'
      : "";
  const phase =
    !isUser && m.phase ? `<div class="phase ${m.phase === "thinking" || m.phase === "verifying" ? "dots" : ""}">${esc(PHASE_TEXT[m.phase] || m.phase)}</div>` : "";

  return `<div class="msg ${isUser ? "user" : "asst"}" role="article" aria-label="${isUser ? "你的訊息" : "xitto 的回覆"}">
    <div class="avatar" aria-hidden="true">${isUser ? "🙂" : "🤖"}</div>
    <div class="bubble">
      <div class="who" aria-hidden="true">${isUser ? "你" : "xitto"}</div>
      ${!isUser ? procHtml(m, idx) : ""}
      ${phase}
      <div class="body ${isUser ? "" : "md"}">${bodyHtml}${cursor}</div>
    </div>
  </div>`;
}

function render() {
  if (!messages.length) {
    $("#thread").innerHTML = `<div class="thread-wrap">
      <div class="welcome">
        <div class="welcome-icon" aria-hidden="true">💬</div>
        <h2 class="welcome-title">開始一段對話</h2>
        <p class="welcome-sub">它會記得整段上下文，逐步和你協作。<br>想「交辦一件明確的事、做完給成品」？改用 <a href="/">🪄 許願台</a>。</p>
      </div>
    </div>`;
    return;
  }
  $("#thread").innerHTML = `<div class="thread-wrap">${messages.map((m, i) => msgHtml(m, i)).join("")}</div>`;
}

function toggleProc(idx) {
  if (messages[idx]) {
    messages[idx]._procOpen = !messages[idx]._procOpen;
    render();
  }
}

function scrollDown() {
  const t = $("#thread");
  t.scrollTop = t.scrollHeight;
}

/* ── 送出訊息 + SSE 串流 ───────────────────────────────── */
async function send() {
  const text = $("#input").value.trim();
  if (!text || streaming) return;
  $("#input").value = "";
  autosize();

  messages.push({ role: "user", text });
  const asst = { role: "assistant", text: "", tools: [], _procOpen: false, phase: "thinking" };
  messages.push(asst);
  render();
  scrollDown();
  setStreaming(true);

  abortCtl = new AbortController();
  const pack = $("#pack").value;
  const body = JSON.stringify({
    pack,
    mode: "turn",
    input: text,
    sessionId: sessionId || undefined,
    workspace: curSpace,
  });

  try {
    const resp = await api("/v1/stream", { method: "POST", body, signal: abortCtl.signal });
    if (!resp.ok || !resp.body) {
      asst.phase = "";
      asst.text = "⚠ 連線失敗（" + resp.status + "）";
      render();
      setStreaming(false);
      return;
    }

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf("\n\n")) >= 0) {
        const chunk = buf.slice(0, idx);
        buf = buf.slice(idx + 2);
        if (!chunk.startsWith("data: ")) continue;
        let ev;
        try {
          ev = JSON.parse(chunk.slice(6));
        } catch {
          continue;
        }
        handleEvent(ev, asst);
      }
    }
  } catch (e) {
    if (e.name !== "AbortError") {
      asst.phase = "";
      asst.text = (asst.text || "") + "\n⚠ " + esc(e.message);
      render();
    }
  }

  setStreaming(false);
  asst.phase = "";
  finalize(asst, text);
}

function handleEvent(ev, asst) {
  switch (ev.type) {
    case "text":
      asst.phase = "";
      asst.text += ev.delta || "";
      break;
    case "tool":
      asst.tools.push({ name: ev.name, args: ev.args, done: false });
      asst.phase = "acting";
      break;
    case "tool_end": {
      const t = [...asst.tools].reverse().find((x) => x.name === ev.name && !x.done);
      if (t) {
        t.done = true;
        t.isError = ev.isError;
        if (ev.diff) t.diff = ev.diff;
      }
      break;
    }
    case "round":
      asst.phase = "thinking";
      break;
    case "phase":
      asst.phase =
        { verifying: "verifying", verified: "verified", fixing: "fixing" }[ev.phase] || ev.phase;
      break;
    case "done":
      if (ev.sessionId) sessionId = ev.sessionId;
      if (!asst.text && ev.text) asst.text = ev.text;
      break;
    case "error":
      asst.phase = "";
      asst.text = (asst.text || "") + "\n⚠ " + (ev.error || "發生錯誤");
      break;
  }
  if (!composing) {
    render();
    scrollDown();
  }
}

/* 串流結束：落地 */
function finalize(asst, firstUserText) {
  render();
  if (!sessionId) return; // 沒拿到 sessionId → 不落地
  const title = (allChats().find((c) => c.id === sessionId)?.title) || firstUserText.slice(0, 40);
  upsertChat({ id: sessionId, title, ts: Date.now(), space: curSpace, pack: $("#pack").value });
  saveTranscript(sessionId, messages.map((m) => ({ role: m.role, text: m.text, tools: m.tools || [] })));
  renderChats();
}

function stopStream() {
  if (abortCtl) {
    try {
      abortCtl.abort();
    } catch {}
    abortCtl = null;
  }
  setStreaming(false);
}

function setStreaming(on) {
  streaming = on;
  $("#send-btn").style.display = on ? "none" : "";
  $("#status-hint").textContent = on ? "回覆中…" : "";
}

/* ── 輸入框控制 ─────────────────────────────────────────── */
function autosize() {
  inp.style.height = "auto";
  inp.style.height = Math.min(200, inp.scrollHeight) + "px";
}

inp.addEventListener("input", autosize);

inp.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    send();
  }
});

$("#send-btn").onclick = send;

/* ── 啟動 ──────────────────────────────────────────────── */
renderChats();
render();
inp.focus();
loadFiles();

/* 手機上顯示側邊欄 */
function showSide() {
  const side = $(".side");
  if (side) {
    side.style.display = "flex";
    side.style.position = "fixed";
    side.style.inset = "0";
    side.style.zIndex = "50";
    side.style.background = "var(--bg)";
  }
}

/* 點擊對話後在手機上隱藏側邊欄 */
function openChat(id) {
  stopStream();
  sessionId = id;
  messages = loadTranscript(id);
  render();
  renderChats();
  scrollDown();
  
  const side = $(".side");
  if (side && window.innerWidth < 768) {
    side.style.display = "none";
  }
}
</script>
