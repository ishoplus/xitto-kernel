/* ── 渲染 Thread ─────────────────────────────────────── */
const PHASE_TEXT = {
  starting: "啟動中",
  thinking: "思考中…",
  verifying: "驗收中…",
  verified: "驗收通過",
  fixing: "修正中…",
  "needs-input": "需要你回答",
};

/* 工具類別（決定 TUI 彩色行的顏色）：讀／改／執行／網路／其他 */
function toolCat(name) {
  if (["read", "ls", "glob", "grep", "read_image"].includes(name)) return "read";
  if (["write", "edit"].includes(name)) return "edit";
  if (name === "bash") return "run";
  if (["web_search", "web_fetch", "http"].includes(name)) return "net";
  return "meta";
}

/* 子 agent 的工具步驟（嵌套、無 diff）*/
function subStepHtml(a) {
  const state = a.isError ? "error" : a.done ? "done" : "running";
  return `<div class="proc-step substep cat-${toolCat(a.name)} ${state}">
    <span class="pmark">${a.done ? (a.isError ? "✗" : "⏺") : '<span class="spin">◐</span>'}</span>
    <span class="ptext">${esc(toolText(a))}</span>
  </div>`;
}

function stepHtml(a) {
  const state = a.isError ? "error" : a.done ? "done" : "running";
  // 子 agent 即時思考行（僅在 spawn_agent 仍進行中時顯示）
  const think = a.name === "spawn_agent" && !a.done && a.subThinking
    ? `<div class="sub-think">${esc(a.subThinking)}</div>`
    : "";
  const subBody = (a.sub && a.sub.length ? a.sub.map(subStepHtml).join("") : "") + think;
  const sub = subBody ? `<div class="substeps">${subBody}</div>` : "";
  return `<div class="proc-step cat-${toolCat(a.name)} ${state}">
    <span class="pmark">${a.done ? (a.isError ? "✗" : "⏺") : '<span class="spin">◐</span>'}</span>
    <span class="ptext">${esc(toolText(a))}</span>
    ${a.diff ? diffHtml(a.diff) : ""}
  </div>${sub}`;
}

function procHtml(m, idx) {
  if (!m.tools || !m.tools.length) return "";
  const open = m._procOpen;
  const steps = m.tools.map(stepHtml).join("");
  return `<div class="proc">
    <button class="proc-toggle" onclick="toggleProc(${idx})" aria-expanded="${open}" aria-controls="proc-${idx}">
      ${open ? "▾" : "▸"} 過程（${m.tools.length} 步）
    </button>
    <div id="proc-${idx}" class="proc-list" ${open ? "" : "hidden"}>${steps}</div>
  </div>`;
}

/* 右側軌道內容：彙整每一輪的工具步驟（步驟恆展開，按回合分組）。 */
function renderRail() {
  const bg = renderBgTasks();
  const turns = messages
    .map((m, i) => ({ m, i }))
    .filter((x) => x.m.role !== "user" && x.m.tools && x.m.tools.length);
  if (!turns.length) {
    return bg
      ? bg
      : `<div class="wl-empty">工具活動會顯示在這裡<br><span>讀檔、編輯、執行指令、diff…</span></div>`;
  }
  const list = turns
    .map(({ m }, n) =>
      `<div class="wl-turn">
        <div class="wl-turn-label">回合 ${n + 1}</div>
        ${m.tools.map(stepHtml).join("")}
      </div>`
    )
    .join("");
  return list + bg;
}

/* 背景任務區塊（HUD 與工作日誌軌道共用）：即時狀態＋步數＋經過時間＋中斷鈕 */
function fmtElapsed(ms) {
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + "s";
  return Math.floor(s / 60) + "m" + String(s % 60).padStart(2, "0") + "s";
}
function bgPhaseText(t) {
  const map = { starting: "啟動中", acting: "動作中", thinking: "思考中", running: "執行中", queued: "排隊中", verifying: "驗收中", fixing: "修正中", "needs-input": "待回答", done: "完成", error: "錯誤", cancelled: "已取消", interrupted: "中斷" };
  return map[t.phase] || map[t.status] || t.status;
}
function renderBgTasks() {
  if (!bgTasks.length) return "";
  const rows = bgTasks.slice(0, 6).map((t) => {
    const live = t.status === "running" || t.status === "queued";
    const el = t.startedAt ? fmtElapsed((t.finishedAt || Date.now()) - t.startedAt) : "";
    const icon = t.status === "done" ? "✓" : t.status === "error" ? "✗" : t.status === "cancelled" ? "⊘" : '<span class="spin">◐</span>';
    // 可展開：點卡片 → 顯示此任務的執行過程（複用主對話的 stepHtml；含子 agent 嵌套步驟）。
    const nTools = (t.asst && t.asst.tools) ? t.asst.tools.length : 0;
    const caret = nTools ? (t._open ? "▾" : "▸") : "·";
    const reply = (t._open && t.asst && t.asst.text) ? `<div class="bg-proc-text">${esc(t.asst.text.slice(-800))}</div>` : "";
    const proc = t._open && nTools ? `<div class="bg-proc proc-list">${t.asst.tools.map(stepHtml).join("")}</div>${reply}` : "";
    return `<div class="bg-task ${esc(t.status)}">
      <div class="bg-task-top bg-task-click" onclick="toggleBgTask('${esc(t.id)}')" role="button" title="點擊展開/收合執行過程">
        <span class="bg-caret">${caret}</span>
        <span class="bg-ic">${icon}</span>
        <span class="bg-goal" title="${esc(t.goal)}">${esc(t.goal.slice(0, 48))}</span>
        ${live ? `<button class="bg-cancel" onclick="event.stopPropagation();cancelBg('${esc(t.id)}')" title="中斷" aria-label="中斷任務">✕</button>` : ""}
      </div>
      <div class="bg-task-meta">${esc(packLabel(t.pack))} · ${esc(bgPhaseText(t))} · ${t.steps} 步${el ? " · " + el : ""}</div>
      ${proc}
    </div>`;
  }).join("");
  return `<div class="hud-divider"></div><div class="hud-files-head">背景任務（${bgTasks.length}）</div>${rows}`;
}

// 展開/收合某背景任務的執行過程（就地在軌道卡片內顯示，不必切回對話）。
function toggleBgTask(id) { const t = bgTasks.find((x) => x.id === id); if (!t) return; t._open = !t._open; updateHud(); }

/* 路徑縮短：超過兩層只留「…/上層/檔名」，保住檔名可見。 */
function shortPath(p) {
  const seg = String(p).split("/").filter(Boolean);
  return seg.length > 2 ? "…/" + seg.slice(-2).join("/") : p;
}

/* TUI 軌道內容：工作階段 HUD（pack／回合／工具數 + 本次動過的檔案，類 git status）。 */
function renderHud() {
  const turns = messages.filter((m) => m.role === "user").length;
  let toolCount = 0;
  const files = new Map(); // path -> "changed" | "read"（改動優先）
  const tally = (a) => {
    toolCount++;
    const p = a.args && a.args.path;
    if (!p) return;
    if (a.name === "edit" || a.name === "write") files.set(p, "changed");
    else if (a.name === "read" && !files.has(p)) files.set(p, "read");
  };
  for (const m of messages) {
    if (!m.tools) continue;
    for (const a of m.tools) {
      tally(a);
      if (a.sub) a.sub.forEach(tally); // 子 agent 的工具一併計入
    }
  }
  const pack = (typeof packLabel === "function" ? packLabel($("#pack").value) : $("#pack").value) || "—";
  const rows = `
    <div class="hud-row"><span class="hud-k">pack</span><span class="hud-v">${esc(pack)}</span></div>
    <div class="hud-row"><span class="hud-k">回合</span><span class="hud-v">${turns}</span></div>
    <div class="hud-row"><span class="hud-k">工具</span><span class="hud-v">${toolCount}</span></div>`;
  const fileList = files.size
    ? [...files]
        .map(([p, kind]) =>
          `<div class="hud-file ${kind}" title="${esc(p)}">${kind === "changed" ? "✎" : "·"} ${esc(shortPath(p))}</div>`
        )
        .join("")
    : `<div class="hud-empty">尚無檔案動作</div>`;
  return `<div class="hud-sec">${rows}</div>
    <div class="hud-divider"></div>
    <div class="hud-files-head">FILES TOUCHED（${files.size}）</div>
    ${fileList}
    ${renderBgTasks()}`;
}

// 驗收徽章（完成定義）：通過＝綠勾、未通過＝琥珀警示（可展開證據）。null/未驗收 → 不顯示。
function verifyBadge(v) {
  if (!v || !v.ran) return "";
  const rounds = v.rounds > 1 ? `（修正 ${v.rounds} 輪）` : "";
  if (v.ok) return `<div class="vbadge ok">✓ 驗收通過${rounds}</div>`;
  const ev = v.output ? `<pre class="vbadge-out">${esc(v.output)}</pre>` : "";
  return `<details class="vbadge-wrap"><summary class="vbadge fail">⚠ 未通過驗收${rounds}</summary>${ev}</details>`;
}

/* 自動壓縮的「持久」分隔標記（對齊 TUI/CC：事後回看、重整頁面都還在，不像 footer 提示只閃 2.6s）。
   可展開看壓了多少、保留多少。措辭說明「摘要仍在上下文、只是上方原文不再逐字送模型」，避免使用者誤以為 AI 忘了。 */
function compactDividerHtml(c) {
  const T = (k, f) => (window.t ? t(k, f) : f);
  const range = (c.pct0 != null && c.pct1 != null)
    ? `${c.pct0}% → ${c.pct1}%`
    : `${fmtTokens(c.before)} → ${fmtTokens(c.after)} tokens`;
  const badge = T("compact.badge", "⊙ 已自動壓縮上下文 %r").replace("%r", range);
  const body = T("compact.body", "較舊的 %s 則對話已摘要成 1 則、保留最近 %k 則。摘要仍在 AI 的上下文內供延續，只是上方完整原文不再逐字送給模型。")
    .replace("%s", c.summarized).replace("%k", c.kept);
  return `<details class="compact-divider" role="note" aria-label="${esc(badge)}">
    <summary><span class="cd-rule"></span><span class="cd-badge">${esc(badge)}</span><span class="cd-rule"></span></summary>
    <div class="cd-body">${esc(body)}</div>
  </details>`;
}

/* 泡泡正文快取：完成的訊息 text 不再變動 → mdRender（含語法高亮，最貴）只算一次；
   串流中的最後一顆泡泡 text 每幀都變 → m._mdSrc !== m.text 自動失效重算（僅這一顆）。 */
function asstBodyHtml(m) {
  if (!m.text) return "";
  if (m._mdSrc === m.text && m._mdHtml != null) return m._mdHtml;
  m._mdSrc = m.text;
  m._mdHtml = mdRender(m.text);
  return m._mdHtml;
}

function msgHtml(m, idx) {
  if (m.role === "divider" && m._compact) return compactDividerHtml(m._compact);
  const isUser = m.role === "user";
  const bodyHtml = isUser ? esc(m.text) : asstBodyHtml(m);
  const cursor =
    !isUser && streaming && idx === messages.length - 1 && !m.text
      ? '<span class="cursor" aria-label="正在輸入"></span>'
      : "";
  const phase =
    !isUser && m.phase ? `<div class="phase ${m.phase === "thinking" || m.phase === "verifying" ? "dots" : ""}">${esc(PHASE_TEXT[m.phase] || m.phase)}</div>` : "";
  const note = !isUser && m.note ? `<div class="turn-note">⚠ ${esc(m.note)}</div>` : ""; // 保底提示（截斷/中斷/空回應）
  const steered = isUser && m._steer; // 回覆中插話的訊息
  const steerTag = steered ? ` <span class="steer-tag" title="回覆進行中插入，agent 於下一步接手">↳ 插話</span>` : "";
  const steerPickup = !isUser && m._afterSteer ? `<div class="steer-pickup">↳ 接手你的插話</div>` : ""; // 插話後的回覆銜接標記

  return `<div class="msg ${isUser ? "user" : "asst"}${steered ? " steered" : ""}" role="article" aria-label="${steered ? "你的插話" : isUser ? "你的訊息" : "xitto 的回覆"}">
    <div class="avatar" aria-hidden="true">${isUser ? "🙂" : "🤖"}</div>
    <div class="bubble">
      <div class="who" aria-hidden="true">${isUser ? "你" : "xitto"}${steerTag}</div>
      ${steerPickup}
      ${!isUser && !procInRail() ? procHtml(m, idx) : ""}
      ${phase}
      <div class="body ${isUser ? "" : "md"}">${bodyHtml}${cursor}</div>
      ${note}
      ${!isUser ? verifyBadge(m.verify) : ""}
    </div>
  </div>`;
}

function render() {
  if (!messages.length) {
    $("#thread").innerHTML = `<div class="thread-wrap">
      <div class="welcome">
        <div class="welcome-icon" aria-hidden="true">💬</div>
        <h2 class="welcome-title">開始一段對話</h2>
        <p class="welcome-sub">它會記得整段上下文，逐步和你協作。<br>想「交辦一件明確的事、做完給成品」？改用 <a href="/">📋 任務台</a>。</p>
      </div>
    </div>`;
  } else {
    $("#thread").innerHTML = `<div class="thread-wrap">${messages.map((m, i) => msgHtml(m, i)).join("")}</div>`;
  }
  applyVirt();
  updateRail();
}

/* 訊息數超過門檻才開啟原生虛擬化：短對話（常態）完全不變、零風險；長對話才讓離屏泡泡跳過 render。 */
const VIRT_AT = 40;
function applyVirt(wrap) {
  wrap = wrap || $("#thread").querySelector(".thread-wrap");
  if (wrap) wrap.classList.toggle("virt", messages.length > VIRT_AT);
}

/* 右側軌道：泡泡＝工作日誌，TUI＝工作階段 HUD（render 與串流增量重繪共用）*/
function updateRail() {
  const on = railActive();
  document.querySelector(".app").classList.toggle("rail-on", on);
  const rail = $("#worklog");
  if (on && rail) {
    const tui = view === "tui";
    rail.classList.toggle("tui", tui);
    $("#worklog-head").textContent = tui ? "◈ 工作階段" : "⚙ 工作日誌";
    $("#worklog-body").innerHTML = tui ? renderHud() : renderRail();
  }
}

/* 串流熱路徑：只替換最後一顆泡泡的 DOM（其餘泡泡不動）——避免每個 chunk 都重建整棵 thread。
   結構一變（插話新增泡泡／壓縮插分隔線／切對話）節點數對不上 → 退回整棵 render()，保證正確。 */
function renderStreamTail() {
  const wrap = $("#thread").querySelector(".thread-wrap");
  if (!wrap || wrap.children.length !== messages.length) return render();
  const i = messages.length - 1;
  const tpl = document.createElement("template");
  tpl.innerHTML = msgHtml(messages[i], i);
  const next = tpl.content.firstElementChild;
  if (!next) return render();
  wrap.replaceChild(next, wrap.children[i]);
  applyVirt(wrap);
  updateRail();
}

/* 串流期間把「重繪＋捲動」合併進一個 rAF：無論一幀內來幾個 chunk，最多只重繪一次，
   把「每 token 一次全量重繪」降成「每幀一次增量重繪」，主線程不再被打滿 → 不再彈「頁面無回應」。*/
let _tailQueued = false;
function scheduleStreamRender() {
  if (_tailQueued) return;
  _tailQueued = true;
  requestAnimationFrame(() => {
    _tailQueued = false;
    renderStreamTail();
    scrollDown();
  });
}

function toggleProc(idx) {
  if (messages[idx]) {
    messages[idx]._procOpen = !messages[idx]._procOpen;
    render();
  }
}

function scrollDown() {
  const t = $("#thread");
  t.scrollTop = t.scrollHeight;
  const wl = $("#worklog-body");
  if (wl) wl.scrollTop = wl.scrollHeight;
}

/* SSE 讀取：解析 data: 行、逐事件回呼（前景串流與背景任務事件流共用）*/
/* readSSE 已移至共用 app.js（任務台亦用） */

/* ── 送出訊息 ──────────────────────────────────────────── */
async function send(textOverride) {
  // 佇列回送才傳字串；其餘（含事件處理器誤傳的 Event）一律讀輸入框，避免變成「[object …]」。
  const override = typeof textOverride === "string" ? textOverride : null;
  const text = override != null ? override : $("#input").value.trim();
  if (!text) return;
  // 回覆中仍可繼續輸入（override 為佇列回送，不再處理）：
  //   優先「插入當前回合」(CC 式 steering)——agent 於下個步驟邊界接手，不中斷當前工具、不重啟；
  //   若 agent 不在 live（回合剛結束/之間）→ 退回排隊，本輪結束後自動送出。
  if (override == null && currentRun()) {
    const run = currentRun();
    $("#input").value = ""; autosize();
    let injected = false;
    if (run.steerKey) {
      try {
        const r = await api("/v1/stream/steer", { method: "POST", body: JSON.stringify({ key: run.steerKey, text }) }).then((x) => x.json());
        injected = !!(r && r.injected);
      } catch (e) { injected = false; }
    }
    const h = $("#status-hint");
    if (injected) {
      messages.push({ role: "user", text, _steer: true });   // 立即在對話串顯示插話
      render(); scrollDown();
      if (h) h.textContent = "已插入本輪 · agent 會在下一步接手";
    } else {
      (messages._queue || (messages._queue = [])).push(text);
      if (h) h.textContent = "已排入佇列（" + messages._queue.length + " 則，本輪結束後自動送出）";
    }
    return;
  }
  if (override == null) { $("#input").value = ""; autosize(); }

  messages.push({ role: "user", text });
  const asst = { role: "assistant", text: "", tools: [], _procOpen: false, phase: "thinking" };
  messages.push(asst);
  render();
  scrollDown();

  const model = chosenModel(); // 此則用的模型（回覆中可切換，下一則生效）

  if (bgMode) { sendBackground(text, asst, model); return; } // 背景：不鎖輸入框，可連續派多個

  // 前景串流：建一個綁定「此對話」的 run（切走不中斷）
  const steerKey = Date.now().toString(36) + Math.random().toString(36).slice(2, 8); // 供回覆中「即時插話」定位這條串流
  const run = { chatMsgs: messages, sessionId, asst, abort: new AbortController(), startedAt: Date.now(), tokens: 0, firstUserText: text, space: curSpace, pack: $("#pack").value, model, steerKey };
  activeRuns.add(run);
  refreshStreamingUI();
  ensureTicker();
  if (run.sessionId) renderChats(); // 續接既有對話：側欄即時顯示進行中指示
  const body = JSON.stringify({ pack: run.pack, mode: "turn", input: text, sessionId: run.sessionId || undefined, workspace: run.space, model: run.model || undefined, thinking: chosenThinking(), steerKey: run.steerKey });
  try {
    const resp = await api("/v1/stream", { method: "POST", body, signal: run.abort.signal });
    if (!resp.ok || !resp.body) {
      run.asst.phase = "";
      run.asst.text = "⚠ 連線失敗（" + resp.status + "）";
    } else {
      await readSSE(resp, (ev) => onRunEvent(run, ev));
    }
  } catch (e) {
    if (e.name !== "AbortError") {
      run.asst.phase = "";
      run.asst.text = (run.asst.text || "") + "\n⚠ " + esc(e.message);
    }
  }
  activeRuns.delete(run);
  finalizeRun(run);
}

/* ── 背景任務：派到 /v1/tasks，訂閱事件流，進度進 HUD ───────── */
async function sendBackground(text, asst, model) {
  const pack = $("#pack").value;
  let resp, j;
  try {
    resp = await api("/v1/tasks", { method: "POST", body: JSON.stringify({ pack, mode: "turn", input: text, sessionId: sessionId || undefined, workspace: curSpace, model: model || undefined, thinking: chosenThinking() }) });
    j = await resp.json().catch(() => ({}));
  } catch (e) {
    asst.phase = ""; asst.text = "⚠ 背景任務建立失敗：" + esc(e.message); render(); return;
  }
  if (!resp.ok || !j.taskId) {
    asst.phase = ""; asst.text = "⚠ 無法建立背景任務（" + resp.status + "）"; render(); return;
  }
  const task = { id: j.taskId, pack: j.pack || pack, goal: text, status: "running", phase: "starting", steps: 0, startedAt: Date.now(), finishedAt: null, asst, session: sessionId };
  bgTasks.unshift(task);
  while (bgTasks.length > 20) bgTasks.pop();
  saveBgTasks();
  render();
  startBgTicker();
  pumpBgEvents(task); // 不 await：讓輸入框立刻可用
}

async function pumpBgEvents(task) {
  try {
    const resp = await api("/v1/tasks/" + task.id + "/events");
    if (!resp.ok || !resp.body) { task.status = "error"; updateHud(); return; }
    await readSSE(resp, (ev) => { updateBgProgress(task, ev); handleEvent(ev, task.asst); if (messages.includes(task.asst) && !composing) { render(); scrollDown(); } });
  } catch (e) {
    task.status = "error"; task.error = e?.message || String(e);
  }
  if (task.status === "running") task.status = "done"; // 串流關閉但沒收到 end
  task.finishedAt = task.finishedAt || Date.now();
  task.asst.phase = "";
  // 落地：仍在同一對話（asst 還在 messages）才寫入轉錄、採用 sessionId
  if (messages.includes(task.asst)) {
    if (task.session) sessionId = task.session;
    finalize(task.asst, task.goal);
  }
  saveBgTasks(); // 落地最新狀態（done/error/cancelled）→ 下次刷新不再嘗試重連此任務
  updateHud();
}

/* 背景任務進度（給 HUD），不碰前景 sessionId（避免切換對話時被污染）*/
function updateBgProgress(task, ev) {
  switch (ev.type) {
    case "status": task.status = ev.status; break;
    case "tool": task.steps++; task.phase = "acting"; break;
    case "sub_tool": task.steps++; break;
    case "text": task.phase = "thinking"; break;
    case "round": task.phase = "thinking"; break;
    case "phase": task.phase = ev.phase; break;
    case "needs_input": task.phase = "needs-input"; break;
    case "end":
      task.status = ev.status || "done";
      task.phase = task.status;
      task.finishedAt = Date.now();
      if (ev.result?.sessionId) task.session = ev.result.sessionId;
      break;
  }
}

function startBgTicker() {
  if (bgTimer) return;
  bgTimer = setInterval(() => {
    if (!bgTasks.some((t) => t.status === "running" || t.status === "queued")) { clearInterval(bgTimer); bgTimer = null; return; }
    updateHud(); // 只刷新軌道（更新經過時間），不重繪對話避免捲動跳動
  }, 1000);
}

/* 只更新右側軌道內容（不動 thread）*/
function updateHud() {
  if (!railActive()) return;
  const body = $("#worklog-body");
  if (body) body.innerHTML = view === "tui" ? renderHud() : renderRail();
}

function cancelBg(id) {
  api("/v1/tasks/" + id + "/cancel", { method: "POST" }).catch(() => {});
}
window.cancelBg = cancelBg; // 給 HUD 裡的 onclick 用

function handleEvent(ev, asst) {
  switch (ev.type) {
    case "text":
      asst.phase = "";
      asst.text += ev.delta || "";
      break;
    case "tool":
      asst.tools.push({ name: ev.name, args: ev.args, done: false });
      asst.phase = "acting";
      break;
    case "tool_end": {
      const t = [...asst.tools].reverse().find((x) => x.name === ev.name && !x.done);
      if (t) {
        t.done = true;
        t.isError = ev.isError;
        if (ev.diff) t.diff = ev.diff;
      }
      break;
    }
    case "sub_tool": {
      // 子 agent 的工具呼叫：掛在當前進行中的 spawn_agent 步驟底下
      const parent = [...asst.tools].reverse().find((x) => !x.done);
      if (parent) {
        (parent.sub || (parent.sub = [])).push({ name: ev.name, args: ev.args, done: false });
        parent.subThinking = ""; // 進入工具動作，清掉思考行
      }
      break;
    }
    case "sub_think": {
      // 子 agent 的即時思考（串流文字片段）
      const parent = [...asst.tools].reverse().find((x) => !x.done);
      if (parent) parent.subThinking = ev.text;
      break;
    }
    case "sub_tool_end": {
      const parent = [...asst.tools].reverse().find((x) => !x.done);
      const s = parent && parent.sub && [...parent.sub].reverse().find((x) => x.name === ev.name && !x.done);
      if (s) { s.done = true; s.isError = ev.isError; }
      break;
    }
    case "round":
      asst.phase = "thinking";
      break;
    case "phase":
      asst.phase =
        { verifying: "verifying", verified: "verified", fixing: "fixing" }[ev.phase] || ev.phase;
      break;
    case "done":
      if (!asst.text && ev.text) asst.text = ev.text;
      if (ev.verify) asst.verify = ev.verify;   // 驗收裁決（DoD 徽章用）
      asst.stopReason = ev.stopReason || asst.stopReason || "stop"; // 保底提示用
      break;
    case "end": // 背景任務結束：補文字即可，sessionId 由 pumpBgEvents 控管（避免污染前景）
      if (!asst.text && ev.result?.text) asst.text = ev.result.text;
      if (ev.result?.verify) asst.verify = ev.result.verify;
      break;
    case "error":
      asst.phase = "";
      asst.text = (asst.text || "") + "\n⚠ " + (ev.error || "發生錯誤");
      break;
  }
  // 注意：render/狀態更新由呼叫端負責（前景 onRunEvent 依所看對話而定；背景 pumpBgEvents 自行 gate）
}

/* 前景 run 的事件處理：mutate run.asst + 累計 token + 更新 sessionId；只有該對話仍開著才重繪/更新狀態列 */
function onRunEvent(run, ev) {
  // 串流首事件：拿到 sessionId → 全新對話立刻登進側欄（含進行中指示），切走後仍能切回看它續播
  if (ev.type === "session" && ev.sessionId) {
    // 上下文視窗與自動壓縮門檻：串流首事件帶來 → 存到 run，供佔用指示器算 %（切走再切回仍可查 sessionCtx）
    run.ctxWindow = ev.contextWindow || run.ctxWindow || null;
    run.ctxCompactAt = ev.compactAt || run.ctxCompactAt || null;
    if (!run.sessionId) {
      run.sessionId = ev.sessionId;
      if (run.chatMsgs === messages) sessionId = ev.sessionId;
      upsertChat({ id: ev.sessionId, title: run.firstUserText.slice(0, 40), ts: Date.now(), space: run.space, pack: run.pack });
      renderChats();
    }
    if (run.chatMsgs === messages) refreshCtxMeter();
    return;
  }
  // 插話已被 agent 套用 → 當前回合已收尾，為插話後的回覆開一個新的 assistant 泡泡（避免和前一輪的字混在一起）
  if (ev.type === "steered") {
    const asst2 = { role: "assistant", text: "", tools: [], _procOpen: false, phase: "thinking", _afterSteer: true };
    run.chatMsgs.push(asst2);
    run.asst = asst2;
    if (run.chatMsgs === messages) { render(); scrollDown(); }
    return;
  }
  handleEvent(ev, run.asst);
  if (ev.type === "done" || ev.type === "error") run.gotDone = true; // 收到收尾事件 → 非連線中斷
  if (ev.type === "usage") {
    run.tokens += (ev.input || 0) + (ev.output || 0);        // 本輪累計（↑ N tokens 顯示用）
    // 上下文佔用取「最新快照」而非累加：每步 input 已含整段歷史，最新一步＝當前佔用（壓縮後會回落）
    if (ev.contextTokens != null) run.ctxTokens = ev.contextTokens;
    if (run.chatMsgs === messages) refreshCtxMeter();
  }
  if (ev.type === "compact") {
    // 回合內自動壓縮已觸發：① footer 指示器記回落值 + 閃一下提示 ② 往對話流插一條「持久」分隔標記
    // （對齊 TUI/CC：footer 只閃 2.6s 且易錯過，這條在轉錄裡永久保留，重整/事後回看都在）
    run.ctxTokens = ev.tokensAfter || run.ctxTokens;
    run.ctxJustCompacted = ev.tokensBefore || true;
    const win = run.ctxWindow || null;
    const divider = { role: "divider", _compact: {
      before: ev.tokensBefore || 0, after: ev.tokensAfter || 0,
      summarized: ev.summarized || 0, kept: ev.kept || 0,
      pct0: win ? Math.round(((ev.tokensBefore || 0) / win) * 100) : null,
      pct1: win ? Math.round(((ev.tokensAfter || 0) / win) * 100) : null,
    } };
    // 插在「本回合的 user 訊息」之前：讀起來就是「…較舊對話… ⊙已壓縮─── 🙂本輪提問 🤖回覆」
    const ai = run.chatMsgs.indexOf(run.asst);
    let at = ai >= 0 ? ai : run.chatMsgs.length;
    if (ai > 0 && run.chatMsgs[ai - 1] && run.chatMsgs[ai - 1].role === "user") at = ai - 1;
    run.chatMsgs.splice(at, 0, divider);
    // 落地在 finalizeRun 的 saveTranscript（已含 _compact 欄位）；此處僅即時重繪
    if (run.chatMsgs === messages) { render(); scrollDown(); refreshCtxMeter(); }
  }
  if (ev.type === "done" && ev.sessionId) {
    run.sessionId = ev.sessionId;
    if (run.chatMsgs === messages) sessionId = ev.sessionId; // 該對話仍開著才同步全局
  }
  if (run.chatMsgs === messages) {
    if (!composing) scheduleStreamRender();
    updateStreamStatus(run);
  }
}

/* 串流結束：落地 */
function finalize(asst, firstUserText) {
  render();
  loadFiles(); // 每輪結束自動刷新檔案列表（agent 可能剛產出/改動檔案）
  if (!sessionId) return; // 沒拿到 sessionId → 不落地
  const title = (allChats().find((c) => c.id === sessionId)?.title) || firstUserText.slice(0, 40);
  upsertChat({ id: sessionId, title, ts: Date.now(), space: curSpace, pack: $("#pack").value });
  saveTranscript(sessionId, messages.map((m) => ({ role: m.role, text: m.text, tools: m.tools || [], verify: m.verify, _steer: m._steer, _afterSteer: m._afterSteer, _compact: m._compact })));
  renderChats();
}

/* 保底：每輪結束都要有「可見結果」——正常內容、截斷提示、中斷、空回應、連線中斷，
   五種結局都給使用者一句話，絕不留半截文字或空白泡泡發呆。 */
function ensureReply(run) {
  const a = run.asst;
  if (a.text && a.text.startsWith("⚠")) return;                 // 已是錯誤訊息（error 事件塞的），不再疊
  const hasContent = !!a.text || (a.tools && a.tools.length);
  if (run.userStopped) { a.note = "已中斷"; return; }
  if (!run.gotDone) { a.note = hasContent ? "連線中斷，回覆可能不完整，請重試" : "這輪沒有取得回覆（連線中斷或空回應），請重試"; return; }
  if (a.stopReason === "length") { a.note = "回覆已達輸出上限被截斷（可調高 model 的 maxTokens）"; return; }
  if (!hasContent) { a.note = "模型這輪沒有產生內容，請重試"; return; }
}

/* 前景 run 結束落地：以 run 自己的 chatMsgs / sessionId 寫入轉錄，不依賴「目前所看對話」。 */
function finalizeRun(run) {
  run.asst.phase = "";
  ensureReply(run);                                             // 保證這輪有可見結果
  const sid = run.sessionId;
  if (run.chatMsgs === messages) { render(); loadFiles(); }   // 該對話仍開著才刷新畫面/檔案列表
  refreshStreamingUI();                                        // 同步送出/停止鈕、游標
  if (!sid) { renderChats(); return; }                          // 沒拿到 sessionId → 不落地（僅刷新列表）
  const title = (allChats().find((c) => c.id === sid)?.title) || run.firstUserText.slice(0, 40);
  upsertChat({ id: sid, title, ts: Date.now(), space: run.space, pack: run.pack });
  saveTranscript(sid, run.chatMsgs.map((m) => ({ role: m.role, text: m.text, tools: m.tools || [], verify: m.verify, note: m.note, _steer: m._steer, _afterSteer: m._afterSteer, _compact: m._compact })));
  renderChats();
  // 佇列：本輪結束後，若仍在同一對話且非使用者中止 → 自動送出下一則排隊訊息。
  const q = run.chatMsgs && run.chatMsgs._queue;
  if (q && q.length && messages === run.chatMsgs && !run.userStopped) {
    const next = q.shift();
    const h = $("#status-hint"); if (h) h.textContent = q.length ? "佇列剩 " + q.length + " 則…" : "";
    setTimeout(() => send(next), 30);
  }
}

/* Esc / 停止鈕：只中止「目前所看對話」的 run（其他對話不受影響）。 */
function stopStream() {
  const run = currentRun();
  if (run) { run.userStopped = true; try { run.abort.abort(); } catch { /* 略 */ } } // abort → send() 的 catch 收尾（finalizeRun）
}

let streamTimer = null;

/* 依「目前所看對話」是否有進行中的 run，同步輸入區狀態（送出/停止鈕、打字游標旗標、狀態列）。 */
function refreshStreamingUI() {
  const run = currentRun();
  streaming = !!run;
  $("#send-btn").style.display = run ? "none" : "";
  $("#stop-btn").style.display = run ? "" : "none";
  if (run) { updateStreamStatus(run); ensureTicker(); }
  else $("#status-hint").innerHTML = "";
  refreshCtxMeter(); // 同步當前對話的上下文佔用指示器（切換對話/新對話/串流起停都會經過這裡）
}

/* 每秒刷新狀態列經過時間；只要還有任一 run 就持續（切到哪個對話就顯示哪個的計時）。 */
function ensureTicker() {
  if (streamTimer) return;
  streamTimer = setInterval(() => {
    if (!activeRuns.size) { clearInterval(streamTimer); streamTimer = null; return; }
    const run = currentRun();
    if (run) updateStreamStatus(run);
  }, 1000);
}

/* token 數壓縮顯示：1234 → 1.2k */
function fmtTokens(n) {
  if (n < 1000) return String(n);
  return (n / 1000).toFixed(n < 10000 ? 1 : 0).replace(/\.0$/, "") + "k";
}

/* 上下文佔用指示器（對標 Claude Code 的 context 進度）：顯示當前對話佔用模型視窗的百分比。
   來源優先取「所看對話」進行中的 run（即時），否則回退 sessionCtx（此對話上次快照）。
   逼近自動壓縮門檻（compactAt＝視窗−reserve）轉琥珀、達門檻轉紅；剛壓縮時閃一下提示。
   無視窗（模型未設 contextWindow）或尚無用量數據 → 隱藏（誠實：算不出就不假裝）。 */
function refreshCtxMeter() {
  const el = $("#ctx-meter");
  if (!el) return;
  const T = (k, f) => (window.t ? t(k, f) : f);
  const run = currentRun();
  let win = null, tokens = null, compactAt = null, justCompacted = false;
  if (run && run.ctxWindow) {
    win = run.ctxWindow; tokens = run.ctxTokens || 0; compactAt = run.ctxCompactAt || null; justCompacted = !!run.ctxJustCompacted;
    if (run.sessionId) sessionCtx.set(run.sessionId, { tokens, window: win, compactAt }); // 落快照供之後切回顯示
  } else if (sessionId && sessionCtx.has(sessionId)) {
    const s = sessionCtx.get(sessionId); win = s.window; tokens = s.tokens; compactAt = s.compactAt;
  }
  const fill = el.querySelector(".ctx-fill");
  const label = el.querySelector(".ctx-label");
  if (!win || tokens == null || !(tokens > 0)) { el.classList.remove("on", "warn", "crit"); return; }
  const pct = Math.min(100, Math.round((tokens / win) * 100));
  const warnPct = compactAt ? (compactAt / win) * 100 : 80; // 逼近壓縮門檻的百分位（實際觸發點）
  el.classList.add("on");
  el.classList.toggle("crit", pct >= warnPct);                 // 達門檻：壓縮隨時觸發
  el.classList.toggle("warn", pct >= warnPct - 10 && pct < warnPct); // 逼近門檻：預警
  if (fill) fill.style.width = pct + "%";
  const tip = T("ctx.tooltip", "上下文 %p% · %u / %w · 逼近 %c% 自動壓縮")
    .replace("%p", pct).replace("%u", fmtTokens(tokens)).replace("%w", fmtTokens(win)).replace("%c", Math.round(warnPct));
  el.title = tip;
  el.setAttribute("aria-label", tip);
  if (justCompacted && run) {
    label.textContent = T("ctx.compacted", "✓ 已自動壓縮");
    label.classList.add("ctx-flash");
    clearTimeout(ctxFlashTimer);
    ctxFlashTimer = setTimeout(() => { if (run) run.ctxJustCompacted = false; refreshCtxMeter(); }, 2600);
  } else {
    label.textContent = pct + "%";
    label.classList.remove("ctx-flash");
  }
}

/* 狀態列（針對給定 run）：跳動點 + 當前階段 + 經過時間 + 累計 token + Esc 中斷提示。 */
function updateStreamStatus(run) {
  run = run || currentRun();
  if (!run) return;
  const last = run.chatMsgs[run.chatMsgs.length - 1];
  const ph = last && last.phase ? (PHASE_TEXT[last.phase] || last.phase) : "回覆中";
  const el = fmtElapsed(Date.now() - run.startedAt);
  const tok = run.tokens ? ` · ↑ ${fmtTokens(run.tokens)} tokens` : "";
  $("#status-hint").innerHTML =
    `<span class="live-dot" aria-hidden="true"></span>${esc(ph.replace(/…$/, ""))} · ${el}${tok}` +
    ` · <span class="esc-hint">Esc 中斷</span>`;
}

/* ── 輸入框控制 ─────────────────────────────────────────── */
function autosize() {
  inp.style.height = "auto";
  inp.style.height = Math.min(200, inp.scrollHeight) + "px";
}

inp.addEventListener("input", autosize);

inp.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    send();
  }
});

$("#send-btn").onclick = () => send();
$("#stop-btn").onclick = stopStream;

/* ── 啟動 ──────────────────────────────────────────────── */
renderChats();
render();
inp.focus();
loadFiles();
restoreBgTasks(); // 刷新後自動重連仍在跑的背景任務（重建卡片 + 過程）

/* 手機上顯示側邊欄 */
function showSide() {
  const side = $(".side");
  if (side) {
    side.style.display = "flex";
    side.style.position = "fixed";
    side.style.inset = "0";
    side.style.zIndex = "50";
    side.style.background = "var(--bg)";
  }
}

/* 點擊對話後在手機上隱藏側邊欄 */
function openChat(id) {
  sessionId = id;
  const live = [...activeRuns].find((r) => r.sessionId === id);
  messages = live ? live.chatMsgs : loadTranscript(id); // 有進行中的 run → 接回它的即時陣列
  render();
  renderChats();
  scrollDown();
  refreshStreamingUI();

  const side = $(".side");
  if (side && window.innerWidth < 768) {
    side.style.display = "none";
  }
}
</script>
