<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>xitto · 許願台</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<!-- 設計系統 + 共享工具庫 -->
<link rel="stylesheet" href="shared/style.css">
<!-- 設定注入：server 會替換這些佔位符（HTML 才會被替換，靜態 app.js 不會），app.js 從 window.__XITTO__ 讀 -->
<script>window.__XITTO__ = { token: "__SERVER_TOKEN__", packs: __PACKS__, local: __LOCAL__ };</script>
<script src="shared/app.js"></script>
<style>
/* ── Wishboard 頁面樣式 ──────────────────────────────────── */

:root { --sidebar-w: 300px; --max-w: 1320px; }

/* 全幅 app-shell：左側欄固定寬 + 右主區填滿，整體鋪滿視窗（無置中容器、無留白）*/
.shell {
  display: grid;
  grid-template-columns: var(--sidebar-w) minmax(0, 1fr);
  height: 100vh;
  overflow: hidden;
}

/* ── 側邊欄 ── */
.sidebar {
  display: flex;
  flex-direction: column;
  min-height: 0;
  background: var(--inset);
  border-right: 1px solid var(--line);
  overflow: hidden;
}

.sidebar-head {
  padding: var(--sp-4) var(--sp-3) var(--sp-3);
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}

.brand h1 {
  font-size: 16px;
  font-weight: 700;
  margin: 0;
  white-space: nowrap;
}

.brand-tagline {
  color: var(--dim);
  font-size: 12px;
  margin: var(--sp-1) 0 0;
  line-height: 1.4;
}

.project-bar {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  margin-top: var(--sp-3);
}

.project-bar select { flex: 1; min-width: 0; }

.icon-btn {
  flex-shrink: 0;
  padding: var(--sp-2);
  font-size: 15px;
  line-height: 1;
  border: 1px solid var(--line);
}

/* 兩段：歷史取內容高度（上限 45%）、檔案長高填滿剩餘側欄 */
.sidebar > .sidebar-section { margin: var(--sp-3) var(--sp-3) 0; }
.sidebar > .sidebar-section:first-of-type { flex: 0 1 auto; max-height: 45%; }
.sidebar > .sidebar-section:last-of-type  { flex: 1 1 auto; margin-bottom: var(--sp-3); }

.sidebar-foot {
  margin-top: auto;
  padding: var(--sp-3);
  border-top: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  flex-shrink: 0;
  font-size: 13px;
}
.sidebar-foot a { color: var(--accent); }

/* 許願區（主區頂部，全寬）*/
.wish-zone {
  padding: var(--sp-5) var(--sp-6) var(--sp-3);
  flex-shrink: 0;
}

.wish-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: var(--sp-5);
  box-shadow: var(--shadow-md), inset 0 1px 0 var(--hairline);
  transition: border-color var(--duration-fast) var(--ease-out),
              box-shadow var(--duration-fast) var(--ease-out);
}

.wish-card:focus-within {
  border-color: color-mix(in srgb, var(--accent) 55%, var(--line));
  box-shadow: var(--shadow-md), 0 0 0 3px var(--accent-soft);
}

.wish-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--dim);
  margin-bottom: var(--sp-2);
}

.wish-textarea {
  width: 100%;
  min-height: 80px;
  background: var(--inset);
  resize: vertical;
  font: inherit;
  line-height: 1.6;
}

.wish-footer {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  margin-top: var(--sp-3);
  flex-wrap: wrap;
}

.wish-hint {
  color: var(--dim);
  font-size: 12px;
}

.route-hint {
  color: var(--ok);
  font-size: 12.5px;
  margin-top: var(--sp-2);
  display: none;
}

.route-hint.show { display: block; }

/* 主體：側邊欄 + 主區 */
/* 主區：垂直填滿視窗（許願在上、工作區填滿剩餘並自捲）*/
.main {
  display: flex;
  flex-direction: column;
  min-width: 0;
  min-height: 0;
  overflow: hidden;
}

.sidebar-section {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: var(--sp-3);
  box-shadow: var(--shadow-sm), inset 0 1px 0 var(--hairline);
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.sidebar-section h3 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--dim);
  margin: 0 0 var(--sp-2);
  padding-bottom: var(--sp-2);
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}

.sidebar-section .scroll {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}

.history-item {
  display: block;
  width: 100%;
  text-align: left;
  padding: var(--sp-2) var(--sp-2);
  margin: 2px 0;
  border-radius: var(--r-sm);
  background: transparent;
  border: 1px solid transparent;
  cursor: pointer;
  transition: background var(--duration-fast), border-color var(--duration-fast);
}

.history-item:hover {
  background: var(--inset);
}

.history-item.active {
  background: var(--inset);
  border-color: var(--accent);
}

.history-item .g {
  font-size: 13.5px;
  line-height: 1.4;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--fg);
  padding: 0;
  font-weight: inherit;
}

.history-item .m {
  color: var(--dim);
  font-size: 11px;
  margin-top: 2px;
}

/* 檔案列表（資料夾/上層仍是單一按鈕，需覆寫全域 button 樣式） */
.file-up,
.fs-row {
  border: 1px solid transparent;
  background: transparent;
  font: inherit;
  font-weight: inherit;
  text-align: left;
  padding: var(--sp-2);
}

/* 檔案列：容器 div（開啟鈕 + 刪除鈕並排）——不可用巢狀 <button>，否則瀏覽器會把刪除鈕斷到下一行 */
.file-row {
  display: flex;
  align-items: center;
  border-radius: var(--r-sm);
  font-size: 13.5px;
}

.file-row:hover { background: var(--inset); }

.file-open {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  padding: var(--sp-2);
  background: transparent;
  border: 0;
  cursor: pointer;
  text-align: left;
  font: inherit;
  font-weight: inherit;
  color: inherit;
  border-radius: var(--r-sm);
}

.file-open .name {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--accent);
}

.file-open .size {
  color: var(--dim);
  font-size: 12px;
  flex-shrink: 0;
}

.del {
  opacity: 0;
  background: transparent;
  border: 0;
  cursor: pointer;
  font-size: 12px;
  flex-shrink: 0;
  padding: var(--sp-1) var(--sp-2);
  color: var(--dim);
  transition: opacity var(--duration-fast), color var(--duration-fast);
}

.file-row:hover .del { opacity: .6; }
.del:hover { opacity: 1; color: var(--danger); }

.file-up {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  color: var(--dim);
  font-size: 13px;
  border-radius: var(--r-sm);
  cursor: pointer;
}

.file-up:hover { color: var(--fg); }

.file-breadcrumb {
  padding: var(--sp-2);
  font-size: 12px;
  color: var(--dim);
  border-bottom: 1px solid var(--line);
}

/* 工作區：填滿主區剩餘高度，內容多了自捲 */
.work {
  flex: 1;
  min-width: 0;
  min-height: 0;
  overflow-y: auto;
  padding: 0 var(--sp-6) var(--sp-6);
  display: flex;
  flex-direction: column;
}

/* 當前任務容器：填滿工作區（讓空狀態置中撐滿、任務卡時自然由上排起）*/
#current-task {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

/* 任務卡 */
.task-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: var(--sp-5);
  margin-bottom: var(--sp-4);
  box-shadow: var(--shadow-md);
  animation: fade-in var(--duration-base) var(--ease-out);
}

.task-header {
  display: flex;
  align-items: flex-start;
  gap: var(--sp-3);
  flex-wrap: wrap;
}

.task-goal {
  flex: 1;
  font-weight: 600;
  font-size: 15px;
  line-height: 1.4;
  min-width: 0;
}

.task-meta {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.task-actions {
  display: flex;
  gap: var(--sp-2);
}

/* 進度區 */
.progress {
  margin-top: var(--sp-3);
  color: var(--dim);
  font-size: 13px;
}

.progress .phase {
  color: var(--accent);
  margin-bottom: var(--sp-1);
}

.progress .steps {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.progress .step {
  color: var(--dim);
  font-size: 13px;
  padding: 2px 0;
}

.progress .step.current {
  color: var(--fg);
  font-weight: 500;
}

.progress .step.thinking {
  color: var(--warn);
  font-style: italic;
}

/* 待辦清單 */
.todos {
  margin-top: var(--sp-3);
  padding-top: var(--sp-3);
  border-top: 1px solid var(--line);
}

.todos-label {
  font-size: 12px;
  color: var(--dim);
  margin-bottom: var(--sp-2);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .04em;
}

.todo-item {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  padding: 3px 0;
  font-size: 13px;
  color: var(--dim);
}

.todo-item.in_progress { color: var(--accent); font-weight: 600; }
.todo-item.completed { color: var(--ok); text-decoration: line-through; }

/* 過程日誌 */
.log-section {
  margin-top: var(--sp-3);
}

.log-toggle {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  font-size: 13px;
  color: var(--accent);
  cursor: pointer;
  padding: var(--sp-2) 0;
  background: none;
  border: none;
  font-weight: inherit;
}

.log-toggle:hover { text-decoration: underline; }

.log-list {
  margin-top: var(--sp-2);
  margin-left: var(--sp-4);
  border-left: 2px solid var(--line);
  padding-left: var(--sp-3);
}

.log-step {
  font-size: 13px;
  padding: var(--sp-1) 0;
  color: var(--fg);
}

.log-step.error { color: var(--danger); }
.log-step .dim { color: var(--dim); }

/* 彩色 diff */
.diff { margin: var(--sp-2) 0 var(--sp-2) var(--sp-4); font: 12px/1.5 ui-monospace, Menlo, monospace; }
.dh { color: var(--dim); font-size: 11px; margin-bottom: 2px; }
.dl { white-space: pre-wrap; }
.dl.add { color: var(--ok); }
.dl.del { color: var(--danger); }

/* 提問框 */
.question-box {
  margin-top: var(--sp-4);
  padding: var(--sp-3);
  background: var(--warnbg);
  border: 1px solid var(--warn);
  border-radius: var(--r-md);
}

.question-label {
  font-size: 12px;
  color: var(--warn);
  font-weight: 600;
  margin-bottom: var(--sp-2);
}

.question-input {
  width: 100%;
  margin-top: var(--sp-2);
}

/* 摘要 + 成品 */
.summary {
  margin-top: var(--sp-4);
  padding-top: var(--sp-4);
  border-top: 1px solid var(--line);
}

.summary-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--dim);
  margin-bottom: var(--sp-2);
}

.summary-text {
  white-space: pre-wrap;
  font-size: 14px;
  line-height: 1.7;
}

.artifacts {
  margin-top: var(--sp-4);
}

.artifacts-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--dim);
  margin-bottom: var(--sp-2);
}

.artifact-file {
  display: inline-flex;
  align-items: center;
  gap: var(--sp-1);
  padding: var(--sp-1) var(--sp-3);
  margin: var(--sp-1) var(--sp-1) 0 0;
  background: var(--inset);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  font-size: 13px;
  color: var(--accent);
  cursor: pointer;
  transition: border-color var(--duration-fast), background var(--duration-fast);
}

.artifact-file:hover {
  border-color: var(--accent);
  background: color-mix(in srgb, var(--accent) 10%, var(--inset));
}

.artifact-file.modified { color: var(--warn); }

/* 檔案位置 */
.file-location {
  margin-top: var(--sp-3);
  font-size: 12px;
  color: var(--dim);
}

.file-location code,
.file-location .loc-code {
  background: var(--inset);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 2px 7px;
  font: inherit;
  color: var(--fg);
}

.file-location .loc-code {
  cursor: pointer;
  transition: border-color var(--duration-fast);
}

.file-location .loc-code:hover {
  border-color: var(--accent);
}

/* Steer 框 */
.steer-zone {
  margin-top: var(--sp-4);
  padding-top: var(--sp-3);
  border-top: 1px dashed var(--line);
}

.steer-note {
  font-size: 12.5px;
  color: var(--ok);
  margin-bottom: var(--sp-2);
}

.steer-input {
  width: 100%;
  margin-top: var(--sp-2);
}

/* 繼續/調整 */
.continue-zone {
  margin-top: var(--sp-4);
  padding-top: var(--sp-3);
  border-top: 1px solid var(--line);
}

.continue-btn {
  margin-right: var(--sp-2);
}

.continue-box {
  margin-top: var(--sp-3);
}

.continue-textarea {
  width: 100%;
  margin-bottom: var(--sp-2);
}

/* 檔案預覽（與任務區互斥；顯示時填滿工作區並自捲）*/
.file-viewer {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  padding-top: var(--sp-4);
}
.file-viewer .md,
.file-viewer .viewer-pre,
.file-viewer .viewer-iframe { flex: 1; min-height: 0; }

.viewer-bar {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  font-size: 12px;
  color: var(--dim);
  margin-bottom: var(--sp-3);
  padding-bottom: var(--sp-2);
  border-bottom: 1px solid var(--line);
}

.viewer-bar a {
  color: var(--accent);
}

.viewer-pre {
  white-space: pre-wrap;
  font: 13px/1.5 ui-monospace, Menlo, monospace;
  background: var(--inset);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: var(--sp-3);
  overflow: auto;
  max-height: 420px;
}

.viewer-img {
  max-width: 100%;
  border-radius: var(--r-md);
}

.viewer-iframe {
  width: 100%;
  height: 420px;
  border: none;
  border-radius: var(--r-md);
  background: #fff;
}

/* 空狀態 */
.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  min-height: min(58vh, 480px);
  padding: var(--sp-10) var(--sp-6);
  border: 1px dashed var(--line);
  border-radius: var(--r-lg);
  background: color-mix(in srgb, var(--card) 50%, transparent);
}

.welcome-icon {
  font-size: 40px;
  line-height: 1;
  margin-bottom: var(--sp-4);
  filter: saturate(1.1);
}

.welcome-title {
  font-size: 19px;
  font-weight: 700;
  color: var(--fg);
  margin: 0 0 var(--sp-2);
  letter-spacing: -.01em;
}

.welcome-sub {
  color: var(--dim);
  font-size: 14px;
  line-height: 1.8;
  margin: 0;
  max-width: 380px;
}

/* 錯誤狀態 */
.error-msg {
  color: var(--danger);
  padding: var(--sp-3);
  background: color-mix(in srgb, var(--danger) 10%, transparent);
  border-radius: var(--r-md);
  margin-top: var(--sp-3);
  font-size: 13px;
}

/* 資料夾選擇 Modal */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, .6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fade-in var(--duration-fast) var(--ease-out);
}

.modal[hidden] { display: none; }

.modal-box {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  width: min(560px, 92vw);
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  padding: var(--sp-4);
  box-shadow: var(--shadow-card);
}

.modal-title {
  font-weight: 600;
  margin-bottom: var(--sp-3);
}

.fs-path {
  font: 12px ui-monospace, Menlo, monospace;
  color: var(--dim);
  margin-bottom: var(--sp-2);
  word-break: break-all;
}

.fs-list {
  flex: 1;
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: var(--r-md);
}

.fs-row {
  padding: var(--sp-2) var(--sp-3);
  cursor: pointer;
  font-size: 14px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: var(--sp-2);
}

.fs-row:last-child { border-bottom: none; }
.fs-row:hover { background: var(--inset); }
.fs-row.up { color: var(--dim); }
.fs-row.hid { color: var(--dim); }

.fs-drives {
  display: flex;
  flex-wrap: wrap;
  gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-3);
  border-bottom: 1px solid var(--line);
  background: var(--inset);
}

.fs-drive {
  font-size: 12px;
  padding: 3px var(--sp-2);
  background: transparent;
  color: var(--fg);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  cursor: pointer;
}

.fs-drive:hover { border-color: var(--accent); }

.fs-bar {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  margin-top: var(--sp-3);
}

.fs-hidden {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  font-size: 12.5px;
  color: var(--dim);
  cursor: pointer;
}

/* ── 響應式 ──────────────────────────────────────────── */
@media (max-width: 1024px) {
  :root { --sidebar-w: 260px; }
}

/* 窄螢幕：殼層改上下堆疊（側欄在上、主區在下），不再固定全高 */
@media (max-width: 860px) {
  .shell {
    grid-template-columns: 1fr;
    height: auto;
    min-height: 100vh;
    overflow: visible;
  }
  .sidebar {
    border-right: none;
    border-bottom: 1px solid var(--line);
    overflow: visible;
  }
  .sidebar > .sidebar-section:first-of-type,
  .sidebar > .sidebar-section:last-of-type { flex: none; max-height: 40vh; }
  .main { overflow: visible; }
  .work { overflow: visible; padding: 0 var(--sp-4) var(--sp-6); }
  .wish-zone { padding: var(--sp-4); }
}

@media (max-width: 480px) {
  .wish-footer { flex-direction: column; align-items: flex-start; }
  .wish-footer .spacer { display: none; }
}
</style>
</head>
<body>
<!-- 跳過導航 -->
<a href="#main-content" class="skip-link">跳到主要內容</a>

<!-- 全幅 app-shell：左側欄（品牌/專案/歷史/檔案/底部）+ 右主區（許願/工作區），撐滿整個視窗 -->
<div class="shell">
  <!-- 側邊欄 -->
  <aside class="sidebar" aria-label="專案導覽">
    <div class="sidebar-head">
      <div class="brand">
        <h1>🪄 xitto 許願台</h1>
        <p class="brand-tagline">說出你想完成的事，做完給你成品</p>
      </div>
      <div class="project-bar">
        <label for="space" class="sr-only">專案</label>
        <select id="space" aria-label="選擇專案空間"></select>
        <button class="ghost icon-btn" id="browse-btn" style="display:none" data-tooltip="選資料夾（就地工作）" aria-label="瀏覽並選擇資料夾">📁</button>
        <button class="ghost icon-btn" id="newspace-btn" data-tooltip="新專案" aria-label="新增專案空間">＋</button>
      </div>
    </div>

    <!-- 歷史成品 -->
    <section class="sidebar-section" aria-label="歷史成品">
      <h3>歷史成品</h3>
      <div class="scroll" id="history" role="list" aria-label="任務歷史"></div>
    </section>

    <!-- 檔案瀏覽器 -->
    <section class="sidebar-section" aria-label="工作區檔案">
      <h3>📂 檔案</h3>
      <div id="file-breadcrumb" class="file-breadcrumb" aria-live="polite"></div>
      <div class="scroll" id="wbfiles" role="tree" aria-label="檔案列表"></div>
    </section>

    <div class="sidebar-foot">
      <a href="/chat" class="ghost" style="text-decoration:none" aria-label="切換到對話模式（逐句協作）">💬 對話模式</a>
      <span class="spacer" aria-hidden="true"></span>
      <button class="ghost icon-btn" id="theme" data-tooltip="切換主題" aria-label="切換深色/淺色模式">🌙</button>
    </div>
  </aside>

  <!-- 主區 -->
  <main id="main-content" class="main" role="main">
    <!-- 許願區 -->
    <section class="wish-zone" aria-label="許願輸入">
      <div class="wish-card">
        <label for="goal" class="wish-label">你想完成什麼？</label>
        <textarea
          id="goal"
          class="wish-textarea"
          placeholder="說出你想完成的事⋯例如：把這個資料夾的 .md 整理成目錄 index.md；或抓 example.com 標題寫進 title.txt"
          aria-describedby="goal-hint"
        ></textarea>
        <div id="goal-hint" class="wish-hint">⌘ / Ctrl + Enter 送出</div>

        <div class="wish-footer">
          <label for="pack" class="sr-only">選擇領域</label>
          <select id="pack" aria-label="選擇領域"></select>
          <span class="spacer" aria-hidden="true"></span>
          <button class="primary" id="go-btn" aria-label="交辦這個任務">交辦 →</button>
        </div>

        <div id="route-hint" class="route-hint" role="status" aria-live="polite"></div>
      </div>
    </section>

    <!-- 工作區（填滿剩餘高度）-->
    <div class="work">
      <div id="current-task" aria-live="polite" aria-label="當前任務">
        <div class="welcome">
          <div class="welcome-icon" aria-hidden="true">🪄</div>
          <h2 class="welcome-title">說出你想完成的事</h2>
          <p class="welcome-sub">在上方輸入一句話，交給它去做——做完把成品給你。<br>左邊可看歷史成品與工作區檔案，點任一個在這裡展開。</p>
        </div>
      </div>
      <!-- 檔案預覽 -->
      <div id="file-viewer" class="file-viewer" hidden aria-label="檔案預覽"></div>
    </div>
  </main>
</div>

<!-- 資料夾選擇 Modal（position:fixed，置於 shell 外）-->
<div id="fs-modal" class="modal" hidden role="dialog" aria-modal="true" aria-labelledby="fs-modal-title">
  <div class="modal-box">
    <div class="modal-title" id="fs-modal-title">選一個資料夾（就地工作）</div>
    <div class="fs-path" id="fs-path" aria-live="polite"></div>
    <div class="fs-list" id="fs-list" role="tree" aria-label="資料夾列表"></div>
    <div class="fs-bar">
      <button class="ghost" onclick="fsHome()">🏠 家目錄</button>
      <label class="fs-hidden">
        <input type="checkbox" id="fs-hidden" onchange="fsToggleHidden()">
        顯示隱藏資料夾
      </label>
      <span class="spacer" aria-hidden="true"></span>
      <button class="ghost" onclick="closeFs()">取消</button>
      <button class="primary" onclick="chooseFs()">✓ 選這個</button>
    </div>
  </div>
</div>

<script>
/* ── Wishboard 應用邏輯 ──────────────────────────────────── */

/* 主題切換 */
$("#theme").onclick = () => {
  const t = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
  applyTheme(t);
};

/* 專案空間 */
renderSpaces($("#space"));
$("#space").onchange = () => {
  switchSpace($("#space").value);
  loadHistory();
  loadFiles();
};

/* 新增專案 */
$("#newspace-btn").onclick = () => {
  const raw = (
    prompt(
      LOCAL
        ? "新專案：輸入名稱，或貼上一個真實資料夾的絕對路徑（本地模式會就地改該資料夾）"
        : "新專案名稱（英數/底線/連字號）："
    ) || ""
  ).trim();
  if (!raw) return;
  const n = LOCAL && raw.startsWith("/") ? raw : raw.replace(/[^a-zA-Z0-9_-]/g, "");
  if (!n) return;
  addSpace(n);
  switchSpace(n);
  renderSpaces($("#space"));
  loadHistory();
  loadFiles();
};

/* 資料夾瀏覽器（本地模式）*/
if (LOCAL) $("#browse-btn").style.display = "";

let fsPath = null,
  fsShowHidden = localStorage.getItem("xk_fshidden") === "1";

$("#browse-btn").onclick = () => {
  $("#fs-modal").hidden = false;
  $("#fs-hidden").checked = fsShowHidden;
  fsGo(null);
  // focus trap
  $("#fs-list").querySelector("button, [tabindex='0'], .fs-row")?.focus();
};

function fsGo(opts) {
  opts = opts || {};
  const qs = [];
  if (opts.path) qs.push("path=" + encodeURIComponent(opts.path));
  if (opts.name) qs.push("name=" + encodeURIComponent(opts.name));
  if (opts.up) qs.push("up=1");
  if (fsShowHidden) qs.push("hidden=1");
  api("/v1/fs" + (qs.length ? "?" + qs.join("&") : ""))
    .then((r) => r.json())
    .then((r) => {
      if (r.error) {
        alert(r.error);
        return;
      }
      fsPath = r.path;
      window._fsHome = r.home;
      $("#fs-path").textContent = "📂 " + r.path;

      const drivesRow =
        r.drives && r.drives.length
          ? `<div class="fs-drives">${r.drives.map(
              (dv) =>
                `<button class="fs-drive" onclick="fsGo({path:'${jsAttr(dv)}'})" title="切換到 ${esc(dv)}">💽 ${esc(dv.replace(/\\$/, ""))}</button>`
            ).join("")}</div>`
          : "";

      const rows = [
        `<button class="fs-row up" onclick="fsUp()" role="treeitem" tabindex="0" type="button">⬆ 上一層</button>`,
        ...(r.dirs.length
          ? r.dirs.map(
              (d) =>
                `<button class="fs-row${d.startsWith(".") ? " hid" : ""}" onclick="fsEnter('${jsAttr(d)}')" role="treeitem" tabindex="0" type="button">📁 ${esc(d)}</button>`
            )
          : [`<div class="empty" style="padding:${12}px">（沒有子資料夾，可直接選這個）</div>`]),
      ];

      $("#fs-list").innerHTML = drivesRow + rows.join("");
    })
    .catch(() => ({ error: "讀取失敗" }));
}

function fsEnter(name) {
  return fsGo({ path: fsPath, name });
}
function fsUp() {
  return fsGo({ path: fsPath, up: true });
}
function fsToggleHidden() {
  fsShowHidden = $("#fs-hidden").checked;
  localStorage.setItem("xk_fshidden", fsShowHidden ? "1" : "0");
  fsGo(fsPath);
}
function fsHome() {
  fsGo(window._fsHome || null);
}
function closeFs() {
  $("#fs-modal").hidden = true;
}
function chooseFs() {
  if (!fsPath) return;
  const p = fsPath;
  addSpace(p);
  switchSpace(p);
  renderSpaces($("#space"));
  closeFs();
  loadHistory();
  loadFiles();
}

/* 領域選單 */
renderPackSelect($("#pack"));

/* 許願提交 */
let activeId = null,
  polling = null;

$("#go-btn").onclick = async () => {
  const goal = $("#goal").value.trim();
  if (!goal) return;
  const picked = $("#pack").value;
  $("#go-btn").disabled = true;

  const rh = $("#route-hint");
  if (picked === "auto") {
    rh.classList.add("show");
    rh.textContent = "🪄 判斷適合的領域…";
  }

  const r = await api("/v1/tasks", {
    method: "POST",
    body: JSON.stringify({ pack: picked, mode: "goal", goal, workspace: curSpace }),
  }).then((r) => r.json());

  $("#go-btn").disabled = false;

  if (r.error) {
    alert(r.error);
    rh.classList.remove("show");
    return;
  }

  if (r.routed && r.pack) {
    rh.classList.add("show");
    rh.innerHTML = `🪄 已自動用「<b>${esc(packLabel(r.pack))}</b>」領域 · 不對的話可在上方下拉改選`;
  } else {
    rh.classList.remove("show");
  }

  $("#goal").value = "";
  closePreview();
  expandedLog = false;
  activeId = r.taskId;
  poll();
  loadHistory();
};

$("#goal").addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
    e.preventDefault();
    $("#go-btn").click();
  }
});

/* IME 保護旗標 */
let composing = false;
const inp = $("#goal");
wireComposition(inp);
inp.addEventListener("compositionstart", () => { composing = true; });
inp.addEventListener("compositionend", () => { composing = false; });

/* 輪詢 */
async function poll() {
  clearTimeout(polling);
  if (!activeId) return;

  const t = await api("/v1/tasks/" + activeId).then((r) => r.json());
  liveTask = t;

  const terminal = t.status === "done" || t.status === "error";
  if (!composing || terminal) renderCurrent(t);
  if (terminal) {
    loadHistory();
    loadFiles();
    return;
  }
  if (t.status === "needs-input") return;
  polling = setTimeout(poll, 1200);
}

/* 心跳：每秒更新「已進行 Ns」*/
setInterval(() => {
  if (liveTask && (liveTask.status === "running" || liveTask.status === "queued")) {
    const el = document.getElementById("elapsed");
    if (el) el.textContent = elapsedOf(liveTask) + "s";
  }
}, 1000);

/* 渲染當前任務 */
let liveTask = null;
let expandedLog = false;

const elapsedOf = (t) =>
  t.startedAt ? Math.max(0, Math.round((Date.now() - new Date(t.startedAt).getTime()) / 1000)) : 0;

function statusClass(s) {
  return s === "running" ? "running" : s === "needs-input" ? "needs" : s === "done" ? "done" : s === "error" || s === "cancelled" || s === "interrupted" ? "error" : "";
}

const STATUS_TEXT = {
  queued: "排隊中",
  running: "進行中…",
  "needs-input": "需要你回答",
  done: "已完成",
  error: "失敗",
  cancelled: "已中斷",
  interrupted: "已中斷(重啟)",
};

const PHASE_ZH = {
  starting: "啟動中",
  thinking: "思考中",
  acting: "執行中",
  verifying: "驗收中",
  verified: "驗收通過",
  fixing: "修正中",
  "needs-input": "等你回答",
};

function todosHtml(p) {
  if (!p || !p.todos || !p.todos.length) return "";
  const icons = { completed: "☑", in_progress: "◐", pending: "☐" };
  return `<div class="todos">
    <div class="todos-label">待辦</div>
    ${p.todos.map((td) => `<div class="todo-item ${td.status}">${icons[td.status] || "☐"} ${esc(td.content)}</div>`).join("")}</div>`;
}

function progressHtml(t) {
  const p = t.progress || {};
  const head = `${PHASE_ZH[p.phase] || "進行中"}${p.round ? ` · 第 ${p.round} 輪` : ""}${p.steps ? ` · ${p.steps} 個動作` : ""} · 已進行 <span id="elapsed">${elapsedOf(t)}s</span>`;
  const think = p.thinking ? `<div class="step thinking">💭 ${esc(p.thinking)}…</div>` : "";
  const steps = (p.recent || [])
    .slice()
    .reverse()
    .map((a, i) => `<div class="step ${i === 0 ? "current" : ""}">${i === 0 ? "▸" : "·"} ${esc(toolText(a))}</div>`)
    .join("");
  return `<div class="progress"><div class="phase dots">${head}</div>${think}<div class="steps">${steps}</div></div>`;
}

function logHtml(p) {
  if (!p || !(p.log || []).length) return `<div class="empty">（尚無步驟）</div>`;
  return p.log
    .map((s) => `<div class="log-step ${s.isError ? "error" : ""}">▸ ${esc(TOOL_ZH[s.name] || s.name)}${s.summary ? ` <span class="dim">${esc(s.summary)}</span>` : ""}${s.diff ? diffHtml(s.diff) : ""}</div>`)
    .join("");
}

function renderCurrent(t) {
  // 保住 steer 輸入框內容
  const ps = (() => {
    const el = document.getElementById("steerin");
    return el ? { v: el.value, f: document.activeElement === el, s: el.selectionStart } : null;
  })();

  const a = t.result?.artifacts;
  const files = a
    ? [...(a.created || []).map((f) => [f, "new"]), ...(a.modified || []).map((f) => [f, "mod"])]
    : [];
  const p = t.progress || {};
  const nLog = (p.log || []).length;

  const CANCELLABLE = ["queued", "running", "needs-input"];

  const logSec = nLog
    ? `<div class="log-section">
        <button class="log-toggle" onclick="toggleLog()" aria-expanded="${expandedLog}">
          ${expandedLog ? "▾" : "▸"} 展開過程（${nLog} 步）
        </button>
        ${expandedLog ? `<div class="log-list">${logHtml(p)}</div>` : ""}
      </div>`
    : "";

  $("#current-task").innerHTML = `<article class="task-card">
    <div class="task-header">
      <div class="task-goal">${esc(t.goal || "任務")}</div>
      <div class="task-meta">
        <span class="badge ${statusClass(t.status)}">${STATUS_TEXT[t.status] || t.status}${t.rounds ? ` · ${t.rounds} 輪` : ""}</span>
        ${t.pack ? `<span class="badge">${t.auto ? "🪄" : "🧭"} ${esc(packLabel(t.pack))}</span>` : ""}
        <span class="badge">📁 ${esc(t.workspace || "default")}</span>
      </div>
      <div class="task-actions">
        ${CANCELLABLE.includes(t.status) ? `<button class="danger" onclick="cancelTask('${t.taskId}')">停止</button>` : ""}
      </div>
    </div>

    ${t.status === "running" || t.status === "queued" ? progressHtml(t) : ""}
    ${todosHtml(t.progress)}
    ${logSec}

    ${t.status === "needs-input" ? `<div class="question-box">
      <div class="question-label">❓ ${esc(t.pending?.question)}</div>
      <label for="ans" class="sr-only">你的回答</label>
      <input id="ans" class="question-input" placeholder="輸入你的回答，按 Enter 送出">
    </div>` : ""}

    ${t.status === "running" ? `<div class="steer-zone">
      ${(p.steers || []).slice(-3).map((s) => `<div class="steer-note">✋ 已收到：${esc(s)}</div>`).join("")}
      <label for="steerin" class="sr-only">補充指示</label>
      <input id="steerin" class="steer-input" placeholder="想補充或調整方向？打字按 Enter——會在下一步納入">
    </div>` : ""}

    ${t.status === "done" ? `<div class="summary">
      <div class="summary-label">摘要</div>
      <div class="summary-text">${esc(t.result?.text || "")}</div>
    </div>` : ""}

    ${t.status === "error" ? `<div class="error-msg">⚠ ${esc(t.error)}</div>` : ""}

    ${files.length ? `<div class="artifacts">
      <div class="artifacts-label">📦 成品</div>
      ${files.map(([f, k]) => `<button class="artifact-file ${k === "mod" ? "modified" : ""}" onclick="viewFile('${t.taskId}','${encodeURIComponent(f)}','${jsAttr(f)}')" aria-label="${k === "mod" ? "修改" : "新建"} ${esc(f)}">${k === "mod" ? "~" : "+"} ${esc(f)}</button>`).join("")}
    </div>` : ""}

    ${t.result && t.result.workspaceDir ? `<div class="file-location">
      📂 位置：<button class="loc-code" title="點擊複製" onclick="navigator.clipboard?.writeText('${esc(t.result.workspaceDir)}')" type="button">${esc(t.result.workspaceDir)}</button>
    </div>` : ""}

    ${t.status === "done" ? `<div class="continue-zone">
      <button class="ghost continue-btn" onclick="toggleFollowup()">↳ 繼續／調整這個成果</button>
      <div id="fubox" style="display:none" class="continue-box">
        <label for="fugoal" class="sr-only">想怎麼調整或繼續</label>
        <textarea id="fugoal" class="continue-textarea" placeholder="想怎麼調整或繼續深入？（會接續這次的對話與檔案）"></textarea>
        <button class="primary" onclick="submitFollowup('${esc(t.sessionId || "")}','${esc(t.pack || "general")}','${esc(t.workspace || "default")}')">送出 →</button>
      </div>
    </div>` : ""}
  </article>`;

  /* 互動綁定 */
  if (t.status === "needs-input") {
    const inp = $("#ans");
    inp.focus();
    inp.onkeydown = async (e) => {
      if (e.key === "Enter" && inp.value.trim()) {
        const ans = inp.value.trim();
        inp.disabled = true;
        await api("/v1/tasks/" + t.taskId + "/answer", {
          method: "POST",
          body: JSON.stringify({ answer: ans }),
        });
        poll();
      }
    };
  }

  if (t.status === "running") {
    const si = $("#steerin");
    if (si) {
      if (ps) {
        si.value = ps.v;
        if (ps.f) {
          si.focus();
          try { si.setSelectionRange(ps.s, ps.s); } catch {}
        }
      }
      si.onkeydown = async (e) => {
        if (e.key === "Enter" && !e.isComposing && si.value.trim()) {
          const txt = si.value.trim();
          si.value = "";
          si.disabled = true;
          await api("/v1/tasks/" + t.taskId + "/steer", {
            method: "POST",
            body: JSON.stringify({ text: txt }),
          });
          si.disabled = false;
          si.focus();
        }
      };
    }
  }
}

function toggleLog() {
  expandedLog = !expandedLog;
  if (liveTask) renderCurrent(liveTask);
}

async function cancelTask(id) {
  await api("/v1/tasks/" + id + "/cancel", { method: "POST" });
  for (let i = 0; i < 10; i++) {
    await new Promise((r) => setTimeout(r, 600));
    const t = await api("/v1/tasks/" + id).then((r) => r.json());
    liveTask = t;
    renderCurrent(t);
    if (["done", "error", "cancelled"].includes(t.status)) {
      loadHistory();
      break;
    }
  }
}

/* 繼續/調整 */
function toggleFollowup() {
  const b = $("#fubox");
  if (b) {
    b.style.display = b.style.display === "none" ? "" : "none";
    if (b.style.display !== "none") $("#fugoal").focus();
  }
}

async function submitFollowup(sessionId, pack, workspace) {
  const goal = $("#fugoal").value.trim();
  if (!goal) return;
  const r = await api("/v1/tasks", {
    method: "POST",
    body: JSON.stringify({ pack, mode: "goal", goal, workspace, sessionId }),
  }).then((r) => r.json());
  if (r.error) {
    alert(r.error);
    return;
  }
  activeId = r.taskId;
  expandedLog = false;
  liveTask = null;
  poll();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* 檔案預覽 */
const IMG = /\.(png|jpe?g|gif|webp|svg)$/i;
const MD = /\.(md|markdown)$/i;
const HTMLF = /\.html?$/i;
const JSONF = /\.json$/i;

// 取檔 URL 產生器：任務成品走 /v1/tasks/<id>/file，工作區檔走 /v1/workspaces/file?ws=
const taskFileUrl = (taskId) => (p, extra = "") =>
  "/v1/tasks/" + taskId + "/file?path=" + encodeURIComponent(p) + "&token=" + encodeURIComponent(TOKEN) + extra;
const wsFileUrl = (ws) => (p, extra = "") =>
  "/v1/workspaces/file?ws=" + encodeURIComponent(ws) + "&path=" + encodeURIComponent(p) + "&token=" + encodeURIComponent(TOKEN) + extra;

// 預覽與任務區互斥（同一工作區，避免兩者同時渲染而重疊）
function showPreview() { $("#current-task").hidden = true; $("#file-viewer").hidden = false; }
function closePreview() { $("#file-viewer").hidden = true; $("#current-task").hidden = false; }

// 以給定的 urlFn 渲染檔案預覽（圖片/HTML/md/json/純文字）。
async function renderFile(urlFn, encPath, name) {
  const path = decodeURIComponent(encPath);
  const v = $("#file-viewer");
  showPreview();

  const bar = `<div class="viewer-bar"><span>📄 ${esc(name)}</span> · <a href="${urlFn(path)}" target="_blank">開新分頁</a> · <a href="${urlFn(path, "&download=1")}">下載</a><span class="spacer" aria-hidden="true"></span><button class="ghost" onclick="closePreview()" aria-label="關閉預覽">✕ 關閉</button></div>`;

  if (IMG.test(name)) {
    v.innerHTML = bar + `<img class="viewer-img" src="${urlFn(path)}" alt="${esc(name)}">`;
    return;
  }
  if (HTMLF.test(name)) {
    v.innerHTML = bar + `<iframe class="viewer-iframe" sandbox src="${urlFn(path)}"></iframe>`;
    return;
  }

  v.innerHTML = bar + `<div class="empty">載入中…</div>`;
  const txt = await fetch(urlFn(path)).then((r) => (r.ok ? r.text() : null)).catch(() => null);

  if (txt == null) {
    v.innerHTML = bar + `<div class="empty">（無法以文字呈現，請下載）</div>`;
    return;
  }

  let body;
  if (MD.test(name)) body = `<div class="md">${mdRender(txt)}</div>`;
  else if (JSONF.test(name)) {
    try {
      body = `<pre class="viewer-pre">${esc(JSON.stringify(JSON.parse(txt), null, 2))}</pre>`;
    } catch {
      body = `<pre class="viewer-pre">${esc(txt)}</pre>`;
    }
  } else body = `<pre class="viewer-pre">${esc(txt)}</pre>`;

  v.innerHTML = bar + body;
}

// 任務成品檔（成品卡點檔案）
function viewFile(taskId, encPath, name) {
  return renderFile(taskFileUrl(taskId), encPath, name);
}

/* 歷史成品 */
async function loadHistory() {
  const r = await api("/v1/tasks").then((r) => r.json());
  const list = (r.tasks || [])
    .filter((t) => t.mode === "goal" && (t.workspace || "default") === curSpace)
    .reverse();

  $("#history").innerHTML = list.length
    ? list
        .map(
          (t) => `<button class="history-item${t.taskId === activeId ? " active" : ""}" onclick="openTask('${t.taskId}')">
      <div class="g">${t.continued ? '<span aria-hidden="true">↳</span> ' : ""}${esc(t.goal || t.taskId)}</div>
      <div class="m">${t.status ? STATUS_TEXT[t.status] || t.status : ""} · ${fmtTime(t.createdAt)}</div>
    </button>`
        )
        .join("")
    : `<div class="empty">還沒有任何任務。</div>`;
}

async function openTask(id) {
  activeId = id;
  const t = await api("/v1/tasks/" + id).then((r) => r.json());
  liveTask = t;
  closePreview();
  renderCurrent(t);
  loadHistory();
  if (t.status === "running" || t.status === "queued") poll();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* 檔案列表 */
let wbSub = "";

function wbNav(s) {
  wbSub = decodeURIComponent(s);
  loadFiles();
}

function wbUp() {
  wbSub = wbSub.includes("/") ? wbSub.slice(0, wbSub.lastIndexOf("/")) : "";
  loadFiles();
}

async function loadFiles() {
  const r = await api("/v1/workspaces/files?ws=" + encodeURIComponent(curSpace) + "&sub=" + encodeURIComponent(wbSub)).then((r) => r.json()).catch(() => ({ dirs: [], files: [] }));

  const bc = $("#file-breadcrumb");
  bc.textContent = wbSub ? "📂 " + wbSub : "";

  let html = wbSub ? `<button class="file-up" onclick="wbUp()" aria-label="上一層" type="button">⬆ 上一層</button>` : "";
  html += (r.dirs || []).map((d) => `<button class="file-row" onclick="wbNav('${encodeURIComponent((wbSub ? wbSub + "/" : "") + d)}')" type="button">📁 <span class="name">${esc(d)}</span>/</button>`).join("");
  html +=
    (r.files || []).map((f) => {
      const full = (wbSub ? wbSub + "/" : "") + f.name;
      return `<div class="file-row">
    <button class="file-open" onclick="wbView('${encodeURIComponent(full)}','${jsAttr(f.name)}')" type="button">
      <span class="name">📄 ${esc(f.name)}</span>
      <span class="size">${fmtSize(f.size)}</span>
    </button>
    <button class="del" onclick="wbDelete('${encodeURIComponent(full)}','${jsAttr(f.name)}')" type="button" title="刪除" aria-label="刪除 ${esc(f.name)}">🗑</button>
  </div>`;
    }).join("");

  if (!(r.dirs || []).length && !(r.files || []).length)
    html += `<div class="empty">（${wbSub ? "空資料夾" : "還沒有檔案"}）</div>`;

  $("#wbfiles").innerHTML = html;
}

async function wbDelete(encPath, name) {
  if (!confirm("刪除 " + name + "？此動作無法復原。")) return;
  await api("/v1/workspaces/file?ws=" + encodeURIComponent(curSpace) + "&path=" + encodeURIComponent(decodeURIComponent(encPath)), { method: "DELETE" });
  loadFiles();
}

function wbView(encPath, name) {
  return renderFile(wsFileUrl(curSpace), encPath, name); // 工作區檔走 /v1/workspaces/file?ws=
}

/* 啟動 */
loadHistory();
loadFiles();
</script>
</body>
</html>
