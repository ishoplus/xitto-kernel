<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>xitto · 許願台</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<!-- 設計系統 + 共享工具庫 -->
<link rel="stylesheet" href="shared/style.css">
<!-- 設定注入：server 會替換這些佔位符（HTML 才會被替換，靜態 app.js 不會），app.js 從 window.__XITTO__ 讀 -->
<script>window.__XITTO__ = { token: "__SERVER_TOKEN__", packs: __PACKS__, local: __LOCAL__, version: "__VERSION__" };</script>
<script src="shared/md.js"></script>
<script src="shared/app.js"></script>
<script src="shared/account.js"></script>
<style>
/* ── Wishboard 頁面樣式 ──────────────────────────────────── */

:root { --sidebar-w: 300px; --max-w: 1320px; }

/* 全幅 app-shell：左側欄固定寬 + 右主區填滿，整體鋪滿視窗（無置中容器、無留白）*/
.shell {
  display: grid;
  grid-template-columns: var(--sidebar-w) minmax(0, 1fr);
  height: 100vh;
  overflow: hidden;
}

/* ── 側邊欄 ── */
.sidebar {
  display: flex;
  flex-direction: column;
  min-height: 0;
  background: var(--inset);
  border-right: 1px solid var(--line);
  overflow: hidden;
}

.sidebar-head {
  padding: var(--sp-4) var(--sp-3) var(--sp-3);
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}

.brand h1 {
  font-size: 16px;
  font-weight: 700;
  margin: 0;
  white-space: nowrap;
}

.brand-tagline {
  color: var(--dim);
  font-size: 12px;
  margin: var(--sp-1) 0 0;
  line-height: 1.4;
}

.project-bar {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  margin-top: var(--sp-3);
}

.icon-btn {
  flex-shrink: 0;
  padding: var(--sp-2);
  font-size: 15px;
  line-height: 1;
  border: 1px solid var(--line);
}

/* 兩段：歷史取內容高度（上限 45%）、檔案長高填滿剩餘側欄 */
.sidebar > .sidebar-section { margin: 0; }
.sidebar > .sidebar-section:first-of-type { flex: 0 1 auto; max-height: 45%; }
.sidebar > .sidebar-section:last-of-type  { flex: 1 1 auto; border-top: 1px solid var(--line); }

.sidebar-foot {
  margin-top: auto;
  padding: var(--sp-3);
  border-top: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  flex-shrink: 0;
  font-size: 13px;
}
.sidebar-foot a { color: var(--accent); }
.sidebar-foot .app-ver { color: var(--dim); font-size: 11px; opacity: .8; }

/* 許願區（主區頂部，全寬）*/
.wish-zone {
  padding: var(--sp-5) var(--sp-6) var(--sp-3);
  flex-shrink: 0;
}

.wish-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: var(--sp-5);
  box-shadow: var(--shadow-md), inset 0 1px 0 var(--hairline);
  transition: border-color var(--duration-fast) var(--ease-out),
              box-shadow var(--duration-fast) var(--ease-out);
}

.wish-card:focus-within {
  border-color: color-mix(in srgb, var(--accent) 55%, var(--line));
  box-shadow: var(--shadow-md), 0 0 0 3px var(--accent-soft);
}

.wish-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--dim);
  margin-bottom: var(--sp-2);
}

.wish-textarea {
  width: 100%;
  min-height: 80px;
  background: var(--inset);
  resize: vertical;
  font: inherit;
  line-height: 1.6;
}

.wish-footer {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  margin-top: var(--sp-3);
  flex-wrap: wrap;
}

.wish-hint {
  color: var(--dim);
  font-size: 12px;
}

.route-hint {
  color: var(--ok);
  font-size: 12.5px;
  margin-top: var(--sp-2);
  display: none;
}

.route-hint.show { display: block; }

/* 主體：側邊欄 + 主區 */
/* 主區：垂直填滿視窗（許願在上、工作區填滿剩餘並自捲）*/
.main {
  display: flex;
  flex-direction: column;
  min-width: 0;
  min-height: 0;
  overflow: hidden;
}

/* 側欄區塊：扁平（Linear——壓低側欄視覺權重，讓主區優先），不做成卡片 */
.sidebar-section {
  background: transparent;
  border: none;
  border-radius: 0;
  box-shadow: none;
  padding: var(--sp-3);
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.sidebar-section h3 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--dim);
  margin: 0 0 var(--sp-2);
  padding-bottom: var(--sp-2);
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: var(--sp-2);
}

/* 空狀態的引導（NN/g：空狀態要有狀態訊息 + 行動指引）*/
.empty-hint { display: block; margin-top: var(--sp-2); font-size: 12px; color: var(--accent); opacity: .9; }

.sidebar-section .scroll {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}

.history-item {
  display: block;
  width: 100%;
  text-align: left;
  padding: var(--sp-2) var(--sp-2);
  margin: 2px 0;
  border-radius: var(--r-sm);
  background: transparent;
  border: 1px solid transparent;
  cursor: pointer;
  transition: background var(--duration-fast), border-color var(--duration-fast);
}

.history-item:hover {
  background: var(--inset);
}

.history-item.active {
  background: var(--inset);
  border-color: var(--accent);
}

.history-item .g {
  font-size: 13.5px;
  line-height: 1.4;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--fg);
  padding: 0;
  font-weight: inherit;
}

.history-item .m {
  color: var(--dim);
  font-size: 11px;
  margin-top: 2px;
}

/* 檔案列表（資料夾/上層仍是單一按鈕，需覆寫全域 button 樣式） */
.file-up,
.fs-row {
  border: 1px solid transparent;
  background: transparent;
  font: inherit;
  font-weight: inherit;
  text-align: left;
  padding: var(--sp-2);
}

/* 檔案列：容器 div（開啟鈕 + 刪除鈕並排）——不可用巢狀 <button>，否則瀏覽器會把刪除鈕斷到下一行 */
.file-row {
  display: flex;
  align-items: center;
  border-radius: var(--r-sm);
  font-size: 13.5px;
}

.file-row:hover { background: var(--inset); }

.file-open {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  padding: var(--sp-2);
  background: transparent;
  border: 0;
  cursor: pointer;
  text-align: left;
  font: inherit;
  font-weight: inherit;
  color: inherit;
  border-radius: var(--r-sm);
}

.file-open .name {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--accent);
}

.file-open .size {
  color: var(--dim);
  font-size: 12px;
  flex-shrink: 0;
}

.del {
  opacity: 0;
  background: transparent;
  border: 0;
  cursor: pointer;
  font-size: 12px;
  flex-shrink: 0;
  padding: var(--sp-1) var(--sp-2);
  color: var(--dim);
  transition: opacity var(--duration-fast), color var(--duration-fast);
}

.file-row:hover .del { opacity: .6; }
.del:hover { opacity: 1; color: var(--danger); }

.file-up {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  color: var(--dim);
  font-size: 13px;
  border-radius: var(--r-sm);
  cursor: pointer;
}

.file-up:hover { color: var(--fg); }

.file-breadcrumb {
  padding: var(--sp-2);
  font-size: 12px;
  color: var(--dim);
  border-bottom: 1px solid var(--line);
}

/* 工作區：填滿主區剩餘高度，內容多了自捲 */
.work {
  flex: 1;
  min-width: 0;
  min-height: 0;
  overflow-y: auto;
  padding: 0 var(--sp-6) var(--sp-6);
  display: flex;
  flex-direction: column;
}

/* 當前任務容器：填滿工作區（讓空狀態置中撐滿、任務卡時自然由上排起）*/
#current-task {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

/* 任務卡 */
.task-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: var(--sp-5);
  margin-bottom: var(--sp-4);
  box-shadow: var(--shadow-md);
  animation: fade-in var(--duration-base) var(--ease-out);
}

.task-header {
  display: flex;
  align-items: flex-start;
  gap: var(--sp-3);
  flex-wrap: wrap;
}

.task-goal {
  flex: 1;
  font-weight: 600;
  font-size: 15px;
  line-height: 1.4;
  min-width: 0;
}

.task-meta {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.task-actions {
  display: flex;
  gap: var(--sp-2);
}

/* 進度區 */
.progress {
  margin-top: var(--sp-3);
  color: var(--dim);
  font-size: 13px;
}

.progress .phase {
  color: var(--accent);
  margin-bottom: var(--sp-1);
}

.progress .steps {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.progress .step {
  color: var(--dim);
  font-size: 13px;
  padding: 2px 0;
}

.progress .step.current {
  color: var(--fg);
  font-weight: 500;
}

.progress .step.thinking {
  color: var(--warn);
  font-style: italic;
}

/* 待辦清單 */
.todos {
  margin-top: var(--sp-3);
  padding-top: var(--sp-3);
  border-top: 1px solid var(--line);
}

.todos-label {
  font-size: 12px;
  color: var(--dim);
  margin-bottom: var(--sp-2);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .04em;
}

.todo-item {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  padding: 3px 0;
  font-size: 13px;
  color: var(--dim);
}

.todo-text { flex: 1; min-width: 0; }
.todo-ic { flex-shrink: 0; }
.todo-item.pending .todo-ic { color: var(--faint); }
/* 進行中：升為主文字 + accent 圖示 + 進行式標籤（Claude Code activeForm 精神）*/
.todo-item.in_progress { color: var(--fg); font-weight: 600; }
.todo-item.in_progress .todo-ic { color: var(--accent); }
.todo-tag {
  flex-shrink: 0;
  font-size: 10px;
  color: var(--accent);
  border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);
  background: var(--accent-soft);
  border-radius: 20px;
  padding: 1px 7px;
  font-weight: 600;
}
/* 完成項：退到背景（不搶眼，Linear：完成的事讓位給進行中的）*/
.todo-item.completed { color: var(--dim); text-decoration: line-through; }
.todo-item.completed .todo-ic { color: var(--ok); }
.todos.done .todos-label { color: var(--ok); }

/* 過程日誌 */
.log-section {
  margin-top: var(--sp-3);
}

.log-toggle {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  font-size: 13px;
  color: var(--accent);
  cursor: pointer;
  padding: var(--sp-2) 0;
  background: none;
  border: none;
  font-weight: inherit;
}

.log-toggle:hover { text-decoration: underline; }

.log-list {
  margin-top: var(--sp-2);
  margin-left: var(--sp-4);
  border-left: 2px solid var(--line);
  padding-left: var(--sp-3);
}

.log-step {
  font-size: 13px;
  padding: var(--sp-1) 0;
  color: var(--fg);
}

/* 可點的步驟（有 diff 的 write/edit）→ 點開預覽該檔 */
.log-step.linked {
  display: block;
  width: 100%;
  text-align: left;
  background: transparent;
  border: 0;
  border-radius: var(--r-sm);
  cursor: pointer;
  font: inherit;
  color: var(--fg);
  margin: 0 calc(-1 * var(--sp-2));
  padding: var(--sp-1) var(--sp-2);
}
.log-step.linked:hover { background: var(--inset); }

.log-step.error { color: var(--danger); }
.log-step .dim { color: var(--dim); }

/* 彩色 diff */
.diff { margin: var(--sp-2) 0 var(--sp-2) var(--sp-4); font: 12px/1.5 ui-monospace, Menlo, monospace; }
.dh { color: var(--dim); font-size: 11px; margin-bottom: 2px; }
.dl { white-space: pre-wrap; }
.dl.add { color: var(--ok); }
.dl.del { color: var(--danger); }

/* 提問框 */
.question-box {
  margin-top: var(--sp-4);
  padding: var(--sp-3);
  background: var(--warnbg);
  border: 1px solid var(--warn);
  border-radius: var(--r-md);
}

.question-label {
  font-size: 12px;
  color: var(--warn);
  font-weight: 600;
  margin-bottom: var(--sp-2);
}

.question-input {
  width: 100%;
  margin-top: var(--sp-2);
}

/* 摘要 + 成品 */
.summary {
  margin-top: var(--sp-4);
  padding-top: var(--sp-4);
  border-top: 1px solid var(--line);
}

.summary-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--dim);
  margin-bottom: var(--sp-2);
}

.summary-text {
  white-space: pre-wrap;
  font-size: 14px;
  line-height: 1.7;
}
/* markdown 渲染版：佈局交給 .md 規則，避免 pre-wrap 額外留白 */
.summary-text.md { white-space: normal; }
.summary-text.md > :first-child { margin-top: 0; }
.summary-text.md > :last-child { margin-bottom: 0; }

.artifacts {
  margin-top: var(--sp-4);
}

.artifacts-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--dim);
  margin-bottom: var(--sp-2);
}

.artifact-file {
  display: inline-flex;
  align-items: center;
  gap: var(--sp-1);
  padding: var(--sp-1) var(--sp-3);
  margin: var(--sp-1) var(--sp-1) 0 0;
  background: var(--inset);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  font-size: 13px;
  color: var(--accent);
  cursor: pointer;
  transition: border-color var(--duration-fast), background var(--duration-fast);
}

.artifact-file:hover {
  border-color: var(--accent);
  background: color-mix(in srgb, var(--accent) 10%, var(--inset));
}

.artifact-file.modified { color: var(--warn); }

/* 檔案位置 */
.file-location {
  margin-top: var(--sp-3);
  font-size: 12px;
  color: var(--dim);
}

.file-location code,
.file-location .loc-code {
  background: var(--inset);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 2px 7px;
  font: inherit;
  color: var(--fg);
}

.file-location .loc-code {
  cursor: pointer;
  transition: border-color var(--duration-fast);
}

.file-location .loc-code:hover {
  border-color: var(--accent);
}

/* Steer 框 */
.steer-zone {
  margin-top: var(--sp-4);
  padding-top: var(--sp-3);
  border-top: 1px dashed var(--line);
}

.steer-note {
  font-size: 12.5px;
  color: var(--ok);
  margin-bottom: var(--sp-2);
}

.steer-input {
  width: 100%;
  margin-top: var(--sp-2);
}

/* 匯出成品成另一格式 */
.export-zone {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: var(--sp-2);
  margin-top: var(--sp-3);
}
.export-label { font-size: 13px; color: var(--dim); }
.export-btn { padding: 4px 12px; font-size: 13px; }

/* 繼續/調整 */
.continue-zone {
  margin-top: var(--sp-4);
  padding-top: var(--sp-3);
  border-top: 1px solid var(--line);
}

.continue-btn {
  margin-right: var(--sp-2);
}

.continue-box {
  margin-top: var(--sp-3);
}

.continue-textarea {
  width: 100%;
  margin-bottom: var(--sp-2);
}

/* 工作區頁籤列（任務/記憶固定 + 檔案動態頁籤）*/
.wz-tabs {
  position: sticky;
  top: 0;
  z-index: 5;
  display: flex;
  align-items: flex-end;
  gap: var(--sp-1);
  padding: var(--sp-3) 0 0;
  margin-bottom: var(--sp-2);
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  overflow-x: auto;          /* 頁籤多時可橫向捲動，不擠壓 */
  scrollbar-width: thin;
}
.wz-tab {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: var(--sp-2);
  max-width: 200px;
  padding: var(--sp-2) var(--sp-3);
  background: none;
  border: 1px solid transparent;
  border-bottom: none;
  border-radius: var(--r-md) var(--r-md) 0 0;
  color: var(--dim);
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
}
.wz-tab:hover { color: var(--fg); background: var(--inset); }
.wz-tab.active {
  color: var(--fg);
  font-weight: 600;
  background: var(--card);
  border-color: var(--line);
  margin-bottom: -1px;        /* 蓋住底線，做出「連到內容」的分頁感 */
}
.wz-tab .wz-tab-lbl { overflow: hidden; text-overflow: ellipsis; }
.wz-tab-x {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px; height: 16px;
  border-radius: var(--r-sm);
  color: var(--faint);
  font-size: 11px;
}
.wz-tab-x:hover { color: var(--danger); background: var(--line); }

/* 檔案預覽（顯示時填滿工作區並自捲）*/
.file-viewer {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  padding-top: var(--sp-4);
}
.file-viewer .md,
.file-viewer .viewer-pre,
.file-viewer .viewer-iframe { flex: 1; min-height: 0; }

.viewer-bar {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  font-size: 12px;
  color: var(--dim);
  margin-bottom: var(--sp-3);
  padding-bottom: var(--sp-2);
  border-bottom: 1px solid var(--line);
}

.viewer-bar a {
  color: var(--accent);
}

.viewer-pre {
  white-space: pre-wrap;
  font: 13px/1.5 ui-monospace, Menlo, monospace;
  background: var(--inset);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: var(--sp-3);
  overflow: auto;
  max-height: 420px;
}

/* ── 經驗入口（側欄）＋ 經驗面板（主區）：讓「越用越懂你」可見 ── */
.exp-entry {
  display: flex; align-items: center; gap: var(--sp-2); width: 100%;
  margin-top: var(--sp-2); padding: var(--sp-2) var(--sp-3);
  background: var(--inset); border: 1px solid var(--line); border-radius: var(--r-md);
  color: var(--fg); cursor: pointer; text-align: left; font-size: 13px;
  transition: border-color .15s, background .15s;
}
.exp-entry:hover { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, var(--inset)); }
.exp-entry .exp-ic { font-size: 15px; }
.exp-entry .exp-lbl { font-weight: 600; }
.exp-entry .exp-count { margin-left: auto; font-size: 11px; color: var(--dim); white-space: nowrap; }
.exp-viewer .exp-body { flex: 1; min-height: 0; overflow: auto; padding-right: var(--sp-2); }
.exp-sec { margin-bottom: var(--sp-5); }
.exp-h { display: flex; align-items: center; gap: var(--sp-2); font-size: 13px; font-weight: 700; margin: 0 0 var(--sp-3); color: var(--fg); }
.exp-h .exp-n { font-size: 11px; font-weight: 600; color: var(--dim); background: var(--inset); border-radius: 999px; padding: 1px 8px; }
.exp-facts { display: flex; flex-direction: column; gap: var(--sp-1); }
.exp-fact { font-size: 13.5px; line-height: 1.6; }

<!-- 跳過導航 -->

<!-- 全幅 app-shell：左側欄（品牌/專案/歷史/檔案/底部）+ 右主區（許願/工作區），撐滿整個視窗 -->
<div class="shell">
  <!-- 側邊欄 -->

      <div id="file-breadcrumb" class="file-breadcrumb" aria-live="polite"></div>

<!-- 資料夾選擇 Modal（position:fixed，置於 shell 外）-->
<div id="fs-modal" class="modal" hidden role="dialog" aria-modal="true" aria-labelledby="fs-modal-title">

      <button class="ghost" onclick="fsHome()">🏠 家目錄</button>
      <label class="fs-hidden">
        <input type="checkbox" id="fs-hidden" onchange="fsToggleHidden()">
        顯示隱藏資料夾
      </label>
      <span class="spacer" aria-hidden="true"></span>

      <button class="primary" onclick="chooseFs()">✓ 選這個</button>

<script>
/* ── Wishboard 應用邏輯 ──────────────────────────────────── */

/* 主題切換 */
$("#theme").onclick = () => {
  const t = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
  applyTheme(t);
};

/* 專案切換器（共用元件）：切換/新增/選資料夾後重載歷史與檔案，並把主任務區歸位 */
mountProjectSwitcher(() => { resetMainTask(); loadHistory(); loadFiles(); refreshExp(); });

/* 切換專案時主任務區回到初始：清掉殘留的上一個專案任務（含進行中輪詢狀態）與預覽 */
function resetMainTask() {
  stopStream();
  activeId = null;
  liveTask = null;
  openFiles = [];        // 換專案：清掉所有檔案頁籤
  closeExperience();
  closePreview();
  $("#current-task").innerHTML = `<div class="welcome">
    <div class="welcome-icon" aria-hidden="true">🪄</div>
    <h2 class="welcome-title">說出你想完成的事</h2>
    <p class="welcome-sub">在上方輸入一句話，交給它去做——做完把成品給你。<br>左邊可看歷史成品與工作區檔案，點任一個在這裡展開。</p>
  </div>`;
  const rh = $("#route-hint");
  if (rh) rh.innerHTML = "";
}

/* 領域選單 */
renderPackSelect($("#pack"));

/* 許願提交 */
let activeId = null,
  polling = null;

$("#go-btn").onclick = async () => {
  const goal = $("#goal").value.trim();
  if (!goal) return;
  const picked = $("#pack").value;
  $("#go-btn").disabled = true;

  const rh = $("#route-hint");
  if (picked === "auto") {
    rh.classList.add("show");
    rh.textContent = "🪄 判斷適合的領域…";
  }

  const r = await api("/v1/tasks", {
    method: "POST",
    body: JSON.stringify({ pack: picked, mode: "goal", goal, workspace: curSpace }),
  }).then((r) => r.json());

  $("#go-btn").disabled = false;

  if (r.error) {
    alert(r.error);
    rh.classList.remove("show");
    return;
  }

  if (r.routed && r.pack) {
    rh.classList.add("show");
    rh.innerHTML = `🪄 已自動用「<b>${esc(packLabel(r.pack))}</b>」領域 · 不對的話可在上方下拉改選`;
  } else {
    rh.classList.remove("show");
  }

  $("#goal").value = "";
  closePreview();
  expandedLog = false;
  streamTask(r.taskId, { taskId: r.taskId, pack: r.pack || picked, auto: !!r.routed, workspace: curSpace, goal, status: r.status || "queued", mode: "goal", startedAt: null });
  loadHistory();
};

$("#goal").addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
    e.preventDefault();
    $("#go-btn").click();
  }
});

/* IME 保護旗標 */
let composing = false;
const inp = $("#goal");
wireComposition(inp);
inp.addEventListener("compositionstart", () => { composing = true; });
inp.addEventListener("compositionend", () => { composing = false; });

/* 輪詢 */
async function poll() {
  clearTimeout(polling);
  if (!activeId) return;

  const reqId = activeId;
  const t = await api("/v1/tasks/" + activeId).then((r) => r.json());
  // 切換專案/任務時 activeId 已變或被清空 → 丟棄這次過期回應，避免舊任務閃回
  if (activeId !== reqId) return;
  liveTask = t;

  const terminal = t.status === "done" || t.status === "error";
  if (!composing || terminal) renderCurrent(t);
  if (terminal) {
    loadHistory();
    loadFiles();
    refreshExp();
    return;
  }
  if (t.status === "needs-input") return;
  polling = setTimeout(poll, 1200);
}

/* ── 即時串流（SSE）：取代 1.2s 輪詢，逐事件更新，體感等同 Claude Code ──
   server /v1/tasks/:id/events 會先回放緩衝事件、再即時推送；前端依事件型別
   重建 t.progress（與 server emit() 同邏輯）逐步渲染。SSE 不可用時退回 poll()。*/
let streamCtl = null;

/** 取工具參數摘要（對應 server argSummary，用於「展開過程」步驟列）*/
const argSummary = (args) => {
  if (!args || typeof args !== "object") return "";
  const v = args.command ?? args.path ?? args.pattern ?? args.query ?? args.url ?? args.name ?? args.topic;
  return v != null && v !== "" ? String(v).replace(/\s+/g, " ").slice(0, 80) : "";
};

/** 把單一事件套用到任務物件（重建進度），對應 server 的 emit() */
function applyEvent(t, ev) {
  const p = (t.progress ||= { steps: 0, round: 0, maxRounds: 0, recent: [], phase: "starting", thinking: "", todos: [], log: [] });
  switch (ev.type) {
    case "status":
      t.status = ev.status;
      if (ev.status === "running" && !t.startedAt) t.startedAt = new Date().toISOString(); // 純 SSE 下補計時起點，心跳才會跑
      break;
    case "tool":
      if (ev.name === "todo_write") { if (Array.isArray(ev.args?.todos)) p.todos = ev.args.todos; }
      else {
        p.steps++; p.phase = "acting"; p.thinking = ""; t._tb = "";
        p.recent.push({ name: ev.name, args: ev.args }); if (p.recent.length > 6) p.recent.shift();
        if (p.log.length < 100) p.log.push({ name: ev.name, summary: argSummary(ev.args) });
      }
      break;
    case "tool_end": {
      const last = p.log[p.log.length - 1];
      if (last && last.name === ev.name && !("isError" in last)) { last.isError = ev.isError; if (ev.diff) last.diff = ev.diff; }
      break;
    }
    case "text":
      p.phase = "thinking";
      t._tb = ((t._tb || "") + (ev.delta || "")).slice(-400);
      p.thinking = t._tb.replace(/\s+/g, " ").trim().slice(-150);
      break;
    case "round": p.round = ev.round; if (ev.maxRounds) p.maxRounds = ev.maxRounds; p.thinking = ""; t._tb = ""; break;
    case "phase": p.phase = ev.phase; break;
    case "steered": (p.steers ||= []).push(ev.text); if (p.steers.length > 8) p.steers.shift(); break;
    case "needs_input": t.status = "needs-input"; p.phase = "needs-input"; t.pending = { question: ev.question, options: ev.options || null }; break;
    case "answered": t.status = "running"; t.pending = null; p.phase = "acting"; break;
    case "end":
      t.status = ev.status; p.phase = ev.status;
      if (ev.result) { t.result = ev.result; if (ev.result.rounds != null) t.rounds = ev.result.rounds; if (ev.result.sessionId) t.sessionId = ev.result.sessionId; }
      if (ev.error) t.error = ev.error;
      break;
  }
}

/** 停止當前串流＋輪詢（切換任務/專案前呼叫）*/
function stopStream() {
  if (streamCtl) { try { streamCtl.abort(); } catch {} streamCtl = null; }
  clearTimeout(polling);
}

/** 串流監看一個任務：SSE 即時重建並渲染；連線失敗則退回輪詢 */
async function streamTask(taskId, base) {
  stopStream();
  activeId = taskId;
  // 基底（任務 metadata：goal/pack/workspace/sessionId）：用 POST 回應或補一次 GET
  let t = base || (await api("/v1/tasks/" + taskId).then((r) => r.json()).catch(() => null));
  if (!t || activeId !== taskId) return;
  // 進度一律由事件流重建（replay 帶完整歷史），避免和既有 progress 雙重計數
  t.progress = { steps: 0, round: 0, maxRounds: 0, recent: [], phase: "starting", thinking: "", todos: [], log: [] };
  liveTask = t;
  renderCurrent(t);

  const ctl = new AbortController();
  streamCtl = ctl;
  let resp;
  try {
    resp = await api("/v1/tasks/" + taskId + "/events", { signal: ctl.signal });
  } catch (e) {
    if (streamCtl === ctl) streamCtl = null;
    if (e.name !== "AbortError" && activeId === taskId) poll();
    return;
  }
  if (!resp.ok || !resp.body) { if (streamCtl === ctl) streamCtl = null; if (activeId === taskId) poll(); return; }

  let raf = 0;
  const paint = () => {
    raf = 0;
    if (activeId !== taskId) return;
    const terminal = t.status === "done" || t.status === "error";
    if (!terminal) {
      if (composing) return; // 願望框 IME 組字中
      const se = document.getElementById("steerin");
      if (se && document.activeElement === se && se.value) return; // 使用者正在打補充指示 → 暫不打斷
    }
    renderCurrent(t);
  };
  try {
    await readSSE(resp, (ev) => {
      if (activeId !== taskId) return;
      applyEvent(t, ev);
      if (ev.type === "end") { if (raf) { cancelAnimationFrame(raf); raf = 0; } renderCurrent(t); loadHistory(); loadFiles(); refreshExp(); return; }
      if (!raf) raf = requestAnimationFrame(paint); // 合批：避免逐 delta 重繪過載
    });
  } catch (e) {
    if (e.name !== "AbortError" && activeId === taskId) poll(); // 連線中斷 → 退回輪詢
  } finally {
    if (streamCtl === ctl) streamCtl = null;
  }
}

/* 心跳：每秒更新「已進行 Ns」*/
setInterval(() => {
  if (liveTask && (liveTask.status === "running" || liveTask.status === "queued")) {
    const el = document.getElementById("elapsed");
    if (el) el.textContent = elapsedOf(liveTask) + "s";
  }
}, 1000);

/* 渲染當前任務 */
let liveTask = null;
let expandedLog = false;

const elapsedOf = (t) =>
  t.startedAt ? Math.max(0, Math.round((Date.now() - new Date(t.startedAt).getTime()) / 1000)) : 0;

function statusClass(s) {
  return s === "running" ? "running" : s === "needs-input" ? "needs" : s === "done" ? "done" : s === "error" || s === "cancelled" || s === "interrupted" ? "error" : "";
}

const STATUS_TEXT = {
  queued: "排隊中",
  running: "進行中…",
  "needs-input": "需要你回答",
  done: "已完成",
  error: "失敗",
  cancelled: "已中斷",
  interrupted: "已中斷(重啟)",
};

const PHASE_ZH = {
  starting: "啟動中",
  thinking: "思考中",
  acting: "執行中",
  verifying: "驗收中",
  verified: "驗收通過",
  fixing: "修正中",
  "needs-input": "等你回答",
};

function todosHtml(p) {
  if (!p || !p.todos || !p.todos.length) return "";
  const todos = p.todos;
  const done = todos.filter((t) => t.status === "completed").length;
  // 全部完成 → 收合成一行（Claude Code：全完成即清 active state）
  if (done === todos.length) return `<div class="todos done"><div class="todos-label">☑ 待辦 · 全部完成（${todos.length}）</div></div>`;
  const icons = { completed: "☑", in_progress: "◐", pending: "☐" };
  return `<div class="todos">
    <div class="todos-label">待辦 · ${done}/${todos.length} 完成</div>
    ${todos.map((td) => `<div class="todo-item ${td.status}"><span class="todo-ic" aria-hidden="true">${icons[td.status] || "☐"}</span><span class="todo-text">${esc(td.content)}</span>${td.status === "in_progress" ? '<span class="todo-tag">進行中</span>' : ""}</div>`).join("")}</div>`;
}

function progressHtml(t) {
  const p = t.progress || {};
  const head = `${PHASE_ZH[p.phase] || "進行中"}${p.round ? ` · 第 ${p.round} 輪` : ""}${p.steps ? ` · ${p.steps} 個動作` : ""} · 已進行 <span id="elapsed">${elapsedOf(t)}s</span>`;
  const think = p.thinking ? `<div class="step thinking">💭 ${esc(p.thinking)}…</div>` : "";
  const steps = (p.recent || [])
    .slice()
    .reverse()
    .map((a, i) => `<div class="step ${i === 0 ? "current" : ""}">${i === 0 ? "▸" : "·"} ${esc(toolText(a))}</div>`)
    .join("");
  return `<div class="progress"><div class="phase dots">${head}</div>${think}<div class="steps">${steps}</div></div>`;
}

function logHtml(p) {
  if (!p || !(p.log || []).length) return `<div class="empty">（尚無步驟）</div>`;
  return p.log
    .map((s) => {
      const path = s.diff && s.diff.path; // 有 diff 的步驟（write/edit）→ 可點開預覽該檔（過程↔工作區連動）
      const inner = `▸ ${esc(TOOL_ZH[s.name] || s.name)}${s.summary ? ` <span class="dim">${esc(s.summary)}</span>` : ""}${s.diff ? diffHtml(s.diff) : ""}`;
      return path
        ? `<button class="log-step linked ${s.isError ? "error" : ""}" type="button" onclick="wbView('${encodeURIComponent(path)}','${jsAttr(path)}')" title="預覽 ${esc(path)}">${inner}</button>`
        : `<div class="log-step ${s.isError ? "error" : ""}">${inner}</div>`;
    })
    .join("");
}

// 驗收徽章（完成定義）：通過＝綠勾、未通過＝琥珀。null/未驗收 → 不顯示。
function verifyBadgeWb(v) {
  if (!v || !v.ran) return "";
  const rounds = v.rounds > 1 ? `·${v.rounds}輪` : "";
  return v.ok
    ? `<span class="badge vok">✓ 驗收通過${rounds}</span>`
    : `<span class="badge vfail">⚠ 未通過驗收${rounds}</span>`;
}

function renderCurrent(t) {
  // 保住 steer 輸入框內容
  const ps = (() => {
    const el = document.getElementById("steerin");
    return el ? { v: el.value, f: document.activeElement === el, s: el.selectionStart } : null;
  })();

  const a = t.result?.artifacts;
  const files = a
    ? [...(a.created || []).map((f) => [f, "new"]), ...(a.modified || []).map((f) => [f, "mod"])]
    : [];
  const p = t.progress || {};
  const nLog = (p.log || []).length;

  const CANCELLABLE = ["queued", "running", "needs-input"];

  const logSec = nLog
    ? `<div class="log-section">
        <button class="log-toggle" onclick="toggleLog()" aria-expanded="${expandedLog}">
          ${expandedLog ? "▾" : "▸"} 展開過程（${nLog} 步）
        </button>
        ${expandedLog ? `<div class="log-list">${logHtml(p)}</div>` : ""}
      </div>`
    : "";

  $("#current-task").innerHTML = `<article class="task-card">
    <div class="task-header">
      <div class="task-goal">${esc(t.goal || "任務")}</div>
      <div class="task-meta">
        <span class="badge ${statusClass(t.status)}">${STATUS_TEXT[t.status] || t.status}${t.rounds ? ` · ${t.rounds} 輪` : ""}</span>
        ${t.pack ? `<span class="badge">${t.auto ? "🪄" : "🧭"} ${esc(packLabel(t.pack))}</span>` : ""}
        <span class="badge">📁 ${esc(t.workspace || "default")}</span>
        ${verifyBadgeWb(t.result?.verify)}
      </div>
      <div class="task-actions">
        ${CANCELLABLE.includes(t.status) ? `<button class="danger" onclick="cancelTask('${t.taskId}')">停止</button>` : ""}
      </div>
    </div>

    ${t.status === "running" || t.status === "queued" ? progressHtml(t) : ""}
    ${todosHtml(t.progress)}
    ${logSec}

    ${t.status === "needs-input" ? `<div class="question-box">
      <div class="question-label">❓ ${esc(t.pending?.question)}</div>
      <label for="ans" class="sr-only">你的回答</label>
      <input id="ans" class="question-input" placeholder="輸入你的回答，按 Enter 送出">
    </div>` : ""}

    ${t.status === "running" ? `<div class="steer-zone">
      ${(p.steers || []).slice(-3).map((s) => `<div class="steer-note">✋ 已收到：${esc(s)}</div>`).join("")}
      <label for="steerin" class="sr-only">補充指示</label>
      <input id="steerin" class="steer-input" placeholder="想補充或調整方向？打字按 Enter——會在下一步納入">
    </div>` : ""}

    ${t.status === "done" ? `<div class="summary">
      <div class="summary-label">摘要</div>
      <div class="summary-text md">${mdRender(t.result?.text || "")}</div>
      ${t.result?.verify && t.result.verify.ran && !t.result.verify.ok && t.result.verify.output
        ? `<details class="vbadge-wrap"><summary class="vfail-link">⚠ 驗收未通過——查看輸出</summary><pre class="vbadge-out">${esc(t.result.verify.output)}</pre></details>`
        : ""}
    </div>` : ""}

    ${t.status === "error" ? `<div class="error-msg">⚠ ${esc(t.error)}</div>` : ""}

    ${files.length ? `<div class="artifacts">
      <div class="artifacts-label">📦 成品</div>
      ${files.map(([f, k]) => `<button class="artifact-file ${k === "mod" ? "modified" : ""}" onclick="viewFile('${t.taskId}','${encodeURIComponent(f)}','${jsAttr(f)}')" aria-label="${k === "mod" ? "修改" : "新建"} ${esc(f)}">${k === "mod" ? "~" : "+"} ${esc(f)}</button>`).join("")}
    </div>` : ""}

    ${t.result && t.result.workspaceDir ? `<div class="file-location">
      📂 位置：<button class="loc-code" title="點擊複製" onclick="navigator.clipboard?.writeText('${esc(t.result.workspaceDir)}')" type="button">${esc(t.result.workspaceDir)}</button>
    </div>` : ""}

    ${(t.status === "done" && files.length) ? `<div class="export-zone">
      <span class="export-label">📤 匯出成：</span>
      <button class="ghost export-btn" onclick="exportAs('pdf','${esc(t.sessionId || "")}','${esc(t.workspace || "default")}')">PDF</button>
      <button class="ghost export-btn" onclick="exportAs('docx','${esc(t.sessionId || "")}','${esc(t.workspace || "default")}')">Word</button>
      <button class="ghost export-btn" onclick="exportAs('pptx','${esc(t.sessionId || "")}','${esc(t.workspace || "default")}')">簡報</button>
    </div>` : ""}

    ${t.status === "done" ? `<div class="continue-zone">
      <button class="ghost continue-btn" onclick="toggleFollowup()">↳ 繼續／調整這個成果</button>
      <div id="fubox" style="display:none" class="continue-box">
        <label for="fugoal" class="sr-only">想怎麼調整或繼續</label>
        <textarea id="fugoal" class="continue-textarea" placeholder="想怎麼調整或繼續深入？（會接續這次的對話與檔案）"></textarea>
        <button class="primary" onclick="submitFollowup('${esc(t.sessionId || "")}','${esc(t.pack || "general")}','${esc(t.workspace || "default")}')">送出 →</button>
      </div>
    </div>` : ""}
  </article>`;

  /* 互動綁定 */
  if (t.status === "needs-input") {
    const inp = $("#ans");
    inp.focus();
    inp.onkeydown = async (e) => {
      if (e.isComposing || e.keyCode === 229) return; // 輸入法組字中 → Enter 交給 IME，別誤送出
      if (e.key === "Enter" && inp.value.trim()) {
        const ans = inp.value.trim();
        inp.disabled = true;
        await api("/v1/tasks/" + t.taskId + "/answer", {
          method: "POST",
          body: JSON.stringify({ answer: ans }),
        });
        if (!streamCtl) poll(); // 串流模式下 server 會推 answered 事件，毋須輪詢
      }
    };
  }

  if (t.status === "running") {
    const si = $("#steerin");
    if (si) {
      if (ps) {
        si.value = ps.v;
        if (ps.f) {
          si.focus();
          try { si.setSelectionRange(ps.s, ps.s); } catch {}
        }
      }
      si.onkeydown = async (e) => {
        if (e.key === "Enter" && !e.isComposing && si.value.trim()) {
          const txt = si.value.trim();
          si.value = "";
          si.disabled = true;
          await api("/v1/tasks/" + t.taskId + "/steer", {
            method: "POST",
            body: JSON.stringify({ text: txt }),
          });
          si.disabled = false;
          si.focus();
        }
      };
    }
  }
}

function toggleLog() {
  expandedLog = !expandedLog;
  if (liveTask) renderCurrent(liveTask);
}

async function cancelTask(id) {
  await api("/v1/tasks/" + id + "/cancel", { method: "POST" });
  for (let i = 0; i < 10; i++) {
    await new Promise((r) => setTimeout(r, 600));
    const t = await api("/v1/tasks/" + id).then((r) => r.json());
    liveTask = t;
    renderCurrent(t);
    if (["done", "error", "cancelled"].includes(t.status)) {
      loadHistory();
      break;
    }
  }
}

/* 繼續/調整 */
function toggleFollowup() {
  const b = $("#fubox");
  if (b) {
    b.style.display = b.style.display === "none" ? "" : "none";
    if (b.style.display !== "none") $("#fugoal").focus();
  }
}

// 一鍵匯出成品成另一格式：接同一 session（agent 知道剛產出的成品）+ 強制 docgen pack（拿到 gen_doc）。
// PDF/Word 原樣轉檔；簡報要求改寫成投影片（每頁一重點）。當作一個新 goal 任務跑，成品照常出現在成品區。
async function exportAs(fmt, sessionId, workspace) {
  const GOALS = {
    pdf: "把這個專案先前『已產出的主要文件成品』原樣轉成 PDF（內容不要改動、排版整齊），用 gen_doc 產出 export.pdf。",
    docx: "把這個專案先前『已產出的主要文件成品』原樣轉成 Word 檔（.docx，內容不要改動），用 gen_doc 產出 export.docx。",
    pptx: "把這個專案先前『已產出的主要文件成品』改寫成簡報：每頁一個重點，用 # 標題分頁、每頁 3~5 條要點，用 gen_doc 產出 slides.pptx。",
  };
  const goal = GOALS[fmt]; if (!goal) return;
  const r = await api("/v1/tasks", {
    method: "POST",
    body: JSON.stringify({ pack: "docgen", mode: "goal", goal, workspace, sessionId }),
  }).then((r) => r.json());
  if (r.error) { alert(r.error); return; }
  expandedLog = false;
  streamTask(r.taskId, { taskId: r.taskId, pack: "docgen", workspace, goal, status: r.status || "queued", mode: "goal", auto: false, startedAt: null, sessionId, continued: true });
  window.scrollTo({ top: 0, behavior: "smooth" });
}

async function submitFollowup(sessionId, pack, workspace) {
  const goal = $("#fugoal").value.trim();
  if (!goal) return;
  const r = await api("/v1/tasks", {
    method: "POST",
    body: JSON.stringify({ pack, mode: "goal", goal, workspace, sessionId }),
  }).then((r) => r.json());
  if (r.error) {
    alert(r.error);
    return;
  }
  expandedLog = false;
  streamTask(r.taskId, { taskId: r.taskId, pack, workspace, goal, status: r.status || "queued", mode: "goal", auto: false, startedAt: null, sessionId, continued: true });
  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* 檔案預覽 */
const IMG = /\.(png|jpe?g|gif|webp|svg)$/i;
const MD = /\.(md|markdown)$/i;
const HTMLF = /\.html?$/i;
const JSONF = /\.json$/i;
const DOC = /\.(docx|pptx|xlsx|odt|odp|ods|rtf|pdf)$/i; // Word/Excel/PPT/PDF：伺服器萃取成文字（?as=text）

// 取檔 URL 產生器：任務成品走 /v1/tasks/<id>/file，工作區檔走 /v1/workspaces/file?ws=
const taskFileUrl = (taskId) => (p, extra = "") =>
  "/v1/tasks/" + taskId + "/file?path=" + encodeURIComponent(p) + "&token=" + encodeURIComponent(TOKEN) + extra;
const wsFileUrl = (ws) => (p, extra = "") =>
  "/v1/workspaces/file?ws=" + encodeURIComponent(ws) + "&path=" + encodeURIComponent(p) + "&token=" + encodeURIComponent(TOKEN) + extra;

// 工作區頁籤：任務／記憶固定，檔案為動態多頁籤（可同時開多個、各自可關，上限 6）。同一時間只顯示一個面板。
const FILE_TAB_MAX = 6;
let activeTab = "task";   // "task" | "exp" | "file:<key>"
let openFiles = [];       // [{key, name, urlFn, encPath}]（依開啟順序）

function renderTabs() {
  const el = $("#wz-tabs"); if (!el) return;
  const fixed = (id, label, onclick) =>
    `<button class="wz-tab${activeTab === id ? " active" : ""}" type="button" role="tab" aria-selected="${activeTab === id}" onclick="${onclick}"><span class="wz-tab-lbl">${label}</span></button>`;
  let html = fixed("task", "🪄 任務", "setTab('task')")
           + fixed("exp", "🧠 記憶", "openExperience()");
  openFiles.forEach((f, i) => {
    const on = activeTab === "file:" + f.key;
    html += `<button class="wz-tab${on ? " active" : ""}" type="button" role="tab" aria-selected="${on}" onclick="setFileTab(${i})" title="${esc(f.name)}">`
      + `<span class="wz-tab-lbl">📄 ${esc(f.name)}</span>`
      + `<span class="wz-tab-x" role="button" tabindex="0" aria-label="關閉 ${esc(f.name)}" onclick="event.stopPropagation();closeFileAt(${i})">✕</span>`
      + `</button>`;
  });
  el.innerHTML = html;
}

function showOnly(which) { // "task" | "exp" | "file"
  $("#current-task").hidden = which !== "task";
  $("#exp-viewer").hidden = which !== "exp";
  $("#file-viewer").hidden = which !== "file";
}

// 切換頁籤。固定頁純切可見性；檔案頁切到對應檔並重抓渲染。
function setTab(id) {
  if (id.startsWith("file:")) {
    const f = openFiles.find((x) => "file:" + x.key === id);
    if (!f) return setTab("task");
    activeTab = id; expOpen = false;
    showOnly("file"); renderTabs(); renderFileBody(f);
    return;
  }
  activeTab = id; expOpen = id === "exp";
  showOnly(id === "exp" ? "exp" : "task");
  renderTabs();
}
function setFileTab(i) { const f = openFiles[i]; if (f) setTab("file:" + f.key); }

function closePreview() { setTab("task"); }   // 回任務（新任務／開任務）；不清空已開檔案頁籤

// 關閉某個檔案頁籤：是當前頁→切到相鄰檔或任務；否則只更新頁籤列
function closeFile(key) {
  const wasActive = activeTab === "file:" + key;
  openFiles = openFiles.filter((x) => x.key !== key);
  if (wasActive) setTab(openFiles.length ? "file:" + openFiles[openFiles.length - 1].key : "task");
  else renderTabs();
}
function closeFileAt(i) { const f = openFiles[i]; if (f) closeFile(f.key); }
function closeActiveFile() { if (activeTab.startsWith("file:")) closeFile(activeTab.slice(5)); }

// 開檔（或聚焦已開的同檔）。src 區分來源（任務成品 vs 工作區），讓 key 穩定可去重。
function renderFile(urlFn, encPath, name, src) {
  const key = (src || "") + "|" + encPath;
  let f = openFiles.find((x) => x.key === key);
  if (f) { f.urlFn = urlFn; f.name = name; }   // 已開：更新 urlFn（token/ws 可能變）並聚焦
  else {
    f = { key, name, urlFn, encPath };
    openFiles.push(f);
    if (openFiles.length > FILE_TAB_MAX) {     // 超過上限：淘汰最舊（非剛開的那個）
      const victimIdx = openFiles.findIndex((x) => x !== f);
      if (victimIdx >= 0) openFiles.splice(victimIdx, 1);
    }
  }
  setTab("file:" + key);
}

// 把單一檔案的內容渲染進 #file-viewer（圖片/HTML/md/json/文件/純文字）。切走則放棄（避免非同步覆蓋）。
async function renderFileBody(f) {
  const v = $("#file-viewer");
  const { urlFn, name } = f;
  const path = decodeURIComponent(f.encPath);
  const mine = () => activeTab === "file:" + f.key; // 仍是當前檔才寫入

  const bar = `<div class="viewer-bar"><span>📄 ${esc(name)}</span> · <a href="${urlFn(path)}" target="_blank">開新分頁</a> · <a href="${urlFn(path, "&download=1")}">下載</a><span class="spacer" aria-hidden="true"></span><button class="ghost" onclick="closeActiveFile()" aria-label="關閉預覽">✕ 關閉</button></div>`;

  if (IMG.test(name)) { v.innerHTML = bar + `<img class="viewer-img" src="${urlFn(path)}" alt="${esc(name)}">`; return; }
  if (HTMLF.test(name)) { v.innerHTML = bar + `<iframe class="viewer-iframe" sandbox src="${urlFn(path)}"></iframe>`; return; }

  v.innerHTML = bar + `<div class="empty">載入中…</div>`;
  const isDoc = DOC.test(name);
  const resp = await fetch(urlFn(path, isDoc ? "&as=text" : "")).catch(() => null);
  if (!mine()) return; // 已切到別的檔
  const txt = resp && resp.ok ? await resp.text() : null;
  if (!mine()) return;

  if (txt == null) {
    const msg = resp && resp.status === 422 ? "（文件解析失敗，請下載原檔）" : "（無法以文字呈現，請下載）";
    v.innerHTML = bar + `<div class="empty">${msg}</div>`;
    return;
  }

  let body;
  if (isDoc) body = `<pre class="viewer-pre">${esc(txt)}</pre>`;
  else if (MD.test(name)) body = `<div class="md">${mdRender(txt)}</div>`;
  else if (JSONF.test(name)) {
    try { body = `<pre class="viewer-pre">${esc(JSON.stringify(JSON.parse(txt), null, 2))}</pre>`; }
    catch { body = `<pre class="viewer-pre">${esc(txt)}</pre>`; }
  } else body = `<pre class="viewer-pre">${esc(txt)}</pre>`;

  v.innerHTML = bar + body;
}

// 任務成品檔（成品卡點檔案）
function viewFile(taskId, encPath, name) {
  return renderFile(taskFileUrl(taskId), encPath, name, "task:" + taskId);
}

/* 歷史成品 */
async function loadHistory() {
  const r = await api("/v1/tasks").then((r) => r.json());
  const list = (r.tasks || [])
    .filter((t) => t.mode === "goal" && (t.workspace || "default") === curSpace)
    .reverse();

  $("#history").innerHTML = list.length
    ? list
        .map(
          (t) => `<button class="history-item${t.taskId === activeId ? " active" : ""}" onclick="openTask('${t.taskId}')">
      <div class="g">${t.continued ? '<span aria-hidden="true">↳</span> ' : ""}${esc(t.goal || t.taskId)}</div>
      <div class="m">${t.status ? STATUS_TEXT[t.status] || t.status : ""} · ${fmtTime(t.createdAt)}</div>
    </button>`
        )
        .join("")
    : `<div class="empty">還沒有成品<br><span class="empty-hint">在右側說出你的第一個願望 →</span></div>`;
}

async function openTask(id) {
  stopStream();
  activeId = id;
  const t = await api("/v1/tasks/" + id).then((r) => r.json());
  if (activeId !== id) return;
  liveTask = t;
  closePreview();
  renderCurrent(t);
  loadHistory();
  if (t.status === "running" || t.status === "queued") streamTask(id, t); // 進行中 → 即時串流
  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* 檔案列表 */
let wbSub = "";

function wbNav(s) {
  wbSub = decodeURIComponent(s);
  loadFiles();
}

function wbUp() {
  wbSub = wbSub.includes("/") ? wbSub.slice(0, wbSub.lastIndexOf("/")) : "";
  loadFiles();
}

// 手動刷新：轉一下 ↻ 給回饋，再重載檔案列表（任務完成時 streamTask 已自動 loadFiles）
function refreshFiles() {
  const b = $("#files-refresh");
  if (b) { b.classList.remove("spin"); void b.offsetWidth; b.classList.add("spin"); }
  loadFiles();
}

async function loadFiles() {
  const r = await api("/v1/workspaces/files?ws=" + encodeURIComponent(curSpace) + "&sub=" + encodeURIComponent(wbSub)).then((r) => r.json()).catch(() => ({ dirs: [], files: [] }));

  const bc = $("#file-breadcrumb");
  bc.textContent = wbSub ? "📂 " + wbSub : "";

  let html = wbSub ? `<button class="file-up" onclick="wbUp()" aria-label="上一層" type="button">⬆ 上一層</button>` : "";
  html += (r.dirs || []).map((d) => `<button class="file-row" onclick="wbNav('${encodeURIComponent((wbSub ? wbSub + "/" : "") + d)}')" type="button">📁 <span class="name">${esc(d)}</span>/</button>`).join("");
  html +=
    (r.files || []).map((f) => {
      const full = (wbSub ? wbSub + "/" : "") + f.name;
      return `<div class="file-row">
    <button class="file-open" onclick="wbView('${encodeURIComponent(full)}','${jsAttr(f.name)}')" type="button">
      <span class="name">📄 ${esc(f.name)}</span>
      <span class="size">${fmtSize(f.size)}</span>
    </button>
    <button class="del" onclick="wbDelete('${encodeURIComponent(full)}','${jsAttr(f.name)}')" type="button" title="刪除" aria-label="刪除 ${esc(f.name)}">🗑</button>
  </div>`;
    }).join("");

  if (!(r.dirs || []).length && !(r.files || []).length)
    html += `<div class="empty">${wbSub ? "（空資料夾）" : "還沒有檔案<br><span class=\"empty-hint\">完成任務後，成品會出現在這裡</span>"}</div>`;

  $("#wbfiles").innerHTML = html;
}

async function wbDelete(encPath, name) {
  if (!confirm("刪除 " + name + "？此動作無法復原。")) return;
  await api("/v1/workspaces/file?ws=" + encodeURIComponent(curSpace) + "&path=" + encodeURIComponent(decodeURIComponent(encPath)), { method: "DELETE" });
  loadFiles();
}

function wbView(encPath, name) {
  return renderFile(wsFileUrl(curSpace), encPath, name, "ws:" + curSpace); // 工作區檔走 /v1/workspaces/file?ws=
}

/* ── 經驗層：讓「它越用越懂你」可見（Claude Code 沒有的差異點）──
   讀 /v1/workspaces/experience 聚合的五層（記憶/手冊/技能/情節/信任），
   在側欄入口顯示計數，點開在主區呈現。任務完成、切換專案時自動刷新。*/
let expOpen = false;

const fetchExp = () =>
  api("/v1/workspaces/experience?ws=" + encodeURIComponent(curSpace)).then((r) => r.json()).catch(() => null);

// 更新側欄入口計數（並在面板開著時同步重繪）
async function refreshExp() {
  const e = await fetchExp();
  const c = (e && e.counts) || {};
  const learned = (c.skills || 0) + (c.playbook || 0);
  const total = (c.memory || 0) + learned + (c.episodes || 0);
  const badge = $("#exp-count");
  if (badge) badge.textContent = total ? `記得 ${c.memory || 0}·會 ${learned}·歷 ${c.episodes || 0}` : "尚無累積";
  if (expOpen && e) renderExperience(e);
  return e;
}

// 技能管理：查看完整內容（就地展開/收合）
async function skillView(pack, name, sid) {
  const el = document.getElementById(sid);
  if (!el) return;
  if (!el.hidden) { el.hidden = true; return; }          // 再按一次 → 收合
  el.textContent = "載入中…"; el.hidden = false;
  const r = await api("/v1/skills/body?ws=" + encodeURIComponent(curSpace) + "&pack=" + encodeURIComponent(pack) + "&name=" + encodeURIComponent(name))
    .then((x) => x.json()).catch(() => null);
  el.textContent = r && r.body ? r.body : "✗ " + ((r && r.error) || "載入失敗");
}
// 技能管理：刪除（agent 之後仍可在需要時重新結晶）
async function skillDel(pack, name) {
  if (!confirm("刪除技能「" + name + "」？\nagent 之後仍可在需要時重新結晶。")) return;
  const r = await api("/v1/skills/remove", { method: "POST", body: JSON.stringify({ ws: curSpace, pack, name }) })
    .then((x) => x.json()).catch(() => ({ error: "連線失敗" }));
  if (r && r.ok) refreshExp(); else alert("刪除失敗：" + ((r && r.error) || "未知錯誤"));
}

function closeExperience() { setTab("task"); }   // expOpen 由 setTab 統一維護

async function openExperience() {
  setTab("exp");   // 切到記憶頁籤（setTab 會把 expOpen 設為 true）
  $("#exp-viewer").innerHTML = expBar() + `<div class="exp-body"><div class="empty">載入中…</div></div>`;
  const e = await fetchExp();
  if (!expOpen) return; // 載入期間被關掉/切走
  if (!e) { $("#exp-viewer").innerHTML = expBar() + `<div class="exp-body"><div class="empty">讀取失敗</div></div>`; return; }
  renderExperience(e);
}

const expBar = () =>
  `<div class="viewer-bar"><span>🧠 它對你的了解</span> · <span class="dim">在「${esc(spaceLabel(curSpace).replace(/^📁 /, ""))}」累積，越用越懂你</span><span class="spacer" aria-hidden="true"></span><button class="ghost" onclick="closeExperience()" aria-label="關閉">✕ 關閉</button></div>`;

function renderExperience(e) {
  const v = $("#exp-viewer");
  const c = e.counts || {};
  if (!((c.memory || 0) + (c.playbook || 0) + (c.skills || 0) + (c.episodes || 0) + (c.trust || 0))) {
    v.innerHTML = expBar() + `<div class="exp-body"><div class="welcome">
      <div class="welcome-icon" aria-hidden="true">🧠</div>
      <h2 class="welcome-title">還沒有累積經驗</h2>
      <p class="welcome-sub">多交辦幾次任務——它會記住你的偏好、學會這個專案的做法、把可重複的流程結晶成技能。<br>這些跨任務累積，讓它越用越懂你（這是 Claude Code 沒有的）。</p>
    </div></div>`;
    return;
  }
  const sec = (icon, title, n, inner) => (n ? `<section class="exp-sec"><h3 class="exp-h">${icon} ${title} <span class="exp-n">${n}</span></h3>${inner}</section>` : "");
  const memHtml = (e.memory || []).map((m) => `<div class="exp-fact">• ${esc(m)}</div>`).join("");
  const pbHtml = (e.playbook || []).map((p) => `<div class="exp-item"><div class="exp-item-t">${esc(p.topic)} <span class="exp-pack">${esc(packLabel(p.pack))}</span></div><div class="exp-item-d">${esc(p.note)}</div></div>`).join("");
  const skHtml = (e.skills || []).map((s, i) => {
    const sid = "skb-" + i;
    return `<div class="exp-item"><div class="exp-item-t">⚡ ${esc(s.name)}${s.used ? ` <span class="exp-used">用過 ${s.used} 次</span>` : ""}${s.stale ? ` <span class="exp-stale">⚠ 待修</span>` : ""} <span class="exp-pack">${esc(packLabel(s.pack))}</span>` +
      `<span class="sk-act"><button class="sk-btn" type="button" onclick="skillView('${esc(s.pack)}','${esc(s.name)}','${sid}')">查看</button>` +
      `<button class="sk-btn danger" type="button" onclick="skillDel('${esc(s.pack)}','${esc(s.name)}')">刪除</button></span></div>` +
      `${s.desc ? `<div class="exp-item-d">${esc(s.desc)}</div>` : ""}<pre class="sk-body" id="${sid}" hidden></pre></div>`;
  }).join("");
  const ocText = (o) => (o === "success" ? "✓ 成功" : o === "failure" ? "✗ 失敗" : esc(o));
  const epHtml = (e.episodes || []).map((ep) => `<div class="exp-ep ${ep.outcome === "success" ? "ok" : ep.outcome === "failure" ? "fail" : ""}"><div class="exp-ep-s">${esc(ep.summary)}</div><div class="exp-ep-m">${ep.outcome ? `<span class="exp-oc">${ocText(ep.outcome)}</span>` : ""}${(ep.tags || []).map((t) => `<span class="exp-tag">${esc(t)}</span>`).join("")}<span>${fmtTime(ep.ts)}</span></div></div>`).join("");
  const trust = e.trust || { tools: [], bash: [] };
  const trHtml = [...(trust.tools || []).map((t) => ["🔧", t]), ...(trust.bash || []).map((b) => ["$", b])].map(([ic, x]) => `<span class="exp-chip">${ic} ${esc(x)}</span>`).join("");
  v.innerHTML = expBar() + `<div class="exp-body">
    ${sec("🧠", "記得你", (e.memory || []).length, `<div class="exp-facts">${memHtml}</div>`)}
    ${sec("📘", "學會的做法", (e.playbook || []).length + (e.skills || []).length, pbHtml + skHtml)}
    ${sec("🗂", "做過的事", (e.episodes || []).length, epHtml)}
    ${sec("🔓", "已放行的操作", (trust.tools || []).length + (trust.bash || []).length, `<div class="exp-chips">${trHtml}</div>`)}
  </div>`;
}

/* 啟動 */
renderTabs();
loadHistory();
loadFiles();
refreshExp();
</script>
</body>
</html>
